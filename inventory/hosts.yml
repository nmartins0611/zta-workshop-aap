---
# ┌─────────────────────────────────────────────────────────────────┐
# │  ZTA Workshop Inventory                                        │
# │                                                                │
# │  BEFORE FIRST RUN:                                             │
# │  1. Replace every ansible_host value with the actual IP or     │
# │     resolvable hostname assigned by your lab environment.      │
# │  2. After configure-dns.yml runs, IdM DNS will handle          │
# │     resolution and you can switch back to *.zta.lab names.     │
# └─────────────────────────────────────────────────────────────────┘
all:
  children:
    # IdM + OPA + Keycloak (co-located on the central server)
    zta_services:
      hosts:
        central:
          ansible_host: central.zta.lab      # ← replace with IP if DNS not yet available
          ansible_user: rhel

    # HashiCorp Vault
    vault_servers:
      hosts:
        vault:
          ansible_host: vault.zta.lab        # ← replace with IP
          ansible_user: rhel

    # Netbox CMDB
    netbox_servers:
      hosts:
        netbox:
          ansible_host: netbox.zta.lab       # ← replace with IP
          ansible_user: rhel

    # Wazuh SIEM
    wazuh_servers:
      hosts:
        wazuh:
          ansible_host: wazuh.zta.lab        # ← resolves to central (containerized)
          ansible_user: rhel

    # Gitea Git server
    gitea_servers:
      hosts:
        gitea:
          ansible_host: gitea.zta.lab        # ← replace with IP
          ansible_user: rhel

    # AAP Controller
    automation:
      hosts:
        control:
          ansible_host: control.zta.lab          # ← replace with IP
          ansible_user: rhel

    # Application server
    app_servers:
      hosts:
        app:
          ansible_host: app.zta.lab          # ← replace with IP
          ansible_user: rhel

    # Database server
    db_servers:
      hosts:
        db:
          ansible_host: db.zta.lab           # ← replace with IP
          ansible_user: rhel

    # Cisco Catalyst 8000v
    network:
      hosts:
        switch01:
          ansible_host: switch01.zta.lab     # ← replace with IP
          ansible_network_os: cisco.ios.ios
          ansible_connection: ansible.netcommon.network_cli
          ansible_user: admin
          ansible_password: "{{ vault_network_password }}"

  vars:
    ansible_python_interpreter: /usr/bin/python3
