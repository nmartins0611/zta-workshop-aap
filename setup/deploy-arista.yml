---
# Deploy Arista cEOS Lab switches as containers on central
#
# Topology:
#   ceos1 (spine) ── net1 ── ceos2 (leaf-1)
#     │                        │
#     │── net3 ── ceos3 ───── net2 ──┘
#     │            (leaf-2)
#     └── loop (loopback network)
#
# Management access:
#   ceos1:  SSH central.zta.lab:2001  |  eAPI central.zta.lab:6031
#   ceos2:  SSH central.zta.lab:2002  |  eAPI central.zta.lab:6032
#   ceos3:  SSH central.zta.lab:2003  |  eAPI central.zta.lab:6033
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/deploy-arista.yml

- name: Deploy Arista cEOS Lab Switches
  hosts: zta_services
  become: true
  gather_facts: true

  vars:
    ceos_image: quay.io/nmartins/ceoslab-rh
    config_repo: https://github.com/nmartins0611/Instruqt_netops.git
    config_dir: /tmp/setup
    ceos_memory: 4g

    ceos_env: &ceos_env
      INTFTYPE: eth
      ETBA: "1"
      SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT: "1"
      CEOS: "1"
      EOS_PLATFORM: ceoslab
      container: podman

    ceos_systemd_args: >-
      /sbin/init
      systemd.setenv=INTFTYPE=eth
      systemd.setenv=ETBA=1
      systemd.setenv=SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT=1
      systemd.setenv=CEOS=1
      systemd.setenv=EOS_PLATFORM=ceoslab
      systemd.setenv=container=podman

    podman_networks:
      - management
      - net1
      - net2
      - net3
      - loop

    switches:
      - name: ceos1
        role: spine
        config_src: "{{ config_dir }}/sw01/sw01"
        ssh_port: 2001
        eapi_port: 6031
        networks: [loop, net1, net3]
      - name: ceos2
        role: leaf
        config_src: "{{ config_dir }}/sw02/sw02"
        ssh_port: 2002
        eapi_port: 6032
        networks: [loop, net1, net2]
      - name: ceos3
        role: leaf
        config_src: "{{ config_dir }}/sw03/sw03"
        ssh_port: 2003
        eapi_port: 6033
        networks: [loop, net2, net3]

  tasks:
    # ═══════════════════════════════════════════════════════════════════
    # Phase 1 — Prerequisites
    # ═══════════════════════════════════════════════════════════════════

    - name: Ensure podman and dependencies are installed
      ansible.builtin.dnf:
        name:
          - podman
          - python3-podman
          - git
          - jq
        state: present

    - name: Pull cEOS image
      containers.podman.podman_image:
        name: "{{ ceos_image }}"
        state: present

    # ═══════════════════════════════════════════════════════════════════
    # Phase 2 — Clone startup configs
    # ═══════════════════════════════════════════════════════════════════

    - name: Remove stale config directory
      ansible.builtin.file:
        path: "{{ config_dir }}"
        state: absent

    - name: Clone switch startup configurations
      ansible.builtin.git:
        repo: "{{ config_repo }}"
        dest: "{{ config_dir }}"
        version: main
        force: true

    # ═══════════════════════════════════════════════════════════════════
    # Phase 3 — Clean up any previous deployment
    # ═══════════════════════════════════════════════════════════════════

    - name: Stop and remove existing cEOS containers
      containers.podman.podman_container:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }}"
      failed_when: false

    - name: Remove existing podman networks
      command: "podman network rm {{ item }}"
      loop: "{{ podman_networks }}"
      failed_when: false
      changed_when: true

    # ═══════════════════════════════════════════════════════════════════
    # Phase 4 — Create networks
    # ═══════════════════════════════════════════════════════════════════

    - name: Create podman networks
      command: "podman network create --disable-dns {{ item }}"
      loop: "{{ podman_networks }}"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 5 — Launch cEOS containers
    # ═══════════════════════════════════════════════════════════════════

    - name: Start cEOS containers
      shell: >
        podman run -d
        --network management
        --memory={{ ceos_memory }}
        --name={{ item.name }}
        --privileged
        -v {{ item.config_src }}:/mnt/flash/startup-config
        -e INTFTYPE=eth
        -e ETBA=1
        -e SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT=1
        -e CEOS=1
        -e EOS_PLATFORM=ceoslab
        -e container=podman
        -p {{ item.eapi_port }}:6030
        -p {{ item.ssh_port }}:22/tcp
        {{ ceos_image }}
        {{ ceos_systemd_args }}
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }}"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 6 — Attach data-plane networks
    # ═══════════════════════════════════════════════════════════════════

    - name: Connect switches to data-plane networks
      command: "podman network connect {{ item.1 }} {{ item.0.name }}"
      loop: "{{ switches | subelements('networks') }}"
      loop_control:
        label: "{{ item.0.name }} → {{ item.1 }}"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 7 — Wait for EOS to boot
    # ═══════════════════════════════════════════════════════════════════

    - name: Wait for cEOS switches to boot (60s)
      ansible.builtin.pause:
        seconds: 60
        prompt: "Waiting for EOS to load startup-config..."

    - name: Verify SSH is reachable on each switch
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ item.ssh_port }}"
        timeout: 120
        delay: 5
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }} (port {{ item.ssh_port }})"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 8 — Gather management IPs
    # ═══════════════════════════════════════════════════════════════════

    - name: Get management IP for each switch
      command: >
        podman inspect {{ item.name }}
        --format {%raw%}'{{ (index .NetworkSettings.Networks "management").IPAddress }}'{%endraw%}
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }}"
      register: switch_ips
      changed_when: false

    - name: Store switch IPs as facts
      ansible.builtin.set_fact:
        ceos_addresses: "{{ ceos_addresses | default({}) | combine({item.item.name: item.stdout | trim}) }}"
      loop: "{{ switch_ips.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # ═══════════════════════════════════════════════════════════════════
    # Summary
    # ═══════════════════════════════════════════════════════════════════

    - name: Display Arista cEOS deployment summary
      ansible.builtin.debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║       Arista cEOS Lab — Deployment Complete                   ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  Topology:                                                   ║
          ║    ceos1 (spine) ── net1 ── ceos2 (leaf-1)                   ║
          ║      │                        │                              ║
          ║      └── net3 ── ceos3 (leaf-2) ── net2 ──┘                  ║
          ║                                                              ║
          ║  Switch Access:                                              ║
          ║    ceos1:  ssh -p 2001 admin@central.zta.lab                 ║
          ║    ceos2:  ssh -p 2002 admin@central.zta.lab                 ║
          ║    ceos3:  ssh -p 2003 admin@central.zta.lab                 ║
          ║                                                              ║
          ║  eAPI (JSON-RPC):                                            ║
          ║    ceos1:  http://central.zta.lab:6031                       ║
          ║    ceos2:  http://central.zta.lab:6032                       ║
          ║    ceos3:  http://central.zta.lab:6033                       ║
          ║                                                              ║
          ║  Management IPs:                                             ║
          ║    ceos1:  {{ ceos_addresses.ceos1 | default('unknown') }}
          ║    ceos2:  {{ ceos_addresses.ceos2 | default('unknown') }}
          ║    ceos3:  {{ ceos_addresses.ceos3 | default('unknown') }}
          ║                                                              ║
          ║  Networks:                                                   ║
          ║    management — mgmt plane (all switches)                    ║
          ║    net1       — ceos1 ↔ ceos2                                ║
          ║    net2       — ceos2 ↔ ceos3                                ║
          ║    net3       — ceos1 ↔ ceos3                                ║
          ║    loop       — loopback (all switches)                      ║
          ║                                                              ║
          ║  Ansible:                                                    ║
          ║    Collection:  arista.eos                                   ║
          ║    Connection:  ansible.netcommon.httpapi (eAPI)              ║
          ║    or:          ansible.netcommon.network_cli (SSH)           ║
          ╚════════════════════════════════════════════════════════════════╝
