---
# EDA Rulebook: Revoke application credentials when Wazuh detects a
# brute-force attack on the app server.
#
# This rulebook:
#   1. Listens for webhook events from Wazuh (via custom integration)
#   2. Matches SSH brute-force alerts (rule 5712) targeting app.zta.lab
#   3. Triggers the "Emergency: Revoke App Credentials" job template in AAP
#
# Usage with Event-Driven Ansible controller (Red Hat Ansible Automation Platform 2.6):
#   Add via Event-Driven Ansible controller (AAP 2.6) Project + Rulebook Activation.
#
# Usage with standalone ansible-rulebook:
#   ansible-rulebook --rulebook extensions/eda/rulebooks/wazuh-credential-revoke.yml \
#     -i inventory/hosts.ini \
#     --vars eda_vars.yml

- name: Wazuh Brute-Force → Credential Revocation
  hosts: all

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Revoke credentials on SSH brute-force detection
      condition: >-
        event.payload.rule is defined
        and event.payload.rule.id == "5712"
      action:
        run_job_template:
          name: "Emergency: Revoke App Credentials"
          organization: Default
          job_args:
            extra_vars:
              incident_source: wazuh-eda
              incident_rule: "{{ event.payload.rule.id }}"
              incident_host: "{{ event.payload.agent.name | default('app.zta.lab') }}"

    - name: Revoke credentials on high-severity auth failure
      condition: >-
        event.payload.rule is defined
        and event.payload.rule.level is defined
        and event.payload.rule.level >= 12
        and event.payload.rule.groups is defined
        and "authentication_failures" in event.payload.rule.groups
      action:
        run_job_template:
          name: "Emergency: Revoke App Credentials"
          organization: Default
          job_args:
            extra_vars:
              incident_source: wazuh-eda-high-severity
              incident_rule: "{{ event.payload.rule.id }}"
              incident_host: "{{ event.payload.agent.name | default('app.zta.lab') }}"

    - name: Log all Wazuh alerts (for debugging)
      condition: >-
        event.payload.rule is defined
        and event.payload.rule.id is defined
      action:
        debug:
          msg: >-
            Wazuh alert received — Rule {{ event.payload.rule.id }}
            (level {{ event.payload.rule.level | default('?') }}):
            {{ event.payload.rule.description | default('no description') }}
            on {{ event.payload.agent.name | default('unknown host') }}
