---
# Section 1: Demonstrate Vault SSH OTP — short-lived machine credentials
#
# This playbook:
#   1. Requests a one-time password from Vault for each target host
#   2. Uses the OTP to SSH in and run a command (proves the credential works)
#   3. Attempts to reuse the same OTP (proves it's single-use)
#   4. Shows the full lifecycle: generate → use → expired
#
# Zero Trust principle: no standing access to machines. Every login requires
# a just-in-time credential that is audited, short-lived, and single-use.

- name: Demonstrate Vault SSH One-Time Passwords
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault with userpass
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"
    ssh_test_targets:
      - name: app
        ip: "{{ hostvars['app']['ansible_host'] }}"
        port: "{{ hostvars['app']['ansible_port'] | default(22) }}"
      - name: db
        ip: "{{ hostvars['db']['ansible_host'] }}"
        port: "{{ hostvars['db']['ansible_port'] | default(22) }}"

  tasks:
    # ── Phase 1: Verify SSH engine is configured ──
    - name: "Phase 1 | Read SSH OTP role configuration"
      command: "vault read -format=json {{ vault_ssh_secrets_path }}/roles/{{ vault_ssh_role_name }}"
      environment: "{{ vault_env }}"
      register: ssh_role_check
      changed_when: false

    - name: "Phase 1 | Parse role details"
      set_fact:
        ssh_role: "{{ ssh_role_check.stdout | from_json }}"

    - name: "Phase 1 | Confirm role is OTP type"
      assert:
        that:
          - ssh_role.data.key_type == "otp"
          - ssh_role.data.default_user == vault_ssh_user
        success_msg: "SSH OTP role '{{ vault_ssh_role_name }}' is correctly configured (user: {{ vault_ssh_user }})"
        fail_msg: "SSH OTP role misconfigured — expected key_type=otp, default_user={{ vault_ssh_user }}"

    # ── Phase 2: Generate OTPs for target hosts ──
    - name: "Phase 2 | Request SSH OTP for {{ item.name }}"
      command: >
        vault write -format=json {{ vault_ssh_secrets_path }}/creds/{{ vault_ssh_role_name }}
        ip={{ item.ip }}
      environment: "{{ vault_env }}"
      register: otp_results
      changed_when: false
      no_log: true
      loop: "{{ ssh_test_targets }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ip }})"

    - name: "Phase 2 | Parse OTP credentials"
      set_fact:
        otp_credentials: >-
          {{ otp_credentials | default([]) + [{
            'host': item.item.name,
            'ip': item.item.ip,
            'username': (item.stdout | from_json).data.username,
            'otp': (item.stdout | from_json).data.key,
            'port': (item.stdout | from_json).data.port
          }] }}
      loop: "{{ otp_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      no_log: true

    # ── Phase 3: Use the OTP to authenticate ──
    - name: "Phase 3 | SSH to {{ item.host }} using OTP"
      shell: |
        sshpass -p '{{ item.otp }}' \
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o NumberOfPasswordPrompts=1 \
              -p {{ item.port }} \
              {{ item.username }}@{{ item.ip }} \
              'echo "OTP_LOGIN_OK hostname=$(hostname) user=$(whoami) date=$(date -Iseconds)"'
      register: ssh_test_results
      loop: "{{ otp_credentials }}"
      loop_control:
        label: "{{ item.host }} ({{ item.ip }})"
      no_log: true
      failed_when: false

    # ── Phase 4: Attempt reuse (must fail — proves single-use) ──
    - name: "Phase 4 | Reuse same OTP for {{ item.host }} (should FAIL)"
      shell: |
        sshpass -p '{{ item.otp }}' \
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o NumberOfPasswordPrompts=1 \
              -o ConnectTimeout=5 \
              -p {{ item.port }} \
              {{ item.username }}@{{ item.ip }} \
              'echo "REUSE_SHOULD_NOT_WORK"'
      register: otp_reuse_results
      loop: "{{ otp_credentials }}"
      loop_control:
        label: "{{ item.host }} ({{ item.ip }})"
      no_log: true
      failed_when: false

    # ── Phase 5: Results ──
    - name: "Phase 5 | Display SSH OTP test results"
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║       Vault SSH OTP — Short-Lived Machine Credentials        ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  SSH Engine:  {{ vault_ssh_secrets_path | ljust(48) }}║
          ║  OTP Role:    {{ vault_ssh_role_name | ljust(48) }}║
          ║  Login User:  {{ vault_ssh_user | ljust(48) }}║
          ║                                                              ║
          ║  ── Per-Host Results ──────────────────────────────────────   ║
          ║                                                              ║
          {% for result in ssh_test_results.results %}
          ║  {{ result.item.host | ljust(10) }} ({{ result.item.ip }}){{ ' ' * (37 - result.item.ip | length) }}║
          ║    OTP login:  {{ ('PASS ✓' if result.rc == 0 else 'FAIL ✗') | ljust(48) }}║
          ║    OTP reuse:  {{ ('BLOCKED ✓ (single-use enforced)' if otp_reuse_results.results[loop.index0].rc != 0 else 'REUSE SUCCEEDED ✗ (BUG!)') | ljust(48) }}║
          ║                                                              ║
          {% endfor %}
          ║  ── Zero Trust Properties ────────────────────────────────   ║
          ║                                                              ║
          ║    ● Just-in-time:  Credential generated on demand           ║
          ║    ● Short-lived:   OTP expires after single use             ║
          ║    ● Least-priv:    vault-ssh has limited sudo only          ║
          ║    ● Audited:       Every OTP request logged in Vault        ║
          ║    ● No standing:   No static password for vault-ssh user    ║
          ║                                                              ║
          ╚════════════════════════════════════════════════════════════════╝
