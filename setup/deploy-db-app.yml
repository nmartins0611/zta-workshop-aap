---
# Pre-workshop setup: Deploy PostgreSQL database and sample application
- name: Deploy PostgreSQL Database
  hosts: db_servers
  become: true
  gather_facts: true

  tasks:
    - name: Install PostgreSQL
      dnf:
        name:
          - postgresql-server
          - postgresql
          - python3-psycopg2
        state: present

    - name: Check if PostgreSQL is initialised
      stat:
        path: /var/lib/pgsql/data/PG_VERSION
      register: pg_data

    - name: Initialise PostgreSQL
      command: postgresql-setup --initdb
      when: not pg_data.stat.exists

    - name: Configure PostgreSQL to listen on all interfaces
      lineinfile:
        path: /var/lib/pgsql/data/postgresql.conf
        regexp: "^#?listen_addresses"
        line: "listen_addresses = '*'"
      notify: Restart PostgreSQL

    - name: Allow password auth from app and central subnets
      blockinfile:
        path: /var/lib/pgsql/data/pg_hba.conf
        block: |
          # ZTA Workshop - allow connections from lab network
          host    all    all    10.0.0.0/8       md5
          host    all    all    192.168.0.0/16   md5
        marker: "# {mark} ZTA WORKSHOP"
      notify: Restart PostgreSQL

    - name: Start and enable PostgreSQL
      systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Open firewall for PostgreSQL
      firewalld:
        port: "{{ db_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      failed_when: false

    - name: Create application database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        state: present

    - name: Set postgres user password
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ db_admin_user }}"
        password: "{{ db_admin_password }}"
        state: present

    - name: Create application schema
      become_user: postgres
      community.postgresql.postgresql_query:
        db: "{{ db_name }}"
        query: |
          CREATE TABLE IF NOT EXISTS app_data (
            id SERIAL PRIMARY KEY,
            name VARCHAR(100) NOT NULL,
            value TEXT,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          INSERT INTO app_data (name, value)
          SELECT 'workshop_init', 'ZTA Workshop database ready'
          WHERE NOT EXISTS (SELECT 1 FROM app_data WHERE name = 'workshop_init');

  handlers:
    - name: Restart PostgreSQL
      systemd:
        name: postgresql
        state: restarted

- name: Deploy Sample Application
  hosts: app_servers
  become: true
  gather_facts: true

  tasks:
    - name: Install application dependencies
      dnf:
        name:
          - python3
          - python3-pip
          - python3-flask
          - python3-psycopg2
        state: present

    - name: Create application directory
      file:
        path: "{{ app_deploy_dir }}"
        state: directory
        mode: '0755'

    - name: Deploy application code
      copy:
        dest: "{{ app_deploy_dir }}/app.py"
        content: |
          #!/usr/bin/env python3
          """ZTA Workshop - Sample Application
          Connects to PostgreSQL using credentials provided via environment variables.
          """
          import os
          import psycopg2
          from flask import Flask, jsonify

          app = Flask(__name__)

          def get_db_connection():
              return psycopg2.connect(
                  host=os.environ.get('DB_HOST', '{{ db_host }}'),
                  port=os.environ.get('DB_PORT', '{{ db_port }}'),
                  dbname=os.environ.get('DB_NAME', '{{ db_name }}'),
                  user=os.environ['DB_USER'],
                  password=os.environ['DB_PASSWORD'],
              )

          @app.route('/')
          def index():
              return jsonify({
                  'app': 'zta-workshop',
                  'status': 'running',
                  'db_user': os.environ.get('DB_USER', 'not configured'),
              })

          @app.route('/health')
          def health():
              try:
                  conn = get_db_connection()
                  cur = conn.cursor()
                  cur.execute('SELECT 1')
                  cur.close()
                  conn.close()
                  return jsonify({'status': 'healthy', 'database': 'connected'})
              except Exception as e:
                  return jsonify({'status': 'unhealthy', 'error': str(e)}), 503

          @app.route('/data')
          def data():
              try:
                  conn = get_db_connection()
                  cur = conn.cursor()
                  cur.execute('SELECT id, name, value, created_at::text FROM app_data ORDER BY id')
                  rows = [{'id': r[0], 'name': r[1], 'value': r[2], 'created_at': r[3]} for r in cur.fetchall()]
                  cur.close()
                  conn.close()
                  return jsonify({'data': rows})
              except Exception as e:
                  return jsonify({'error': str(e)}), 500

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=int(os.environ.get('APP_PORT', '{{ app_port }}')))
        mode: '0755'

    - name: Create systemd service for application
      copy:
        dest: /etc/systemd/system/ztaapp.service
        content: |
          [Unit]
          Description=ZTA Workshop Application
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory={{ app_deploy_dir }}
          ExecStart=/usr/bin/python3 {{ app_deploy_dir }}/app.py
          Restart=always
          RestartSec=5
          EnvironmentFile=-{{ app_deploy_dir }}/env
          Environment=DB_HOST={{ db_host }}
          Environment=DB_PORT={{ db_port }}
          Environment=DB_NAME={{ db_name }}
          Environment=DB_USER=placeholder
          Environment=DB_PASSWORD=placeholder

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Reload systemd

    - name: Open firewall for application
      firewalld:
        port: "{{ app_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      failed_when: false

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true
