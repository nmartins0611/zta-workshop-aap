---
# Section 2, Step 2 (policy-aware variant): Generate short-lived database
# credentials from Vault, authenticating as the AAP launcher user.
#
# Unlike create-db-credential.yml (which defaults to Vault admin), this
# playbook authenticates as the user who launched the AAP workflow.  The
# user must have a Vault userpass account with the app-deployer policy
# attached — otherwise Vault returns 403 on the credential read.
#
# This variant makes the "Break Vault Policy" exercise work: breaking the
# app-deployer policy path causes a real 403, because the launcher user
# is not the Vault root/admin.
#
# Prerequisites:
#   - Vault userpass accounts created for IdM users (configure-vault.yml)
#   - The launching user's Vault account has the app-deployer policy
#
# Swap-in: replace create-db-credential.yml in the AAP workflow template
#          with this playbook to enable the policy break/fix exercise.

- name: Create Short-Lived Database Credentials (Policy-Aware)
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ awx_user_name | default(lookup('env', 'VAULT_USERNAME'), true) | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault as launching user
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"

    - name: Display Vault identity
      debug:
        msg: "Authenticated to Vault as '{{ vault_username }}' (policies: {{ vault_login.json.auth.policies | join(', ') }})"

  tasks:
    - name: Request dynamic database credentials from Vault
      command: vault read -format=json {{ vault_db_secrets_path }}/creds/{{ vault_db_role_name }}
      environment: "{{ vault_env }}"
      register: vault_creds_raw
      no_log: true

    - name: Parse Vault response
      set_fact:
        db_dynamic_user: "{{ (vault_creds_raw.stdout | from_json).data.username }}"
        db_dynamic_password: "{{ (vault_creds_raw.stdout | from_json).data.password }}"
        db_lease_id: "{{ (vault_creds_raw.stdout | from_json).lease_id }}"
        db_lease_duration: "{{ (vault_creds_raw.stdout | from_json).lease_duration }}"
      no_log: true

    - name: Store lease ID for later rotation/revocation
      copy:
        dest: /tmp/zta-db-lease
        content: "{{ db_lease_id }}"
        mode: '0600'

    - name: Display credential metadata (not the password)
      debug:
        msg: |
          Dynamic database credentials created:
            Vault user: {{ vault_username }}
            DB user:    {{ db_dynamic_user }}
            TTL:        {{ db_lease_duration }}s
            Lease:      {{ db_lease_id[:50] }}...

          These credentials grant SELECT, INSERT, UPDATE on {{ db_name }}.
          They will be automatically revoked by Vault after the TTL expires.

    - name: Write credentials to shared artifact for workflow
      set_stats:
        data:
          db_dynamic_user: "{{ db_dynamic_user }}"
          db_dynamic_password: "{{ db_dynamic_password }}"
          db_lease_id: "{{ db_lease_id }}"
        per_host: false
