---
# EDA Rulebook: Revoke application credentials when Splunk detects a
# brute-force attack on the app server.
#
# This rulebook:
#   1. Listens for webhook events from Splunk saved search alerts
#   2. Matches SSH brute-force alerts targeting workshop hosts
#   3. Triggers the "Emergency: Revoke App Credentials" job template in AAP
#
# Splunk webhook payload structure:
#   {
#     "result": { "src_ip": "...", "host": "...", "count": "..." },
#     "search_name": "ZTA: SSH Brute Force Detected",
#     "results_link": "http://...",
#     "sid": "..."
#   }
#
# Usage with EDA Controller (AAP 2.5+):
#   Import this rulebook into EDA Controller and create a Rulebook Activation.
#
# Usage with standalone ansible-rulebook:
#   ansible-rulebook --rulebook section5/eda/splunk-credential-revoke.yml \
#     -i inventory/hosts.ini \
#     --vars eda_vars.yml

- name: Splunk Brute-Force → Credential Revocation
  hosts: all

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Revoke credentials on SSH brute-force detection
      condition: >-
        event.payload.search_name is defined
        and "Brute Force" in event.payload.search_name
      action:
        run_job_template:
          name: "Emergency: Revoke App Credentials"
          organization: Default
          job_args:
            extra_vars:
              incident_source: splunk-eda
              incident_rule: "{{ event.payload.search_name | default('Splunk Alert') }}"
              incident_host: "{{ event.payload.result.host | default('app.zta.lab') }}"
              incident_src_ip: "{{ event.payload.result.src_ip | default('unknown') }}"
              incident_count: "{{ event.payload.result.count | default('unknown') }}"

    - name: Revoke credentials on high-severity Splunk alert
      condition: >-
        event.payload.search_name is defined
        and "ZTA" in event.payload.search_name
        and "Bypass" in event.payload.search_name
      action:
        run_job_template:
          name: "Emergency: Revoke App Credentials"
          organization: Default
          job_args:
            extra_vars:
              incident_source: splunk-eda-bypass
              incident_rule: "{{ event.payload.search_name }}"
              incident_host: "{{ event.payload.result.host | default('app.zta.lab') }}"

    - name: Log all Splunk alerts (for debugging)
      condition: >-
        event.payload.search_name is defined
      action:
        debug:
          msg: >-
            Splunk alert received — "{{ event.payload.search_name }}"
            Result: src_ip={{ event.payload.result.src_ip | default('?') }}
            host={{ event.payload.result.host | default('?') }}
            count={{ event.payload.result.count | default('?') }}
