---
# configure-aap-credentials.yml — Create all AAP credentials needed for
# the ZTA workshop lab.
#
# Creates:
#   1. ZTA Machine Credential         — SSH as rhel with sudo
#   2. ZTA Vault Credential           — HashiCorp Vault secret lookup
#   3. ZTA Arista Credential          — Network device access (cEOS switches)
#   4. ZTA NetBox Credential          — CMDB API (custom credential type)
#   5. ZTA Vault SSH Credential       — Vault signed SSH certificates (AppRole)
#
# Prerequisites:
#   - AAP Controller is installed and reachable
#   - Vault is deployed, unsealed, and configured (configure-vault.yml)
#   - NetBox is deployed (deploy-netbox.yml)
#   - ansible.controller collection available
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml
#
# Override defaults with env vars or extra vars:
#   AAP_ADMIN_PASSWORD, VAULT_USERNAME, VAULT_PASSWORD, NETBOX_TOKEN

- name: Create AAP Credentials for ZTA Workshop
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_host: "{{ aap_controller_url | default('https://control.zta.lab') }}"
    aap_user: admin
    aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') | default('ansible123!', true) }}"
    aap_verify_ssl: false
    aap_organization: Default

    machine_user: rhel
    machine_password: "ansible123!"

    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default('ansible123!', true) }}"

    arista_user: admin
    arista_password: admin

    nb_api_url: "{{ netbox_url | default('http://netbox.zta.lab:8880') }}"
    nb_api_token: "{{ netbox_token | default('0123456789abcdef0123456789abcdef01234567') }}"

    ssh_approle_name: ssh-client
    ssh_approle_policies:
      - ssh-access

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ aap_host }}"
      controller_username: "{{ aap_user }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_verify_ssl }}"

  tasks:

    # ══════════════════════════════════════════════════════════════════════
    #  Verify prerequisites
    # ══════════════════════════════════════════════════════════════════════

    - name: Verify AAP Controller is reachable
      uri:
        url: "{{ aap_host }}/api/controller/v2/ping/"
        method: GET
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: aap_ping

    - name: Display AAP version
      debug:
        msg: "AAP Controller {{ aap_ping.json.version }} detected"

    - name: Authenticate to Vault
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
        status_code: 200
      register: vault_login

    # ══════════════════════════════════════════════════════════════════════
    #  1. Vault Credential — Secret lookup (userpass auth)
    #     This is the bootstrap credential — all others source from it.
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Vault Credential
      ansible.controller.credential:
        name: ZTA Vault Credential
        description: "HashiCorp Vault secret lookup — KV, database, SSH engines"
        credential_type: HashiCorp Vault Secret Lookup
        organization: "{{ aap_organization }}"
        inputs:
          url: "{{ vault_addr }}"
          username: "{{ vault_username }}"
          password: "{{ vault_password }}"
          api_version: v2
        state: present

    # ══════════════════════════════════════════════════════════════════════
    #  2. Machine Credential — SSH as rhel, password sourced from Vault
    #     become_password also sourced from Vault KV at secret/machine/rhel
    # ══════════════════════════════════════════════════════════════════════

    - name: Store machine credentials in Vault KV
      uri:
        url: "{{ vault_addr }}/v1/secret/data/machine/rhel"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          data:
            password: "{{ machine_password }}"
            become_password: "{{ machine_password }}"
        validate_certs: false
        status_code: [200, 204]

    - name: Create ZTA Machine Credential (Vault-sourced password)
      ansible.controller.credential:
        name: ZTA Machine Credential
        description: "SSH access to RHEL hosts — password sourced from Vault KV"
        credential_type: Machine
        organization: "{{ aap_organization }}"
        inputs:
          username: "{{ machine_user }}"
          password: "{{ '{{' }} machine_password {{ '}}' }}"
          become_method: sudo
          become_password: "{{ '{{' }} machine_become_password {{ '}}' }}"
        credential_inputs_from_credentials:
          - source_credential: ZTA Vault Credential
            input_field_name: machine_password
            metadata:
              secret_path: "secret/data/machine/rhel"
              secret_key: password
          - source_credential: ZTA Vault Credential
            input_field_name: machine_become_password
            metadata:
              secret_path: "secret/data/machine/rhel"
              secret_key: become_password
        state: present

    # ══════════════════════════════════════════════════════════════════════
    #  3. Arista Network Credential — sourced from Vault KV
    #     Reads from secret/network/arista (stored by configure-vault.yml)
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Arista Credential (Vault-sourced password)
      ansible.controller.credential:
        name: ZTA Arista Credential
        description: "Arista cEOS switch access — credentials from Vault KV"
        credential_type: Network
        organization: "{{ aap_organization }}"
        inputs:
          username: "{{ '{{' }} arista_username {{ '}}' }}"
          password: "{{ '{{' }} arista_password {{ '}}' }}"
        credential_inputs_from_credentials:
          - source_credential: ZTA Vault Credential
            input_field_name: arista_username
            metadata:
              secret_path: "secret/data/network/arista"
              secret_key: username
          - source_credential: ZTA Vault Credential
            input_field_name: arista_password
            metadata:
              secret_path: "secret/data/network/arista"
              secret_key: password
        state: present

    # ══════════════════════════════════════════════════════════════════════
    #  4. NetBox CMDB Credential — custom credential type + credential
    # ══════════════════════════════════════════════════════════════════════

    - name: Create NetBox credential type
      ansible.controller.credential_type:
        name: NetBox
        description: "NetBox CMDB API credentials — injects NETBOX_API + NETBOX_TOKEN env vars"
        kind: cloud
        inputs:
          fields:
            - id: netbox_url
              label: NetBox URL
              type: string
              help_text: "Full URL (e.g. http://netbox.zta.lab:8880)"
            - id: netbox_token
              label: API Token
              type: string
              secret: true
          required:
            - netbox_url
            - netbox_token
        injectors:
          env:
            NETBOX_API: "{% raw %}{{ netbox_url }}{% endraw %}"
            NETBOX_TOKEN: "{% raw %}{{ netbox_token }}{% endraw %}"
        state: present

    - name: Create ZTA NetBox Credential
      ansible.controller.credential:
        name: ZTA NetBox Credential
        description: "NetBox CMDB — API token for inventory sync and module lookups"
        credential_type: NetBox
        organization: "{{ aap_organization }}"
        inputs:
          netbox_url: "{{ nb_api_url }}"
          netbox_token: "{{ nb_api_token }}"
        state: present

    # ══════════════════════════════════════════════════════════════════════
    #  5. Vault SSH Signed Certificate Credential — AppRole auth
    # ══════════════════════════════════════════════════════════════════════

    - name: Enable AppRole auth method in Vault
      uri:
        url: "{{ vault_addr }}/v1/sys/auth/approle"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          type: approle
        validate_certs: false
        status_code: [200, 204]
      failed_when: false

    - name: Create SSH client AppRole
      uri:
        url: "{{ vault_addr }}/v1/auth/approle/role/{{ ssh_approle_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          token_policies: "{{ ssh_approle_policies }}"
          token_ttl: 1h
          token_max_ttl: 4h
          bind_secret_id: true
        validate_certs: false
        status_code: [200, 204]

    - name: Read AppRole role-id
      uri:
        url: "{{ vault_addr }}/v1/auth/approle/role/{{ ssh_approle_name }}/role-id"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        validate_certs: false
        status_code: 200
      register: role_id_response

    - name: Generate AppRole secret-id
      uri:
        url: "{{ vault_addr }}/v1/auth/approle/role/{{ ssh_approle_name }}/secret-id"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        validate_certs: false
        status_code: 200
      register: secret_id_response

    - name: Look up Vault Signed SSH credential type
      uri:
        url: "{{ aap_host }}/api/v2/credential_types/?name=HashiCorp+Vault+Signed+SSH"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: vault_ssh_cred_type

    - name: Verify Vault Signed SSH credential type exists
      assert:
        that: vault_ssh_cred_type.json.count > 0
        fail_msg: >
          'HashiCorp Vault Signed SSH' credential type not found.
          Requires AAP 2.4+ with the Vault credential plugin.

    - name: Create ZTA Vault SSH Credential
      uri:
        url: "{{ aap_host }}/api/v2/credentials/"
        method: POST
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        body_format: json
        body:
          name: "ZTA Vault SSH Credential"
          description: "Vault SSH CA — signs ephemeral certificates via AppRole"
          credential_type: "{{ vault_ssh_cred_type.json.results[0].id }}"
          organization: 1
          inputs:
            vault_url: "{{ vault_addr }}"
            role_id: "{{ role_id_response.json.data.role_id }}"
            secret_id: "{{ secret_id_response.json.data.secret_id }}"
            auth_path: "approle"
        status_code: [200, 201]
      register: vault_ssh_cred
      failed_when:
        - vault_ssh_cred.status not in [200, 201]
        - "'already exists' not in (vault_ssh_cred.content | default(''))"

    # ══════════════════════════════════════════════════════════════════════
    #  Summary
    # ══════════════════════════════════════════════════════════════════════

    - name: Display credentials summary
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║       AAP Credentials — Configuration Complete                   ║
          ╠═══════════════════════════════════════════════════════════════════╣
          ║                                                                 ║
          ║  ┌───┬──────────────────────────┬──────────────────────────────┐║
          ║  │ # │ Credential               │ Secret Source               │║
          ║  ├───┼──────────────────────────┼──────────────────────────────┤║
          ║  │ 1 │ ZTA Vault Credential     │ Userpass (bootstrap)        │║
          ║  │ 2 │ ZTA Machine Credential   │ Vault KV: secret/machine/*  │║
          ║  │ 3 │ ZTA Arista Credential    │ Vault KV: secret/network/*  │║
          ║  │ 4 │ ZTA NetBox Credential    │ Custom type (env injection) │║
          ║  │ 5 │ ZTA Vault SSH Credential │ Vault AppRole (ssh-client)  │║
          ║  └───┴──────────────────────────┴──────────────────────────────┘║
          ║                                                                 ║
          ║  No hardcoded passwords in AAP — all secrets sourced            ║
          ║  from Vault at job runtime (except the Vault lookup             ║
          ║  credential itself, which bootstraps the chain).                ║
          ║                                                                 ║
          ║  Vault:   {{ vault_addr }}{{ ' ' * (51 - vault_addr | length) }}║
          ║  NetBox:  {{ nb_api_url }}{{ ' ' * (51 - nb_api_url | length) }}║
          ║                                                                 ║
          ╚═══════════════════════════════════════════════════════════════════╝
