# ZTA Workshop Inventory
#
# BEFORE FIRST RUN:
# 1. Replace hostnames with actual IPs if DNS is not yet available.
# 2. After configure-dns.yml runs, IdM DNS handles resolution and
#    you can switch back to *.zta.lab names.

[zta_services]
central ansible_host=central.zta.lab

[vault_servers]
vault ansible_host=vault.zta.lab

[netbox_servers]
netbox ansible_host=netbox.zta.lab

[wazuh_servers]
wazuh ansible_host=wazuh.zta.lab

[gitea_servers]
gitea ansible_host=gitea.zta.lab

[automation]
control ansible_host=control.zta.lab

[app_servers]
app ansible_host=app.zta.lab

[db_servers]
db ansible_host=db.zta.lab

[network]
switch01 ansible_host=switch01.zta.lab

# All Linux hosts except central (IdM server) and the Cisco switch.
# Used by setup/enroll-idm-clients.yml.
[idm_clients:children]
vault_servers
netbox_servers
wazuh_servers
gitea_servers
automation
app_servers
db_servers

[all:vars]
ansible_user=rhel
ansible_password=ansible123!
ansible_become_password=ansible123!
ansible_python_interpreter=/usr/bin/python3

[network:vars]
ansible_user=admin
ansible_password=cisco123!
ansible_network_os=cisco.ios.ios
ansible_connection=ansible.netcommon.network_cli
