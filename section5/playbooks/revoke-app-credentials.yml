---
# Section 5: Emergency credential revocation — triggered by EDA when
# Wazuh detects a brute-force attack on the app server.
#
# This playbook:
#   1. Reads the current Vault DB lease for the application
#   2. Revokes the lease (Vault drops the dynamic PostgreSQL user)
#   3. Stops the application service
#   4. Logs the incident
#
# After this runs, the app has NO database access until credentials
# are manually re-issued (section5/playbooks/restore-app-credentials.yml).

- name: "EMERGENCY: Revoke Application Database Credentials"
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault with userpass
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"
    incident_source: "{{ incident_source | default('wazuh-eda') }}"
    incident_rule: "{{ incident_rule | default('5712') }}"
    incident_host: "{{ incident_host | default('app.zta.lab') }}"

  tasks:
    - name: Read current Vault DB lease ID
      slurp:
        src: /tmp/zta-db-lease
      register: lease_raw
      failed_when: false

    - name: Revoke the database credentials in Vault
      command: "vault lease revoke {{ lease_raw.content | b64decode | trim }}"
      environment: "{{ vault_env }}"
      when: lease_raw is not failed
      register: revoke_result

    - name: Revoke ALL leases for the app DB role (safety net)
      command: "vault lease revoke -prefix {{ vault_db_secrets_path }}/creds/{{ vault_db_role_name }}"
      environment: "{{ vault_env }}"
      register: revoke_all
      failed_when: false

    - name: Remove lease file
      file:
        path: /tmp/zta-db-lease
        state: absent

    - name: Log the incident
      copy:
        dest: "/var/log/zta-incident-{{ ansible_date_time.iso8601_basic_short | default('unknown') }}.log"
        content: |
          ZTA INCIDENT RESPONSE — CREDENTIAL REVOCATION
          ══════════════════════════════════════════════
          Timestamp:  {{ ansible_date_time.iso8601 | default('unknown') }}
          Source:     {{ incident_source }}
          Rule:       {{ incident_rule }}
          Target:     {{ incident_host }}
          Action:     Vault DB credentials revoked
          Lease:      {{ lease_raw.content | b64decode | trim | default('unknown') }}
          Revoke RC:  {{ revoke_result.rc | default('N/A') }}
          Prefix RC:  {{ revoke_all.rc | default('N/A') }}
        mode: '0600'
      failed_when: false

- name: Stop Application Service
  hosts: app_servers
  become: true
  gather_facts: true

  tasks:
    - name: Remove application environment file (contains credentials)
      file:
        path: "{{ app_deploy_dir }}/env"
        state: absent

    - name: Stop the application service
      systemd:
        name: ztaapp
        state: stopped

    - name: Display incident response summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║       INCIDENT RESPONSE — CREDENTIALS REVOKED               ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  Trigger:     Brute-force attack detected by Wazuh           ║
          ║  Source:      {{ incident_source | default('wazuh-eda') | ljust(46) }}║
          ║  Target:      {{ incident_host | default('app.zta.lab') | ljust(46) }}║
          ║                                                              ║
          ║  Actions taken:                                              ║
          ║    ✓ Vault DB lease revoked                                  ║
          ║    ✓ All leases for app DB role revoked (prefix)             ║
          ║    ✓ Application environment file removed                    ║
          ║    ✓ Application service stopped                             ║
          ║    ✓ Incident logged to /var/log/zta-incident-*.log          ║
          ║                                                              ║
          ║  The application has NO database access.                     ║
          ║  To restore: run restore-app-credentials.yml after           ║
          ║  investigating the incident.                                 ║
          ║                                                              ║
          ║  Zero Trust: automatic response, no human delay.             ║
          ╚════════════════════════════════════════════════════════════════╝
