---
# Section 4: OPA-gated VLAN creation on Cisco Catalyst 8000v with Netbox CMDB update
- name: "Pre-check: Validate Network Policy with OPA"
  hosts: zta_services
  become: false
  gather_facts: false

  vars:
    new_vlan_id: "{{ new_vlan_id | int }}"
    new_vlan_name: "{{ new_vlan_name | default('NEW-VLAN') }}"
    network_user: "{{ awx_user_name | default('neteng') }}"
    network_user_groups: "{{ awx_user_groups | default([]) }}"

  tasks:
    - name: Query OPA network policy
      uri:
        url: "{{ opa_url }}/v1/data/zta/network/decision"
        method: POST
        body_format: json
        body:
          input:
            user: "{{ network_user }}"
            user_groups: "{{ network_user_groups }}"
            action: create_vlan
            vlan_id: "{{ new_vlan_id | int }}"
            vlan_name: "{{ new_vlan_name }}"
      register: opa_decision

    - name: Display OPA decision
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║       OPA Network Policy Decision                       ║
          ╠════════════════════════════════════════════════════════════╣
          ║                                                          ║
          ║  User:    {{ network_user | ljust(46) }}║
          ║  Action:  create_vlan                                    ║
          ║  VLAN ID: {{ (new_vlan_id | string) | ljust(46) }}║
          ║  Name:    {{ new_vlan_name | ljust(46) }}║
          ║  Result:  {{ ('ALLOWED' if opa_decision.json.result.allow else 'DENIED') | ljust(46) }}║
          ║                                                          ║
          ║  Conditions:                                             ║
          ║    User in network-admins: {{ ('PASS' if opa_decision.json.result.conditions.user_authorized else 'FAIL') | ljust(30) }}║
          ║    Valid VLAN ID:          {{ ('PASS' if opa_decision.json.result.conditions.valid_vlan else 'FAIL') | ljust(30) }}║
          ║    Action permitted:       {{ ('PASS' if opa_decision.json.result.conditions.action_permitted else 'FAIL') | ljust(30) }}║
          ║                                                          ║
          ║  {{ opa_decision.json.result.reason | ljust(56) }}║
          ╚════════════════════════════════════════════════════════════╝

    - name: Enforce OPA decision
      assert:
        that:
          - opa_decision.json.result.allow == true
        fail_msg: |
          VLAN CONFIGURATION DENIED by OPA policy.
          Reason: {{ opa_decision.json.result.reason }}

          {% if not opa_decision.json.result.conditions.user_authorized %}
          → User '{{ network_user }}' must be added to the 'network-admins' group in IdM.
          {% endif %}
          {% if not opa_decision.json.result.conditions.valid_vlan %}
          → VLAN ID {{ new_vlan_id }} is outside the permitted range (100-999).
          {% endif %}
        success_msg: "OPA policy check PASSED — proceeding with VLAN configuration"

    - name: Store approval for downstream plays
      set_fact:
        opa_approved: true
      delegate_to: localhost
      delegate_facts: true

- name: Configure VLAN on Cisco Catalyst 8000v
  hosts: network
  gather_facts: false
  when: hostvars['localhost']['opa_approved'] | default(false)

  vars:
    new_vlan_id: "{{ new_vlan_id | int }}"
    new_vlan_name: "{{ new_vlan_name | default('NEW-VLAN') }}"

  tasks:
    - name: Create VLAN on switch
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ new_vlan_id | int }}"
            name: "{{ new_vlan_name }}"
            state: active
            shutdown: disabled
        state: merged
      register: vlan_result

    - name: Verify VLAN creation
      cisco.ios.ios_command:
        commands:
          - "show vlan id {{ new_vlan_id }}"
      register: vlan_verify

    - name: Display VLAN configuration result
      debug:
        msg: |
          VLAN {{ new_vlan_id }} ({{ new_vlan_name }}) created on {{ inventory_hostname }}
          {{ vlan_verify.stdout[0] }}

- name: Update Netbox CMDB with New VLAN
  hosts: zta_services
  become: false
  gather_facts: false
  when: hostvars['localhost']['opa_approved'] | default(false)

  vars:
    new_vlan_id: "{{ new_vlan_id | int }}"
    new_vlan_name: "{{ new_vlan_name | default('NEW-VLAN') }}"

  tasks:
    - name: Check if VLAN already exists in Netbox
      uri:
        url: "{{ netbox_url }}/api/ipam/vlans/?vid={{ new_vlan_id }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
      register: netbox_vlan_check

    - name: Create VLAN in Netbox
      uri:
        url: "{{ netbox_url }}/api/ipam/vlans/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: application/json
        body_format: json
        body:
          vid: "{{ new_vlan_id | int }}"
          name: "{{ new_vlan_name }}"
          status: active
          description: "Created via ZTA Workshop by {{ network_user | default('unknown') }}"
        status_code: [201, 400]
      register: netbox_create
      when: netbox_vlan_check.json.count == 0

    - name: CMDB update summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║       VLAN Configuration Complete                       ║
          ╠════════════════════════════════════════════════════════════╣
          ║                                                          ║
          ║  VLAN {{ (new_vlan_id | string + ' (' + new_vlan_name + ')') | ljust(50) }}║
          ║  Switch:  {{ cisco_switch_host | ljust(46) }}║
          ║  Netbox:  {{ ('Created' if netbox_vlan_check.json.count == 0 else 'Already exists') | ljust(46) }}║
          ║  User:    {{ (network_user | default('unknown')) | ljust(46) }}║
          ║                                                          ║
          ║  CMDB is now the source of truth for this VLAN.          ║
          ╚════════════════════════════════════════════════════════════╝
