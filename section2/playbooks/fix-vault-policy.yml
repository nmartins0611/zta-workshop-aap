---
# Section 2 Extension: Restore the correct Vault app-deployer policy.
#
# Usage:
#   ansible-playbook section2/playbooks/fix-vault-policy.yml

- name: "Section 2 | Fix Vault Policy — Restore Correct Path"
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault with userpass
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"

  tasks:
    - name: Write correct app-deployer policy
      copy:
        dest: /tmp/vault-policy-app-deployer-fixed.hcl
        content: |
          path "database/creds/{{ vault_db_role_name }}" {
            capabilities = ["read"]
          }
          path "secret/data/network/*" {
            capabilities = ["read"]
          }
          path "sys/leases/revoke" {
            capabilities = ["update"]
          }
          path "sys/leases/revoke-prefix/database/creds/{{ vault_db_role_name }}" {
            capabilities = ["update"]
          }
        mode: '0644'

    - name: Apply fixed policy
      command: vault policy write app-deployer /tmp/vault-policy-app-deployer-fixed.hcl
      environment: "{{ vault_env }}"

    - name: Clean up temp file
      file:
        path: /tmp/vault-policy-app-deployer-fixed.hcl
        state: absent

    - name: Verify policy is correct
      command: vault policy read app-deployer
      environment: "{{ vault_env }}"
      register: policy_check
      changed_when: false

    - name: Display fix confirmation
      debug:
        msg: |
          VAULT POLICY FIX APPLIED
          =========================

          app-deployer policy restored to correct path:
            database/creds/{{ vault_db_role_name }}

          Deploy Application Pipeline should now succeed.
