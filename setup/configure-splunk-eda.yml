---
# Configure Splunk EDA Add-on — Update Event Stream URL
#
# Lightweight playbook that updates the EDA Token Event Stream URL on the
# pre-configured Splunk environment. The environment ('ZTA'), saved search,
# and action config are baked in by deploy-splunk.yml during initial deployment.
#
# This playbook only needs to run when you create a new Token Event Stream in
# AAP and need to update Splunk with the new URL. Alternatively, update via
# the Splunk GUI: Apps → Ansible Add-on for Splunk → Configuration → ZTA.
#
# Prerequisites:
#   - Splunk deployed with EDA add-on: ansible-playbook setup/deploy-splunk.yml
#   - AAP EDA Token Event Stream created (copy URL from Automation Decisions → Event Streams)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-splunk-eda.yml \
#     -e eda_event_stream_url="https://192.168.1.10:443/eda-event-streams/api/eda/v1/external_event_stream/<UUID>/post/"
#
# Also available as the "Configure Splunk EDA" AAP job template (Section 5, survey-driven).

- name: "Update Splunk EDA webhook endpoint"
  hosts: zta_services
  become: true
  gather_facts: false

  vars:
    splunk_password: "{{ idm_admin_password }}"
    splunk_mgmt: "https://localhost:8089"
    eda_event_stream_url: "CHANGE_ME_EDA_EVENT_STREAM_URL"
    eda_token: "{{ eda_webhook_token }}"
    aap_controller_ip: "{{ aap_controller_ip | default('192.168.1.10') }}"

  tasks:
    - name: Ensure aap.example.org resolves on central (Splunk container inherits host /etc/hosts)
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ aap_controller_ip }} aap.example.org control.zta.lab"
        regexp: "aap\\.example\\.org"
        state: present

    - name: Wait for Splunk management API
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/services/server/info"
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
      register: splunk_ready
      until: splunk_ready.status == 200
      retries: 12
      delay: 10

    - name: Update EDA environment webhook endpoint
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/servicesNS/nobody/ansible_addon_for_splunk/ansible_addon_for_splunk_environment/ZTA"
        method: POST
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          webhook_endpoint: "{{ eda_event_stream_url }}"
          auth_type: apikey
          token: "{{ eda_token }}"
        status_code: [200]
      register: env_update

    - name: Verify alert is scheduled
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/servicesNS/admin/ansible_addon_for_splunk/saved/searches/ZTA%3A+SSH+Brute+Force+Detected?output_mode=json"
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200]
      register: alert_conf

    - name: Display configuration summary
      ansible.builtin.debug:
        msg: |
          Splunk EDA configuration updated:
            Environment:  ZTA
            Endpoint:     {{ eda_event_stream_url }}
            Alert:        ZTA: SSH Brute Force Detected
            Scheduled:    {{ alert_conf.json.entry[0].content.is_scheduled | default('unknown') }}
            Cron:         {{ alert_conf.json.entry[0].content.cron_schedule | default('unknown') }}
          {% if eda_event_stream_url == 'CHANGE_ME_EDA_EVENT_STREAM_URL' %}

          WARNING: Placeholder URL — update with the real EDA Token Event Stream URL:
            -e eda_event_stream_url="https://192.168.1.10:443/eda-event-streams/api/eda/v1/external_event_stream/<UUID>/post/"
          {% endif %}

    - name: Fail if placeholder URL is still in use
      ansible.builtin.assert:
        that:
          - eda_event_stream_url != 'CHANGE_ME_EDA_EVENT_STREAM_URL'
        fail_msg: "You must provide the EDA Event Stream URL via -e eda_event_stream_url=... or the AAP survey"
        success_msg: "EDA endpoint configured successfully"
