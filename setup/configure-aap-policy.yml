---
# Configure AAP Controller to use OPA for Policy as Code.
#
# This enables the platform-level policy gate: AAP checks OPA BEFORE
# allowing a job template to launch.  The gateway policy (aap.gateway)
# enforces group-based access to job templates — e.g. only network-admins
# can launch VLAN templates, only patch-admins can launch patching templates.
#
# Prerequisites:
#   - AAP Controller is installed and reachable
#   - OPA is running on central.zta.lab with aap_gateway.rego loaded
#   - setup/configure-opa-base.yml has been run
#
# Manual alternative (controller UI or REST API): docs/deployment-guide.md
# → Layer 7 — Policy → "Manual Policy as Code (OPA gateway)".

- name: Configure AAP Policy as Code (OPA Gateway)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_host: "{{ aap_controller_url | default('https://control.zta.lab') }}"
    aap_user: admin
    aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') | default('ansible123!', true) }}"
    aap_verify_ssl: false
    aap_organization: Default

  tasks:
    # ── Verify OPA gateway policy is loaded ────────────────────────────

    - name: Test OPA gateway policy is accessible
      uri:
        url: "{{ opa_url }}/v1/data/aap/gateway/allow"
        method: POST
        body_format: json
        body:
          input:
            user:
              username: test
              groups: []
              is_superuser: false
            action: launch
            resource:
              name: "Test Template"
              type: job_template
            extra_vars: {}
        status_code: 200
      register: opa_gateway_test

    - name: Verify OPA gateway responded
      assert:
        that: opa_gateway_test.json.result is defined
        fail_msg: >
          OPA gateway policy not loaded. Run setup/configure-opa-base.yml first
          to deploy aap_gateway.rego.

    # ── Configure AAP to use OPA ───────────────────────────────────────

    - name: Verify AAP Controller is reachable
      uri:
        url: "{{ aap_host }}/api/controller/v2/ping/"
        method: GET
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: aap_ping

    - name: Display AAP version
      debug:
        msg: "AAP Controller {{ aap_ping.json.version }} detected"

    - name: Configure OPA as the Policy as Code provider
      uri:
        url: "{{ aap_host }}/api/controller/v2/settings/policyascode/"
        method: PATCH
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        body_format: json
        body:
          OPA_HOST: "central.zta.lab"
          OPA_PORT: 8181
          OPA_SSL: false
          OPA_AUTH_TYPE: "None"
          OPA_REQUEST_TIMEOUT: 5
          OPA_REQUEST_RETRIES: 2
        status_code: [200]
      register: opa_config

    # ── Set policy enforcement query path on the Default organisation ──

    - name: Look up Default organisation ID
      uri:
        url: "{{ aap_host }}/api/controller/v2/organizations/?name={{ aap_organization | urlencode }}"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: org_lookup

    - name: Verify Default organisation exists
      assert:
        that: org_lookup.json.count > 0
        fail_msg: "Organisation '{{ aap_organization }}' not found in AAP"

    - name: Set policy enforcement query path on organisation
      uri:
        url: "{{ aap_host }}/api/controller/v2/organizations/{{ org_lookup.json.results[0].id }}/"
        method: PATCH
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        body_format: json
        body:
          policy_enforcement: "aap/gateway/decision"
        status_code: 200
      register: org_policy

    - name: Display policy enforcement status
      debug:
        msg: "Policy enforcement set to 'aap/gateway/decision' on organisation '{{ aap_organization }}'"

    # ── Validate the integration ───────────────────────────────────────

    - name: Test gateway policy — superuser (should allow)
      uri:
        url: "{{ opa_url }}/v1/data/aap/gateway/decision"
        method: POST
        body_format: json
        body:
          input:
            name: "Configure VLAN"
            created_by:
              username: admin
              is_superuser: true
              teams: []
      register: test_superuser

    - name: Test gateway policy — netadmin launching VLAN (should allow)
      uri:
        url: "{{ opa_url }}/v1/data/aap/gateway/decision"
        method: POST
        body_format: json
        body:
          input:
            name: "Configure VLAN"
            created_by:
              username: netadmin
              is_superuser: false
              teams:
                - name: Infrastructure
      register: test_netadmin

    - name: Test gateway policy — neteng launching VLAN (should deny)
      uri:
        url: "{{ opa_url }}/v1/data/aap/gateway/decision"
        method: POST
        body_format: json
        body:
          input:
            name: "Configure VLAN"
            created_by:
              username: neteng
              is_superuser: false
              teams: []
      register: test_neteng

    - name: Test gateway policy — appdev launching Deploy (should allow)
      uri:
        url: "{{ opa_url }}/v1/data/aap/gateway/decision"
        method: POST
        body_format: json
        body:
          input:
            name: "Deploy Application"
            created_by:
              username: appdev
              is_superuser: false
              teams:
                - name: Applications
      register: test_appdev

    - name: Display gateway policy test results
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║       AAP Policy as Code — Configuration Complete        ║
          ╠════════════════════════════════════════════════════════════╣
          ║                                                          ║
          ║  OPA Host:      {{ opa_url | regex_replace('https?://', '') }}
          ║  Organisation:  {{ aap_organization }} → aap/gateway/decision
          ║  Status:        CONFIGURED                                 ║
          ║                                                          ║
          ║  Gateway Policy Tests:                                   ║
          ║                                                          ║
          ║  admin (superuser) → Configure VLAN                      ║
          ║    {{ ('ALLOW' if test_superuser.json.result.decision.allowed else 'DENY') }}
          ║                                                          ║
          ║  netadmin (Infrastructure) → Configure VLAN              ║
          ║    {{ ('ALLOW' if test_netadmin.json.result.decision.allowed else 'DENY') }}
          ║                                                          ║
          ║  neteng (no teams) → Configure VLAN                      ║
          ║    {{ ('DENY' if not test_neteng.json.result.decision.allowed else 'ALLOW') }}
          ║    {{ test_neteng.json.result.decision.violations[0] | default('') | truncate(54) }}
          ║                                                          ║
          ║  appdev (Applications) → Deploy Application              ║
          ║    {{ ('ALLOW' if test_appdev.json.result.decision.allowed else 'DENY') }}
          ║                                                          ║
          ║  Defence in Depth:                                       ║
          ║    OUTER RING: AAP checks gateway policy before launch   ║
          ║    INNER RING: Playbook checks runtime policy (VLAN ID,  ║
          ║                SPIFFE ID, Netbox state, etc.)            ║
          ╚════════════════════════════════════════════════════════════╝
