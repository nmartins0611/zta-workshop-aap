---
# Section 2 Extension: Break the Vault app-deployer policy by changing the
# database credential path. The deployment workflow will pass OPA but fail
# at Vault with "permission denied".
#
# Participants must diagnose the Vault policy mismatch and fix it.
#
# Usage (instructor only):
#   ansible-playbook section2/playbooks/break-vault-policy.yml

- name: "Section 2 | Break Vault Policy — Wrong Credential Path"
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault with userpass
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"

  tasks:
    - name: Write broken app-deployer policy (wrong path)
      copy:
        dest: /tmp/vault-policy-app-deployer-broken.hcl
        content: |
          # App Deployer policy — BROKEN: wrong credential path
          # Uses "ztaapp-readonly" instead of "ztaapp-short-lived"
          path "database/creds/ztaapp-readonly" {
            capabilities = ["read"]
          }
          path "secret/data/network/*" {
            capabilities = ["read"]
          }
          path "sys/leases/revoke" {
            capabilities = ["update"]
          }
        mode: '0644'

    - name: Apply broken policy
      command: vault policy write app-deployer /tmp/vault-policy-app-deployer-broken.hcl
      environment: "{{ vault_env }}"

    - name: Clean up temp file
      file:
        path: /tmp/vault-policy-app-deployer-broken.hcl
        state: absent

    - name: Display breakage confirmation (instructor only)
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║       VAULT POLICY BREAKAGE APPLIED                          ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  Changed: app-deployer policy path                           ║
          ║    FROM: database/creds/ztaapp-short-lived                   ║
          ║    TO:   database/creds/ztaapp-readonly (does not exist)     ║
          ║                                                              ║
          ║  Effect:                                                     ║
          ║    Deploy Application Pipeline will pass OPA check           ║
          ║    but FAIL at "Create DB Credential" with 403               ║
          ║                                                              ║
          ║  Instructor fix:                                             ║
          ║    ansible-playbook section2/playbooks/fix-vault-policy.yml  ║
          ╚════════════════════════════════════════════════════════════════╝
