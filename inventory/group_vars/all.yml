# ── Vault Paths ─────────────────────────────────────────────────────
vault_db_secrets_path: database
vault_kv_secrets_path: secret
vault_db_role_name: ztaapp-short-lived
vault_db_max_ttl: 1h
vault_db_default_ttl: 5m

# ── Vault SSH Signed Certificates (Short-Lived Machine Credentials) ──
vault_ssh_secrets_path: ssh
vault_ssh_role_name: ssh-signer
vault_ssh_ca_pubkey_path: /etc/ssh/trusted-user-ca-keys.pub
vault_ssh_ttl: 30m
vault_ssh_max_ttl: 1h
vault_ssh_allowed_users: "rhel,aap-service"

# ── SPIFFE / SPIRE (Workload Identity) ─────────────────────────────
spire_version: "1.12.0"
spire_trust_domain: "{{ idm_domain }}"
spire_server_host: central.zta.lab
spire_server_bind_port: 8081
spire_install_dir: /opt/spire
spire_agent_socket: /run/spire/agent/api.sock
spire_download_base: "https://github.com/spiffe/spire/releases/download"
spire_arch: linux-amd64-musl

spire_workloads:
  - spiffe_id: "spiffe://{{ spire_trust_domain }}/workload/network-automation"
    parent_host: control
    description: AAP network automation workload
    selectors:
      - "unix:uid:0"
  - spiffe_id: "spiffe://{{ spire_trust_domain }}/workload/database"
    parent_host: db
    description: PostgreSQL database workload
    selectors:
      - "unix:uid:26"
  - spiffe_id: "spiffe://{{ spire_trust_domain }}/workload/vault"
    parent_host: vault
    description: HashiCorp Vault workload
    selectors:
      - "unix:uid:0"

# ── Network Segmentation ────────────────────────────────────────────
vlans:
  app_tier:
    id: 20
    name: APP-TIER
    network: 10.20.0.0/24
  data_tier:
    id: 30
    name: DATA-TIER
    network: 10.30.0.0/24
  management:
    id: 10
    name: MGMT
    network: 10.10.0.0/24
