[defaults]
inventory = inventory/hosts.ini
host_key_checking = False
retry_files_enabled = False
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

# -- Facts: cache aggressively, gather only what's needed --
gathering = smart
gather_subset = !hardware,network,virtual
gather_timeout = 15
fact_caching = jsonfile
fact_caching_connection = /tmp/.ansible-fact-cache
fact_caching_timeout = 7200
inject_facts_as_vars = False

# -- Parallelism --
forks = 25
timeout = 30
poll_interval = 2

# -- Output: lean but useful --
stdout_callback = default
display_skipped_hosts = False
display_ok_hosts = True
any_errors_fatal = False
show_custom_stats = True
callbacks_enabled = profile_tasks

# -- Misc --
interpreter_python = auto_silent
use_persistent_connections = True
localhost_warning = False

[ssh_connection]
pipelining = True
control_path_dir = /tmp/.ansible-cp
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o PreferredAuthentications=publickey,password -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o Compression=no -o ServerAliveInterval=15 -o ServerAliveCountMax=3
transfer_method = smart
retries = 2

[persistent_connection]
connect_timeout = 30
command_timeout = 30
connect_retry_timeout = 15

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
