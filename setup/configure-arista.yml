---
# configure-arista.yml — Push startup configs to running cEOS switches
#
# Podman/Netavark blocks SSH access to container-mapped ports (even from
# localhost), so we use `podman exec` to write configs directly into the
# container filesystem and restart to apply.
#
# Why `podman exec tee` instead of `podman cp`:
#   cEOS mounts /mnt/flash/startup-config as a bind mount.  `podman cp`
#   tries to unlink and replace the file, which fails ("device or resource
#   busy").  `tee` writes to the existing inode without replacing it.
#
# Prerequisites:
#   - cEOS containers (ceos1, ceos2, ceos3) are running on central
#   - Switch config files exist in setup/switch-configs/
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-arista.yml

- name: Apply Configuration to Running cEOS Switches
  hosts: zta_services
  become: true
  gather_facts: false

  vars:
    config_dir: "{{ playbook_dir }}/switch-configs"
    switches:
      - { name: ceos1, config: sw01, port: 2001 }
      - { name: ceos2, config: sw02, port: 2002 }
      - { name: ceos3, config: sw03, port: 2003 }

  tasks:

    - name: Verify cEOS containers are running
      ansible.builtin.command:
        cmd: "podman inspect --format {% raw %}'{{.State.Status}}'{% endraw %} {{ item.name }}"
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }}"
      register: container_status
      changed_when: false
      failed_when: "'running' not in container_status.stdout"

    - name: Push startup-config into containers
      ansible.builtin.shell: >
        podman exec -i {{ item.name }}
        tee /mnt/flash/startup-config
        < {{ config_dir }}/{{ item.config }}/{{ item.config }}
        > /dev/null
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }}"
      register: push_results

    - name: Restart switches to apply config
      ansible.builtin.command: "podman restart {{ item.name }}"
      loop: "{{ switches }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Wait for EOS to boot (30s)
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting for cEOS to reload with new startup-config..."

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          cEOS switch configs applied via podman exec:
            ceos1 (spine)     ← sw01
            ceos2 (leaf/data) ← sw02
            ceos3 (leaf/app)  ← sw03
