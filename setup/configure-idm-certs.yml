---
# configure-idm-certs.yml — Request IdM CA-signed TLS certificates for
# workshop services that need trusted HTTPS endpoints.
#
# Creates:
#   - DNS A records for each service hostname
#   - IdM host entries and Kerberos service principals
#   - TLS certificates signed by the IdM CA via ipa-getcert
#
# Prerequisites:
#   - IdM is running on central (Phase 1 of upstream project)
#   - Hosts are enrolled as IdM clients (enroll-idm-clients.yml)

- name: Request IdM-Signed TLS Certificates for Workshop Services
  hosts: zta_services
  become: true
  gather_facts: true

  vars:
    idm_base_dn: "dc={{ idm_domain.split('.') | join(',dc=') }}"
    idm_server_ip: "{{ ansible_default_ipv4.address }}"
    idm_service_certs:
      - hostname: "wazuh.{{ idm_domain }}"
        cert_dir: /opt/certs/wazuh
      - hostname: "control.{{ idm_domain }}"
        cert_dir: /opt/certs/control
      - hostname: "splunk.{{ idm_domain }}"
        cert_dir: /opt/certs/splunk

  tasks:

    - name: Verify IdM is running
      command: ipactl status
      register: idm_status
      changed_when: false
      failed_when: "'RUNNING' not in idm_status.stdout"

    - name: Create certificate directories
      file:
        path: "{{ item.cert_dir }}"
        state: directory
        mode: '0755'
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "{{ item.cert_dir }}"

    - name: Add DNS A records for service hostnames
      redhat.rhel_idm.ipadnsrecord:
        ipaadmin_password: "{{ idm_admin_password }}"
        zone_name: "{{ idm_domain }}"
        name: "{{ item.hostname.split('.')[0] }}"
        record_type: A
        record_value: "{{ idm_server_ip }}"
        state: present
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Register hosts in IdM
      redhat.rhel_idm.ipahost:
        ipaadmin_password: "{{ idm_admin_password }}"
        name: "{{ item.hostname }}"
        force: true
        state: present
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "{{ item.hostname }}"

    - name: Create Kerberos service principals
      redhat.rhel_idm.ipaservice:
        ipaadmin_password: "{{ idm_admin_password }}"
        name: "HTTP/{{ item.hostname }}@{{ idm_realm }}"
        host: "{{ item.hostname }}"
        state: present
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "HTTP/{{ item.hostname }}"
      register: svc_create
      failed_when:
        - svc_create is failed
        - "'already a member' not in (svc_create.msg | default(''))"

    - name: Grant central host permission to manage service certs
      redhat.rhel_idm.ipaservice:
        ipaadmin_password: "{{ idm_admin_password }}"
        name: "HTTP/{{ item.hostname }}@{{ idm_realm }}"
        host:
          - "{{ item.hostname }}"
          - "{{ ansible_fqdn }}"
        action: member
        state: present
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "HTTP/{{ item.hostname }}"
      register: svc_member
      failed_when:
        - svc_member is failed
        - "'already a member' not in (svc_member.msg | default(''))"

    - name: Check existing certificate request status
      shell: |
        if ipa-getcert list -f {{ item.cert_dir }}/server.crt 2>/dev/null | grep -q 'status:'; then
          ipa-getcert list -f {{ item.cert_dir }}/server.crt | grep 'status:' | head -1 | awk '{print $2}'
        else
          echo "NONE"
        fi
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "{{ item.hostname }}"
      register: cert_status_check
      changed_when: false

    - name: Clean up stuck or rejected certificate requests
      shell: |
        ipa-getcert stop-tracking -f {{ item.item.cert_dir }}/server.crt 2>/dev/null || true
        rm -f {{ item.item.cert_dir }}/server.crt {{ item.item.cert_dir }}/server.key
      loop: "{{ cert_status_check.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.stdout in ['CA_REJECTED', 'CA_UNREACHABLE', 'NEED_GUIDANCE']
      changed_when: true

    - name: Obtain Kerberos admin ticket for certmonger
      shell: echo '{{ idm_admin_password }}' | kinit admin
      changed_when: false
      no_log: true

    - name: Restart certmonger to pick up fresh credentials
      systemd:
        name: certmonger
        state: restarted

    - name: Request certificates from IdM CA
      command: >
        ipa-getcert request
        -f {{ item.item.cert_dir }}/server.crt
        -k {{ item.item.cert_dir }}/server.key
        -N CN={{ item.item.hostname }}
        -D {{ item.item.hostname }}
        -K HTTP/{{ item.item.hostname }}@{{ idm_realm }}
      loop: "{{ cert_status_check.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.stdout != 'MONITORING'
      register: cert_request
      changed_when: "'New signing request' in (cert_request.stdout | default(''))"
      failed_when: false

    - name: Wait for certificate issuance
      shell: |
        for i in $(seq 1 30); do
          status=$(ipa-getcert list -f {{ item.item.cert_dir }}/server.crt 2>/dev/null | grep 'status:' | head -1)
          if echo "$status" | grep -q 'MONITORING'; then
            echo "ISSUED"
            exit 0
          fi
          if echo "$status" | grep -qE 'CA_REJECTED|NEED_GUIDANCE'; then
            ipa-getcert list -f {{ item.item.cert_dir }}/server.crt 2>&1
            echo "REJECTED"
            exit 1
          fi
          sleep 2
        done
        ipa-getcert list -f {{ item.item.cert_dir }}/server.crt 2>&1
        echo "TIMEOUT"
      loop: "{{ cert_status_check.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      when: item.stdout != 'MONITORING'
      register: cert_wait
      changed_when: false
      failed_when: "'TIMEOUT' in (cert_wait.stdout | default('')) or 'REJECTED' in (cert_wait.stdout | default(''))"

    - name: Set certificate file permissions
      file:
        path: "{{ item.0.cert_dir }}/{{ item.1 }}"
        mode: '0644'
      loop: "{{ idm_service_certs | product(['server.crt', 'server.key']) | list }}"
      loop_control:
        label: "{{ item.0.cert_dir }}/{{ item.1 }}"

    - name: Copy IdM CA root cert alongside each service cert
      copy:
        src: /etc/ipa/ca.crt
        dest: "{{ item.cert_dir }}/ca.crt"
        remote_src: true
        mode: '0644'
      loop: "{{ idm_service_certs }}"
      loop_control:
        label: "{{ item.cert_dir }}/ca.crt"

    - name: Display certificate summary
      debug:
        msg: |
          IdM CA Certificates Issued:
          {% for cert in idm_service_certs %}
            {{ cert.hostname }} → {{ cert.cert_dir }}/server.crt
          {% endfor %}
