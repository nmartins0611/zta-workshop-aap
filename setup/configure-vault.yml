---
# Pre-workshop setup: Configure Vault secrets engines, policies, and base secrets
- name: Configure HashiCorp Vault for Workshop
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault with userpass
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
        status_code: 200
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"

  tasks:
    # ── KV Secrets Engine ──
    - name: Enable KV v2 secrets engine
      command: vault secrets enable -path={{ vault_kv_secrets_path }} -version=2 kv
      environment: "{{ vault_env }}"
      register: kv_enable
      changed_when: kv_enable.rc == 0
      failed_when: kv_enable.rc != 0 and 'already in use' not in kv_enable.stderr

    - name: Store network device credentials (Arista cEOS)
      command: >
        vault kv put {{ vault_kv_secrets_path }}/network/arista
        username=admin
        password=admin
        transport=eapi
      environment: "{{ vault_env }}"

    - name: Store database admin credentials
      command: >
        vault kv put {{ vault_kv_secrets_path }}/db/admin
        username={{ db_admin_user }}
        password={{ db_admin_password }}
        host={{ db_host }}
        port={{ db_port }}
      environment: "{{ vault_env }}"

    - name: Store IdM service credentials
      command: >
        vault kv put {{ vault_kv_secrets_path }}/idm/admin
        username=admin
        password={{ idm_admin_password }}
        realm={{ idm_realm }}
      environment: "{{ vault_env }}"

    # ── Database Secrets Engine ──
    - name: Enable database secrets engine
      command: vault secrets enable -path={{ vault_db_secrets_path }} database
      environment: "{{ vault_env }}"
      register: db_enable
      changed_when: db_enable.rc == 0
      failed_when: db_enable.rc != 0 and 'already in use' not in db_enable.stderr

    - name: Configure PostgreSQL connection in Vault
      command: >
        vault write {{ vault_db_secrets_path }}/config/ztaapp-postgres
        plugin_name=postgresql-database-plugin
        allowed_roles="{{ vault_db_role_name }}"
        connection_url="postgresql://{{ '{{username}}' }}:{{ '{{password}}' }}@{{ hostvars['db']['ansible_host'] }}:{{ db_port }}/{{ db_name }}?sslmode=disable"
        username="{{ db_admin_user }}"
        password="{{ db_admin_password }}"
      environment: "{{ vault_env }}"

    - name: Create short-lived database role
      command: >
        vault write {{ vault_db_secrets_path }}/roles/{{ vault_db_role_name }}
        db_name=ztaapp-postgres
        creation_statements="CREATE ROLE \"{{ '{{name}}' }}\" WITH LOGIN PASSWORD '{{ '{{password}}' }}' VALID UNTIL '{{ '{{expiration}}' }}'; GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA public TO \"{{ '{{name}}' }}\";"
        revocation_statements="DROP ROLE IF EXISTS \"{{ '{{name}}' }}\";"
        default_ttl="{{ vault_db_default_ttl }}"
        max_ttl="{{ vault_db_max_ttl }}"
      environment: "{{ vault_env }}"

    # ── SSH Secrets Engine (Signed Certificates for RHEL access) ──
    - name: Enable SSH secrets engine
      command: "vault secrets enable -path={{ vault_ssh_secrets_path }} ssh"
      environment: "{{ vault_env }}"
      register: ssh_enable
      changed_when: ssh_enable.rc == 0
      failed_when: ssh_enable.rc != 0 and 'already in use' not in ssh_enable.stderr

    - name: Configure Vault as SSH Certificate Authority
      command: "vault write {{ vault_ssh_secrets_path }}/config/ca generate_signing_key=true"
      environment: "{{ vault_env }}"
      register: ssh_ca_config
      changed_when: ssh_ca_config.rc == 0
      failed_when: ssh_ca_config.rc != 0 and 'already configured' not in ssh_ca_config.stderr

    - name: Create SSH certificate signing role
      command: >
        vault write {{ vault_ssh_secrets_path }}/roles/{{ vault_ssh_role_name }}
        key_type=ca
        algorithm_signer=rsa-sha2-256
        allow_user_certificates=true
        allowed_users="{{ vault_ssh_allowed_users }}"
        default_user=rhel
        ttl={{ vault_ssh_ttl }}
        max_ttl={{ vault_ssh_max_ttl }}
      environment: "{{ vault_env }}"

    - name: Fetch SSH CA public key
      command: "vault read -field=public_key {{ vault_ssh_secrets_path }}/config/ca"
      environment: "{{ vault_env }}"
      register: ssh_ca_pubkey
      changed_when: false

    # ── Vault Policies ──
    - name: Write app-deployer policy
      copy:
        dest: /tmp/vault-policy-app-deployer.hcl
        content: |
          path "{{ vault_db_secrets_path }}/creds/{{ vault_db_role_name }}" {
            capabilities = ["read"]
          }
          path "{{ vault_kv_secrets_path }}/data/db/*" {
            capabilities = ["read"]
          }
        mode: '0644'

    - name: Write network-admin policy
      copy:
        dest: /tmp/vault-policy-network-admin.hcl
        content: |
          path "{{ vault_kv_secrets_path }}/data/network/*" {
            capabilities = ["read"]
          }
        mode: '0644'

    - name: Write patch-admin policy
      copy:
        dest: /tmp/vault-policy-patch-admin.hcl
        content: |
          path "{{ vault_kv_secrets_path }}/data/idm/*" {
            capabilities = ["read"]
          }
        mode: '0644'

    - name: Write ssh-access policy
      copy:
        dest: /tmp/vault-policy-ssh-access.hcl
        content: |
          path "{{ vault_ssh_secrets_path }}/sign/{{ vault_ssh_role_name }}" {
            capabilities = ["create", "update"]
          }
          path "{{ vault_ssh_secrets_path }}/issue/{{ vault_ssh_role_name }}" {
            capabilities = ["create", "update"]
          }
          path "{{ vault_ssh_secrets_path }}/roles/{{ vault_ssh_role_name }}" {
            capabilities = ["read"]
          }
          path "{{ vault_ssh_secrets_path }}/config/ca" {
            capabilities = ["read"]
          }
          path "{{ vault_ssh_secrets_path }}/public_key" {
            capabilities = ["read"]
          }
        mode: '0644'

    - name: Apply Vault policies
      command: "vault policy write {{ item.name }} {{ item.file }}"
      environment: "{{ vault_env }}"
      loop:
        - { name: app-deployer, file: /tmp/vault-policy-app-deployer.hcl }
        - { name: network-admin, file: /tmp/vault-policy-network-admin.hcl }
        - { name: patch-admin, file: /tmp/vault-policy-patch-admin.hcl }
        - { name: ssh-access, file: /tmp/vault-policy-ssh-access.hcl }
      loop_control:
        label: "{{ item.name }}"

    - name: Clean up temp policy files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/vault-policy-app-deployer.hcl
        - /tmp/vault-policy-network-admin.hcl
        - /tmp/vault-policy-patch-admin.hcl
        - /tmp/vault-policy-ssh-access.hcl

    # ── Vault userpass accounts for workshop users ──
    # Each IdM user that runs Section 2+ workflows needs a matching Vault
    # userpass account bound to the appropriate policy.  Without these,
    # the workflow falls back to admin (root token) and policy-break
    # exercises have no effect.
    - name: Create Vault userpass accounts for workshop users
      command: >
        vault write auth/userpass/users/{{ item.username }}
        password={{ item.password }}
        policies={{ item.policies }}
      environment: "{{ vault_env }}"
      loop:
        - username: appdev
          password: "{{ idm_admin_password }}"
          policies: app-deployer
        - username: neteng
          password: "{{ idm_admin_password }}"
          policies: network-admin
        - username: secops
          password: "{{ idm_admin_password }}"
          policies: "app-deployer,network-admin"
      loop_control:
        label: "{{ item.username }} → {{ item.policies }}"
      no_log: false

    # ── Vault Userpass Accounts for Workshop Users ──
    # Maps IdM group membership to Vault policies so each user gets
    # least-privilege access.  Required for the "Break Vault Policy"
    # exercise (section2/playbooks/create-db-credential-user.yml).
    - name: Create Vault userpass accounts for IdM workshop users
      command: >
        vault write auth/userpass/users/{{ item.uid }}
        password={{ idm_admin_password }}
        policies={{
          (
            (['app-deployer'] if 'app-deployers' in (item.groups | default([])) else [])
            + (['network-admin'] if 'network-admins' in (item.groups | default([])) else [])
            + (['patch-admin'] if 'patch-admins' in (item.groups | default([])) else [])
            + (['ssh-access'] if 'zta-admins' in (item.groups | default([])) else [])
          ) | join(',') | default('default', true)
        }}
      environment: "{{ vault_env }}"
      loop: "{{ idm_users }}"
      loop_control:
        label: "{{ item.uid }}"
      changed_when: true

    - name: Display Vault configuration summary
      debug:
        msg: |
          ═══════════════════════════════════════════
            Vault Configuration Complete
          ═══════════════════════════════════════════
          KV Secrets:
            - {{ vault_kv_secrets_path }}/network/arista
            - {{ vault_kv_secrets_path }}/db/admin
            - {{ vault_kv_secrets_path }}/idm/admin

          Database Engine:
            - Path: {{ vault_db_secrets_path }}
            - Role: {{ vault_db_role_name }}
            - TTL:  {{ vault_db_default_ttl }} (max {{ vault_db_max_ttl }})

          SSH Certificate Authority:
            - Path: {{ vault_ssh_secrets_path }}
            - Role: {{ vault_ssh_role_name }}
            - TTL:  {{ vault_ssh_ttl }} (max {{ vault_ssh_max_ttl }})
            - Users: {{ vault_ssh_allowed_users }}

          Policies:
            - app-deployer  (DB creds read)
            - network-admin (network creds read)
            - patch-admin   (IdM creds read)
            - ssh-access    (SSH cert signing)
          ═══════════════════════════════════════════
