# ZTA Workshop Inventory
#
# ansible_host values are IP addresses so that playbooks work
# before IdM DNS is configured. After configure-dns.yml runs,
# *.zta.lab names resolve via IdM DNS and /etc/hosts.

[zta_services]
central ansible_host=192.168.1.11

[vault_servers]
vault ansible_host=192.168.1.12

[netbox_servers]
netbox ansible_host=192.168.1.15

[wazuh_servers]
wazuh ansible_host=192.168.1.13

[gitea_servers]
gitea ansible_host=192.168.1.11

[automation]
control ansible_host=192.168.1.10

[app_servers]
app ansible_host=192.168.1.14

[db_servers]
db ansible_host=192.168.1.14

[network]
switch01 ansible_host=192.168.1.11

# SPIRE Agent hosts — receive workload identity SVIDs.
# The SPIRE Server runs on central (zta_services).
[spire_agents:children]
automation
db_servers
vault_servers

# All Linux hosts except central (IdM server) and the Cisco switch.
# Used by setup/enroll-idm-clients.yml.
[idm_clients:children]
vault_servers
netbox_servers
wazuh_servers
gitea_servers
automation
app_servers
db_servers

[all:vars]
ansible_user=rhel
ansible_password=ansible123!
ansible_become_password=ansible123!
ansible_python_interpreter=/usr/bin/python3

[network:vars]
ansible_user=admin
ansible_password=cisco123!
ansible_network_os=cisco.ios.ios
ansible_connection=ansible.netcommon.network_cli
