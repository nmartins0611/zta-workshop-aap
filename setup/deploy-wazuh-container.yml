---
# Deploy Wazuh (Manager + Indexer + Dashboard) as containers on central
#
# Services exposed:
#   - Dashboard:         https://central.zta.lab:5601
#   - Manager API:       https://central.zta.lab:55000
#   - Agent enrollment:  central.zta.lab:1515
#   - Agent comms:       central.zta.lab:1514
#   - Indexer API:       https://central.zta.lab:9200
#
# Credentials:
#   - Dashboard/Indexer: admin / SecretPassword
#   - Manager API:       wazuh / <wazuh_api_password>
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/deploy-wazuh-container.yml

- name: Deploy Wazuh Containers
  hosts: zta_services
  become: true
  gather_facts: true

  vars:
    wazuh_version: "4.9.2"
    wazuh_data_dir: /opt/wazuh-docker
    wazuh_pod_name: wazuh
    wazuh_indexer_password: SecretPassword
    wazuh_api_user: wazuh
    wazuh_api_password: "x8.E0+DZi6zCCz3cG9jvXimSBn5+s4tx"

    wazuh_images:
      manager: "docker.io/wazuh/wazuh-manager:{{ wazuh_version }}"
      indexer: "docker.io/wazuh/wazuh-indexer:{{ wazuh_version }}"
      dashboard: "docker.io/wazuh/wazuh-dashboard:{{ wazuh_version }}"

  tasks:
    # ═══════════════════════════════════════════════════════════════════
    # Phase 1 — Prerequisites
    # ═══════════════════════════════════════════════════════════════════

    - name: Ensure podman and openssl are installed
      dnf:
        name:
          - podman
          - python3-podman
          - openssl
        state: present

    - name: Create Wazuh persistent directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ wazuh_data_dir }}"
        - "{{ wazuh_data_dir }}/certs"
        - "{{ wazuh_data_dir }}/manager/logs"
        - "{{ wazuh_data_dir }}/manager/queue"
        - "{{ wazuh_data_dir }}/indexer/data"
        - "{{ wazuh_data_dir }}/dashboard-config"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 2 — Generate certs with EXACT names the Wazuh images expect
    #
    # Indexer image expects in /usr/share/wazuh-indexer/certs/:
    #   wazuh.indexer.pem, wazuh.indexer.key, root-ca.pem,
    #   admin.pem, admin-key.pem
    #
    # Dashboard image expects in /usr/share/wazuh-dashboard/certs/:
    #   wazuh-dashboard.pem, wazuh-dashboard-key.pem, root-ca.pem
    #
    # Indexer opensearch.yml nodes_dn expects:
    #   CN=wazuh.indexer,OU=Wazuh,O=Wazuh,L=California,C=US
    # ═══════════════════════════════════════════════════════════════════

    - name: Generate CA private key
      command: >
        openssl genrsa -out {{ wazuh_data_dir }}/certs/root-ca.key 2048
      args:
        creates: "{{ wazuh_data_dir }}/certs/root-ca.key"

    - name: Generate CA certificate
      command: >
        openssl req -new -x509 -sha256
        -key {{ wazuh_data_dir }}/certs/root-ca.key
        -out {{ wazuh_data_dir }}/certs/root-ca.pem
        -days 3650
        -subj "/C=US/L=California/O=Wazuh/OU=Wazuh/CN=Wazuh Root CA"
      args:
        creates: "{{ wazuh_data_dir }}/certs/root-ca.pem"

    - name: Generate component certificates
      shell: |
        cd {{ wazuh_data_dir }}/certs

        openssl genrsa -out {{ item.file }}.key 2048
        openssl req -new \
          -key {{ item.file }}.key \
          -out {{ item.file }}.csr \
          -subj "/C=US/L=California/O=Wazuh/OU=Wazuh/CN={{ item.cn }}"

        cat > {{ item.file }}-ext.cnf <<EXTEOF
        subjectAltName = DNS:{{ item.cn }},DNS:localhost,IP:127.0.0.1,IP:{{ ansible_default_ipv4.address }}
        EXTEOF

        openssl x509 -req \
          -in {{ item.file }}.csr \
          -CA root-ca.pem \
          -CAkey root-ca.key \
          -CAcreateserial \
          -out {{ item.file }}.pem \
          -days 3650 \
          -sha256 \
          -extfile {{ item.file }}-ext.cnf
      args:
        creates: "{{ wazuh_data_dir }}/certs/{{ item.file }}.pem"
      loop:
        - { file: wazuh.indexer,   cn: wazuh.indexer }
        - { file: wazuh-dashboard, cn: wazuh.dashboard }
        - { file: admin,           cn: admin }

    - name: Create key symlinks matching image expectations
      file:
        src: "{{ wazuh_data_dir }}/certs/{{ item.src }}"
        dest: "{{ wazuh_data_dir }}/certs/{{ item.dest }}"
        state: link
        force: true
      loop:
        - { src: admin.key,           dest: admin-key.pem }
        - { src: wazuh-dashboard.key, dest: wazuh-dashboard-key.pem }

    - name: Set cert ownership to UID 1000 (wazuh-indexer)
      file:
        path: "{{ wazuh_data_dir }}/certs"
        recurse: true
        owner: "1000"
        group: "1000"

    - name: Set cert file permissions
      shell: |
        chmod 644 {{ wazuh_data_dir }}/certs/*.pem
        chmod 640 {{ wazuh_data_dir }}/certs/*.key

    - name: Apply SELinux context
      command: chcon -R -t container_file_t {{ wazuh_data_dir }}
      changed_when: true

    # ═══════════════════════════════════════════════════════════════════
    # Phase 3 — Dashboard config
    # ═══════════════════════════════════════════════════════════════════

    - name: Write opensearch_dashboards.yml
      copy:
        dest: "{{ wazuh_data_dir }}/dashboard-config/opensearch_dashboards.yml"
        mode: '0644'
        content: |
          server.host: 0.0.0.0
          server.port: 5601
          opensearch.hosts: https://localhost:9200
          opensearch.ssl.verificationMode: none
          opensearch.requestHeadersAllowlist: ["securitytenant","Authorization"]
          opensearch_security.multitenancy.enabled: false
          opensearch_security.readonly_mode.roles: ["kibana_read_only"]
          server.ssl.enabled: true
          server.ssl.key: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem"
          server.ssl.certificate: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem"
          opensearch.ssl.certificateAuthorities: ["/usr/share/wazuh-dashboard/certs/root-ca.pem"]
          uiSettings.overrides.defaultRoute: /app/wz-home

    # ═══════════════════════════════════════════════════════════════════
    # Phase 4 — Clean up any existing deployment
    # ═══════════════════════════════════════════════════════════════════

    - name: Stop and remove existing Wazuh pod
      command: "podman pod rm -f {{ wazuh_pod_name }}"
      failed_when: false
      changed_when: false

    # ═══════════════════════════════════════════════════════════════════
    # Phase 5 — Pull images
    # ═══════════════════════════════════════════════════════════════════

    - name: Pull Wazuh container images
      command: "podman pull {{ item }}"
      loop:
        - "{{ wazuh_images.indexer }}"
        - "{{ wazuh_images.manager }}"
        - "{{ wazuh_images.dashboard }}"
      register: pull_results
      changed_when: "'Pulling' in pull_results.stdout or pull_results.rc == 0"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 6 — Create pod and start containers
    # ═══════════════════════════════════════════════════════════════════

    - name: Create Wazuh pod with published ports
      command: >
        podman pod create
        --name {{ wazuh_pod_name }}
        --hostname wazuh.zta.lab
        -p 9200:9200
        -p 55000:55000
        -p 1514:1514
        -p 1515:1515
        -p 5601:5601

    # ── Wazuh Indexer ──
    # Mount entire certs directory — avoids Podman overlay conflicts
    # from multiple individual file mounts into the same container path.
    - name: Start Wazuh Indexer container
      shell: >
        podman run -d
        --name wazuh-indexer
        --pod {{ wazuh_pod_name }}
        --restart always
        -v {{ wazuh_data_dir }}/indexer/data:/var/lib/wazuh-indexer:z
        -v {{ wazuh_data_dir }}/certs:/usr/share/wazuh-indexer/certs:z
        -e 'OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g'
        -e 'bootstrap.memory_lock=true'
        -e 'discovery.type=single-node'
        {{ wazuh_images.indexer }}

    - name: Wait for Wazuh Indexer to be ready
      uri:
        url: "https://localhost:9200"
        method: GET
        user: admin
        password: "{{ wazuh_indexer_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200]
      register: indexer_health
      until: indexer_health.status == 200
      retries: 60
      delay: 10

    - name: Clear any cluster index-creation blocks
      uri:
        url: "https://localhost:9200/_cluster/settings"
        method: PUT
        user: admin
        password: "{{ wazuh_indexer_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          persistent:
            cluster.blocks.create_index: null
            cluster.blocks.read_only_allow_delete: null
        status_code: [200]

    # ── Wazuh Manager ──
    - name: Start Wazuh Manager container
      shell: >
        podman run -d
        --name wazuh-manager
        --pod {{ wazuh_pod_name }}
        --restart always
        -v {{ wazuh_data_dir }}/manager/logs:/var/ossec/logs:z
        -v {{ wazuh_data_dir }}/manager/queue:/var/ossec/queue:z
        -v {{ wazuh_data_dir }}/certs/root-ca.pem:/etc/ssl/root-ca.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/wazuh.indexer.pem:/etc/ssl/filebeat.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/wazuh.indexer.key:/etc/ssl/filebeat.key:ro,z
        -e INDEXER_URL=https://localhost:9200
        -e INDEXER_USERNAME=admin
        -e INDEXER_PASSWORD={{ wazuh_indexer_password }}
        -e 'FILEBEAT_SSL_VERIFICATION_MODE=none'
        -e API_USERNAME={{ wazuh_api_user }}
        -e 'API_PASSWORD={{ wazuh_api_password }}'
        {{ wazuh_images.manager }}

    - name: Wait for Wazuh Manager API
      uri:
        url: "https://localhost:55000"
        method: GET
        validate_certs: false
        status_code: [200, 401]
      register: manager_health
      until: manager_health.status in [200, 401]
      retries: 30
      delay: 5

    # ── Wazuh Dashboard ──
    - name: Start Wazuh Dashboard container
      shell: >
        podman run -d
        --name wazuh-dashboard
        --pod {{ wazuh_pod_name }}
        --restart always
        -v {{ wazuh_data_dir }}/certs:/usr/share/wazuh-dashboard/certs:ro,z
        -v {{ wazuh_data_dir }}/dashboard-config/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro,z
        -e INDEXER_USERNAME=admin
        -e INDEXER_PASSWORD={{ wazuh_indexer_password }}
        -e WAZUH_API_URL=https://localhost
        -e DASHBOARD_USERNAME=kibanaserver
        -e DASHBOARD_PASSWORD=kibanaserver
        -e API_USERNAME={{ wazuh_api_user }}
        -e 'API_PASSWORD={{ wazuh_api_password }}'
        {{ wazuh_images.dashboard }}

    - name: Wait for Wazuh Dashboard
      uri:
        url: "https://localhost:5601"
        method: GET
        validate_certs: false
        status_code: [200, 302]
      register: dashboard_health
      until: dashboard_health.status in [200, 302]
      retries: 40
      delay: 10

    # ═══════════════════════════════════════════════════════════════════
    # Phase 7 — Verification
    # ═══════════════════════════════════════════════════════════════════

    # - name: Open Wazuh firewall ports
    #   firewalld:
    #     port: "{{ item }}"
    #     permanent: true
    #     immediate: true
    #     state: enabled
    #   loop:
    #     - 9200/tcp
    #     - 55000/tcp
    #     - 1514/tcp
    #     - 1515/tcp
    #     - 5601/tcp

    - name: List containers in the pod
      command: "podman ps --pod --filter pod={{ wazuh_pod_name }} --format '{{ '{{' }}.Names{{ '}}' }}  {{ '{{' }}.Status{{ '}}' }}'"
      register: container_list
      changed_when: false

    - name: Display Wazuh deployment summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║        Wazuh Stack — Container Deployment Complete            ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  Dashboard:   https://central.zta.lab:5601                   ║
          ║  Manager API: https://central.zta.lab:55000                  ║
          ║  Agent Port:  central.zta.lab:1514 (TCP)                     ║
          ║  Enrollment:  central.zta.lab:1515                           ║
          ║  Indexer API: https://central.zta.lab:9200                   ║
          ║                                                              ║
          ║  Credentials:                                                ║
          ║    Dashboard:  admin / {{ wazuh_indexer_password }}
          ║    Manager:    {{ wazuh_api_user }} / {{ wazuh_api_password }}
          ║    Indexer:    admin / {{ wazuh_indexer_password }}
          ║                                                              ║
          ║  Containers:                                                 ║
          {% for line in container_list.stdout_lines %}
          ║    {{ line }}
          {% endfor %}
          ║                                                              ║
          ║  Data:        {{ wazuh_data_dir }}
          ║  Certs:       {{ wazuh_data_dir }}/certs/
          ║                                                              ║
          ╚════════════════════════════════════════════════════════════════╝
