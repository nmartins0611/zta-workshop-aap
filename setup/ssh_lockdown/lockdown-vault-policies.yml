---
# SSH Lockdown — Layer 3: Vault Credential Restriction
#
# Ensure only AAP (via AppRole) can generate secrets.  Humans logged in
# via userpass can browse policies and view health but CANNOT request
# dynamic credentials (SSH OTP, DB creds).
#
# This playbook:
#   1. Enables the AppRole auth backend
#   2. Creates an 'aap-automation' Vault policy (full secret access)
#   3. Creates a 'human-readonly' Vault policy (deny credential generation)
#   4. Creates an AppRole for AAP with the automation policy
#   5. Updates the 'admin' userpass account to use the readonly policy
#   6. Outputs the AppRole role-id and secret-id for AAP configuration

- name: "SSH Lockdown | Layer 3 — Vault: Restrict Credential Generation"
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default(idm_admin_password, true) }}"

  pre_tasks:
    - name: Authenticate to Vault with userpass
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
      register: vault_login
      delegate_to: localhost

    - name: Set Vault token from login
      set_fact:
        vault_env:
          VAULT_ADDR: "{{ vault_addr }}"
          VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
          VAULT_TOKEN: "{{ vault_login.json.auth.client_token }}"

    approle_name: aap-automation
    approle_policies:
      - app-deployer
      - network-admin
      - patch-admin
      - ssh-access
      - aap-automation

  tasks:
    # ── 1. AAP automation policy — full secret access ──
    - name: Write aap-automation policy file
      copy:
        dest: /tmp/vault-policy-aap-automation.hcl
        content: |
          # AAP Automation — can generate all dynamic credentials
          path "{{ vault_db_secrets_path }}/creds/*" {
            capabilities = ["read"]
          }
          path "{{ vault_ssh_secrets_path }}/creds/*" {
            capabilities = ["create", "update"]
          }
          path "{{ vault_ssh_secrets_path }}/roles/*" {
            capabilities = ["read"]
          }
          path "{{ vault_kv_secrets_path }}/data/*" {
            capabilities = ["read", "list"]
          }
          path "sys/leases/revoke" {
            capabilities = ["update"]
          }
          path "sys/leases/revoke-prefix/*" {
            capabilities = ["update"]
          }
          path "sys/policies/acl/*" {
            capabilities = ["read", "list"]
          }
        mode: '0644'

    # ── 2. Human readonly policy — deny credential generation ──
    - name: Write human-readonly policy file
      copy:
        dest: /tmp/vault-policy-human-readonly.hcl
        content: |
          # Human operators — can inspect but NOT generate secrets
          # SSH OTPs: DENIED
          path "{{ vault_ssh_secrets_path }}/creds/*" {
            capabilities = ["deny"]
          }

          # Database credentials: DENIED
          path "{{ vault_db_secrets_path }}/creds/*" {
            capabilities = ["deny"]
          }

          # Can view roles and configuration (for troubleshooting)
          path "{{ vault_ssh_secrets_path }}/roles/*" {
            capabilities = ["read", "list"]
          }
          path "{{ vault_db_secrets_path }}/roles/*" {
            capabilities = ["read", "list"]
          }
          path "{{ vault_db_secrets_path }}/config/*" {
            capabilities = ["read", "list"]
          }

          # Can read KV secrets (non-dynamic, for verification)
          path "{{ vault_kv_secrets_path }}/data/*" {
            capabilities = ["read", "list"]
          }
          path "{{ vault_kv_secrets_path }}/metadata/*" {
            capabilities = ["read", "list"]
          }

          # Can view policies and system health
          path "sys/policies/acl/*" {
            capabilities = ["read", "list"]
          }
          path "sys/health" {
            capabilities = ["read"]
          }
          path "sys/mounts" {
            capabilities = ["read"]
          }

          # Can view active leases but NOT revoke
          path "sys/leases/lookup" {
            capabilities = ["update"]
          }
        mode: '0644'

    # ── 3. Apply policies ──
    - name: Apply Vault policies
      command: "vault policy write {{ item.name }} {{ item.file }}"
      environment: "{{ vault_env }}"
      loop:
        - { name: aap-automation, file: /tmp/vault-policy-aap-automation.hcl }
        - { name: human-readonly, file: /tmp/vault-policy-human-readonly.hcl }
      loop_control:
        label: "{{ item.name }}"

    # ── 4. Enable AppRole auth ──
    - name: Enable AppRole auth method
      command: vault auth enable approle
      environment: "{{ vault_env }}"
      register: approle_enable
      changed_when: approle_enable.rc == 0
      failed_when: approle_enable.rc != 0 and 'already in use' not in approle_enable.stderr

    # ── 5. Create AAP AppRole ──
    - name: Create AAP automation AppRole
      command: >
        vault write auth/approle/role/{{ approle_name }}
        token_policies="{{ approle_policies | join(',') }}"
        token_ttl=1h
        token_max_ttl=4h
        secret_id_ttl=0
        secret_id_num_uses=0
      environment: "{{ vault_env }}"

    - name: Read AppRole role-id
      command: "vault read -format=json auth/approle/role/{{ approle_name }}/role-id"
      environment: "{{ vault_env }}"
      register: role_id_raw
      changed_when: false

    - name: Generate AppRole secret-id
      command: "vault write -format=json -f auth/approle/role/{{ approle_name }}/secret-id"
      environment: "{{ vault_env }}"
      register: secret_id_raw
      changed_when: false

    - name: Extract AppRole credentials
      set_fact:
        aap_role_id: "{{ (role_id_raw.stdout | from_json).data.role_id }}"
        aap_secret_id: "{{ (secret_id_raw.stdout | from_json).data.secret_id }}"

    # ── 6. Update userpass/admin to use the readonly policy ──
    - name: Restrict admin userpass to human-readonly policy
      command: >
        vault write auth/userpass/users/admin
        password=ansible123!
        policies=human-readonly
      environment: "{{ vault_env }}"

    # ── 7. Clean up ──
    - name: Clean up temp policy files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/vault-policy-aap-automation.hcl
        - /tmp/vault-policy-human-readonly.hcl

    # ── Summary ──
    - name: Display Vault lockdown summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║        Vault Credential Lockdown — Complete                   ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  AAP AppRole:                                                ║
          ║    Role:       {{ approle_name }}║
          ║    Role ID:    {{ aap_role_id }}║
          ║    Secret ID:  {{ aap_secret_id }}║
          ║    Policies:   {{ approle_policies | join(', ') }}║
          ║    Token TTL:  1h (max 4h)                                   ║
          ║                                                              ║
          ║  Human (admin/userpass):                                      ║
          ║    Policy:     human-readonly                                 ║
          ║    Can do:     View roles, configs, policies, KV secrets      ║
          ║    CANNOT do:  Generate SSH OTPs or DB credentials            ║
          ║                                                              ║
          ║  ┌────────────────────────────────────────────────────────┐   ║
          ║  │  IMPORTANT: Configure AAP with these AppRole creds:   │   ║
          ║  │                                                        │   ║
          ║  │  AAP → Credentials → HashiCorp Vault                  │   ║
          ║  │    Auth method: AppRole                                │   ║
          ║  │    Role ID:     {{ aap_role_id }}│   ║
          ║  │    Secret ID:   {{ aap_secret_id }}│   ║
          ║  └────────────────────────────────────────────────────────┘   ║
          ╚════════════════════════════════════════════════════════════════╝
