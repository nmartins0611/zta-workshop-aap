---
# ── Lab Identity ─────────────────────────────────────────────────────
# Auto-discovered from the target VM's facts.  Override at runtime:
#   ansible-playbook <playbook> -e idm_domain=custom.lab

idm_hostname: central.zta.lab
idm_domain: zta.lab
idm_realm: "{{ idm_domain | upper }}"
idm_admin_password: ansible123!
idm_dm_password: ansible123!

# ── OPA (Open Policy Agent) — runs on central alongside IdM ─────────
opa_url: "http://central.zta.lab:8181"
opa_container_name: opa
opa_policy_dir: /opt/opa/policies

# ── HashiCorp Vault (own VM) ────────────────────────────────────────
vault_addr: "http://vault.zta.lab:8200"
vault_skip_verify: true

# ── Netbox / CMDB (own VM) ──────────────────────────────────────────
netbox_url: "http://netbox.zta.lab:8880"
netbox_token: "{{ lookup('env', 'NETBOX_TOKEN') }}"

# ── Gitea / Git Server (managed manually, not by automation) ────────
gitea_url: "http://gitea.zta.lab:3000"

# ── Wazuh / SIEM (own VM) ──────────────────────────────────────────
wazuh_url: "http://wazuh.zta.lab:5601"
wazuh_api_url: "https://wazuh.zta.lab:55000"
wazuh_api_user: wazuh
wazuh_api_password: "x8.E0+DZi6zCCz3cG9jvXimSBn5+s4tx"
wazuh_manager_host: wazuh.zta.lab

# ── Splunk (container on central) ───────────────────────────────────
splunk_url: "http://splunk.zta.lab:8000"
splunk_hec_url: "https://splunk.zta.lab:8088"
splunk_hec_token: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

# ── Keycloak (container on central) ─────────────────────────────────
keycloak_url: "https://keycloak.zta.lab:8543"

# ── AAP Controller (own VM) ─────────────────────────────────────────
aap_controller_url: "https://aap.zta.lab"
aap_validate_certs: false

# ── Arista cEOS Switches (containers on central) ──────────────────
# Replaced Cisco Catalyst 8000v with 3 containerized Arista cEOS switches.
# Management access is via published ports on central's 192.168.1.x address.
arista_switches:
  ceos1:
    role: spine
    ssh_port: 2001
    eapi_port: 6031
  ceos2:
    role: leaf-data-tier
    ssh_port: 2002
    eapi_port: 6032
  ceos3:
    role: leaf-app-tier
    ssh_port: 2003
    eapi_port: 6033

# ── Database / PostgreSQL (container on central) ───────────────────
# Management plane: accessible via central.zta.lab:5432 / SSH port 2022
# Data plane: 10.30.0.10 on net2 (routed through ceos2)
db_host: db.zta.lab
db_port: 5432
db_name: ztaapp
db_admin_user: postgres
db_admin_password: "{{ lookup('env', 'DB_ADMIN_PASSWORD') | default('postgres123!', true) }}"
db_data_ip: "10.30.0.10"

# ── Application Server (container on central) ─────────────────────
# Management plane: accessible via central.zta.lab:8081 / SSH port 2023
# Data plane: 10.20.0.10 on net3 (routed through ceos3)
app_host: app.zta.lab
app_port: 8081
app_deploy_dir: /opt/ztaapp
app_data_ip: "10.20.0.10"

# ── IdM Teams (organisational units) ────────────────────────────────
idm_teams:
  - name: team-infrastructure
    description: Infrastructure & Platform Engineering
  - name: team-devops
    description: DevOps & CI/CD
  - name: team-security
    description: Security Operations & Compliance
  - name: team-applications
    description: Application Development

# ── IdM Functional Groups (used in OPA policies for RBAC) ──────────
idm_groups:
  - name: zta-admins
    description: ZTA Lab Administrators — full access
  - name: patch-admins
    description: Server patching operators
  - name: network-admins
    description: Network configuration operators
  - name: app-deployers
    description: Application deployment operators
  - name: security-ops
    description: Security operations — Wazuh, audit, compliance
  - name: db-admins
    description: Database administration
  - name: change-approvers
    description: Can approve maintenance windows and change requests

