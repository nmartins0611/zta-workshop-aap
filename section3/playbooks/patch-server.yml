---
# Section 3: OPA-gated server patching
# This playbook checks OPA policy before patching. All three conditions
# must be met: user in patch-admins, server Active in CMDB, maintenance approved.
- name: "Pre-check: Validate Patching Policy with OPA"
  hosts: zta_services
  become: false
  gather_facts: false

  vars:
    target_host: "{{ target_host | default('app') }}"
    patching_user: "{{ awx_user_name | default('ztauser') }}"
    patching_user_groups: "{{ awx_user_groups | default(['zta-admins', 'patch-admins']) }}"

  tasks:
    - name: Look up target server in Netbox
      uri:
        url: "{{ netbox_url }}/api/dcim/devices/?name={{ target_host }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
      register: netbox_device

    - name: Parse Netbox device info
      set_fact:
        server_status: "{{ netbox_device.json.results[0].status.label | default('Unknown') }}"
        maintenance_approved: "{{ netbox_device.json.results[0].custom_fields.maintenance_approved | default(false) }}"
      when: netbox_device.json.count > 0

    - name: Fail if server not found in CMDB
      fail:
        msg: "Target server '{{ target_host }}' not found in Netbox CMDB. Cannot proceed."
      when: netbox_device.json.count == 0

    - name: Query OPA patching policy
      uri:
        url: "{{ opa_url }}/v1/data/zta/patching/decision"
        method: POST
        body_format: json
        body:
          input:
            user: "{{ patching_user }}"
            user_groups: "{{ patching_user_groups }}"
            target_server: "{{ target_host }}.{{ idm_domain }}"
            target_server_status: "{{ server_status }}"
            maintenance_approved: "{{ maintenance_approved | bool }}"
      register: opa_decision

    - name: Display OPA decision details
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║       OPA Patching Policy Decision                      ║
          ╠════════════════════════════════════════════════════════════╣
          ║                                                          ║
          ║  User:    {{ patching_user | ljust(46) }}║
          ║  Target:  {{ (target_host + '.' + idm_domain) | ljust(46) }}║
          ║  Result:  {{ ('ALLOWED' if opa_decision.json.result.allow else 'DENIED') | ljust(46) }}║
          ║                                                          ║
          ║  Conditions:                                             ║
          ║    User in patch-admins:    {{ ('PASS' if opa_decision.json.result.conditions.user_authorized else 'FAIL') | ljust(30) }}║
          ║    Server active in CMDB:   {{ ('PASS' if opa_decision.json.result.conditions.server_active else 'FAIL') | ljust(30) }}║
          ║    Maintenance approved:    {{ ('PASS' if opa_decision.json.result.conditions.maintenance_approved else 'FAIL') | ljust(30) }}║
          ║                                                          ║
          ║  {{ opa_decision.json.result.reason | ljust(56) }}║
          ╚════════════════════════════════════════════════════════════╝

    - name: Enforce OPA decision
      assert:
        that:
          - opa_decision.json.result.allow == true
        fail_msg: |
          PATCHING DENIED by OPA policy.
          Reason: {{ opa_decision.json.result.reason }}

          To fix this, check the failing condition:
          {% if not opa_decision.json.result.conditions.user_authorized %}
          → Add the user to the 'patch-admins' group in IdM
          {% endif %}
          {% if not opa_decision.json.result.conditions.server_active %}
          → Set the server status to 'Active' in Netbox
          {% endif %}
          {% if not opa_decision.json.result.conditions.maintenance_approved %}
          → Set 'maintenance_approved' to true in Netbox for this device
          {% endif %}
        success_msg: "OPA policy check PASSED — proceeding with patching"

    - name: Store OPA approval for patching play
      set_fact:
        opa_approved: true
      delegate_to: localhost
      delegate_facts: true

- name: Patch Server
  hosts: "{{ target_host | default('app') }}"
  become: true
  gather_facts: true
  when: hostvars['localhost']['opa_approved'] | default(false)

  tasks:
    - name: Check for available updates
      dnf:
        list: updates
      register: available_updates

    - name: Display available updates
      debug:
        msg: "{{ available_updates.results | length }} packages available for update"

    - name: Install security updates
      dnf:
        name: "*"
        state: latest
        security: true
      register: patch_result

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_flag
      failed_when: false

    - name: Check for needs-restarting (RHEL)
      command: needs-restarting -r
      register: needs_restarting
      changed_when: false
      failed_when: false

    - name: Patching summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║       Patching Complete                                  ║
          ╠════════════════════════════════════════════════════════════╣
          ║                                                          ║
          ║  Host:     {{ (inventory_hostname ~ '.' ~ idm_domain) | ljust(46) }}║
          ║  Updates:  {{ (patch_result.results | default([]) | length | string + ' packages') | ljust(46) }}║
          ║  Reboot:   {{ ('Required' if needs_restarting.rc | default(0) != 0 else 'Not required') | ljust(46) }}║
          ║                                                          ║
          ╚════════════════════════════════════════════════════════════╝
