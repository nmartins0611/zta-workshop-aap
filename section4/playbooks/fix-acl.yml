---
# Section 4 Extension: Restore the correct micro-segmentation ACL.
#
# Usage:
#   ansible-playbook section4/playbooks/fix-acl.yml

- name: "Section 4 | Fix ACL — Restore Micro-segmentation"
  hosts: network
  gather_facts: false

  vars:
    ansible_network_os: arista.eos.eos

  tasks:
    - name: Restore correct ACL on ceos2
      arista.eos.eos_acls:
        config:
          - afi: ipv4
            acls:
              - name: ZTA-APP-TO-DB
                aces:
                  - sequence: 10
                    grant: permit
                    protocol: tcp
                    source:
                      host: "{{ app_data_ip }}"
                    destination:
                      host: "{{ db_data_ip }}"
                      port_protocol:
                        eq: "{{ db_port | string }}"
                  - sequence: 20
                    grant: deny
                    protocol: ip
                    source:
                      any: true
                    destination:
                      host: "{{ db_data_ip }}"
        state: overridden
      when: inventory_hostname == 'ceos2'

    - name: Display fix confirmation
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║       ACL FIX APPLIED ON ceos2                               ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  Restored: ZTA-APP-TO-DB ACL                                 ║
          ║    10 permit tcp host {{ app_data_ip }} host {{ db_data_ip }} eq {{ db_port }}║
          ║    20 deny ip any host {{ db_data_ip }}                      ║
          ║                                                              ║
          ║  Only the app server can reach the database on port {{ db_port }}.║
          ╚════════════════════════════════════════════════════════════════╝
      when: inventory_hostname == 'ceos2'
