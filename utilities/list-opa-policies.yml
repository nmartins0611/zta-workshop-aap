---
# Utility: List all policies currently loaded in OPA
- name: List OPA Policies
  hosts: zta_services
  become: false
  gather_facts: false

  tasks:
    - name: Fetch loaded policies from OPA
      uri:
        url: "{{ opa_url }}/v1/policies"
        method: GET
        return_content: true
      register: opa_policies

    - name: Display policy summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║       OPA Policy Inventory                               ║
          ╠════════════════════════════════════════════════════════════╣
          ║                                                          ║
          ║  Server:          {{ opa_url | ljust(38) }}║
          ║  Policies loaded: {{ (opa_policies.json.result | length | string) | ljust(38) }}║
          ║                                                          ║
          {% for policy in opa_policies.json.result %}
          ║  ── {{ policy.id | ljust(52) }}║
          {% if policy.ast.package.path is defined %}
          ║     Package: {{ (policy.ast.package.path | map(attribute='value') | join('.')) | ljust(45) }}║
          {% endif %}
          {% if policy.raw is defined %}
          ║     Size:    {{ (policy.raw | length | string + ' bytes') | ljust(45) }}║
          {% endif %}
          {% endfor %}
          ║                                                          ║
          ╚════════════════════════════════════════════════════════════╝

    - name: Show detailed rules per policy
      debug:
        msg: |
          Policy: {{ item.id }}
          {% if item.ast.rules is defined %}
          Rules:
          {% for rule in item.ast.rules %}
            - {{ rule.head.name | default('(default)') }}
          {% endfor %}
          {% endif %}
      loop: "{{ opa_policies.json.result }}"
      loop_control:
        label: "{{ item.id }}"

    - name: OPA health check
      uri:
        url: "{{ opa_url }}/health"
        method: GET
      register: opa_health

    - name: Display health status
      debug:
        msg: "OPA health: {{ 'HEALTHY' if opa_health.status == 200 else 'UNHEALTHY' }}"
