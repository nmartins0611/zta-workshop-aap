---
# deploy-wazuh-agents.yml — Install and register Wazuh agents on
# monitored hosts so they report security events to the Wazuh manager.
#
# Usage:
#   ansible-playbook setup/deploy-wazuh-agents.yml
#
# Limit to specific hosts:
#   ansible-playbook setup/deploy-wazuh-agents.yml --limit app_servers,db_servers
#
# Prerequisites:
#   - Wazuh manager is installed and running on wazuh.zta.lab
#   - DNS resolves wazuh.zta.lab (run setup/configure-dns.yml first)

- name: Deploy Wazuh agents
  hosts: app_servers,db_servers,vault_servers,netbox_servers,automation
  become: true
  gather_facts: true

  vars:
    wazuh_manager: "{{ wazuh_manager_host | default('wazuh.zta.lab') }}"
    wazuh_agent_version: "4.9"

  pre_tasks:
    # ── Pre-download on controller for disconnected targets ────────
    - name: Check if Wazuh GPG key already on controller
      stat:
        path: /tmp/wazuh/GPG-KEY-WAZUH 
      delegate_to: localhost
      run_once: true
      register: gpg_key_local

    - name: Create staging directory on controller
      file:
        path: /tmp/wazuh
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      when: not gpg_key_local.stat.exists

    - name: Download Wazuh GPG key to controller
      get_url:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        dest: /tmp/wazuh/GPG-KEY-WAZUH
        mode: '0644'
      delegate_to: localhost
      run_once: true
      when: not gpg_key_local.stat.exists

    - name: Check if Wazuh agent RPM already on controller
      find:
        paths: /tmp/wazuh
        patterns: "wazuh-agent-*.rpm"
      delegate_to: localhost
      run_once: true
      register: rpm_local

    - name: Download Wazuh agent RPM to controller
      get_url:
        url: "https://packages.wazuh.com/{{ wazuh_agent_version }}/yum/wazuh-agent-{{ wazuh_agent_version }}.2-1.x86_64.rpm"
        dest: /tmp/wazuh/
        mode: '0644'
      delegate_to: localhost
      run_once: true
      when: rpm_local.files | length == 0
      failed_when: false
      register: rpm_download

  tasks:

    # ── Check if agent is already installed ──────────────────────────

    - name: Check if Wazuh agent is already installed
      stat:
        path: /var/ossec/bin/wazuh-control
      register: wazuh_installed

    - name: Check if agent is already running
      command: /var/ossec/bin/wazuh-control status
      register: wazuh_running
      changed_when: false
      failed_when: false
      when: wazuh_installed.stat.exists

    # ── Install Wazuh agent (offline-first, fallback to repo) ──────

    - name: Find Wazuh agent RPM on controller
      find:
        paths: /tmp/wazuh
        patterns: "wazuh-agent-*.rpm"
      delegate_to: localhost
      run_once: true
      register: rpm_files

    - name: Copy GPG key to target
      copy:
        src: /tmp/wazuh/GPG-KEY-WAZUH
        dest: /tmp/GPG-KEY-WAZUH
        mode: '0644'
      when:
        - not wazuh_installed.stat.exists
        - gpg_key_local.stat.exists or not (gpg_key_local.stat.exists | default(false))

    - name: Import Wazuh GPG key from local copy
      rpm_key:
        key: /tmp/GPG-KEY-WAZUH
        state: present
      when: not wazuh_installed.stat.exists

    - name: Copy Wazuh agent RPM to target
      copy:
        src: "{{ rpm_files.files[0].path }}"
        dest: "/tmp/{{ rpm_files.files[0].path | basename }}"
        mode: '0644'
      when:
        - not wazuh_installed.stat.exists
        - rpm_files.files | length > 0

    - name: Install Wazuh agent from local RPM
      command: >
        rpm -ivh --nodeps /tmp/{{ rpm_files.files[0].path | basename }}
      environment:
        WAZUH_MANAGER: "{{ wazuh_manager }}"
      register: rpm_install
      changed_when: rpm_install.rc == 0
      failed_when:
        - rpm_install.rc != 0
        - "'already installed' not in rpm_install.stderr"
      when:
        - not wazuh_installed.stat.exists
        - rpm_files.files | length > 0

    - name: Install Wazuh agent from repo (fallback if no local RPM)
      block:
        - name: Add Wazuh repository
          yum_repository:
            name: wazuh
            description: Wazuh repository
            baseurl: "https://packages.wazuh.com/{{ wazuh_agent_version }}/yum/"
            gpgkey: https://packages.wazuh.com/key/GPG-KEY-WAZUH
            gpgcheck: true
            enabled: true

        - name: Install Wazuh agent from repo
          dnf:
            name: wazuh-agent
            state: present
          environment:
            WAZUH_MANAGER: "{{ wazuh_manager }}"
      when:
        - not wazuh_installed.stat.exists
        - rpm_files.files | length == 0

    # ── Configure agent ──────────────────────────────────────────────

    - name: Configure Wazuh manager address
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>.*</address>'
        line: "      <address>{{ wazuh_manager }}</address>"
        backrefs: false
      notify: restart wazuh-agent

    - name: Set agent name to inventory hostname
      lineinfile:
        path: /var/ossec/etc/local_internal_options.conf
        line: "agent.name={{ inventory_hostname }}.{{ idm_domain }}"
        create: true
        mode: '0640'
        owner: root
        group: wazuh

    # ── Enable vulnerability detection module ────────────────────────

    - name: Check if vulnerability-detection is configured
      command: grep -c 'vulnerability-detection' /var/ossec/etc/ossec.conf
      register: vuln_configured
      changed_when: false
      failed_when: false

    # ── Enable SCA (Security Configuration Assessment) ───────────────

    - name: Ensure SCA is enabled
      command: grep -c '<sca>' /var/ossec/etc/ossec.conf
      register: sca_configured
      changed_when: false
      failed_when: false

    # ── Start and register agent ─────────────────────────────────────

    - name: Enable and start Wazuh agent
      systemd:
        name: wazuh-agent
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for agent to connect to manager
      command: /var/ossec/bin/agent_control -l
      register: agent_status
      until: "'is connected' in agent_status.stdout or agent_status.rc == 0"
      retries: 12
      delay: 10
      changed_when: false
      failed_when: false
      delegate_to: "{{ wazuh_manager }}"

    # ── Verification ─────────────────────────────────────────────────

    - name: Check agent status
      command: /var/ossec/bin/wazuh-control status
      register: final_status
      changed_when: false

    - name: Display agent status
      debug:
        msg: >-
          {{ inventory_hostname }}: Wazuh agent {{ 'RUNNING' if 'is running' in final_status.stdout else 'NOT RUNNING' }},
          manager={{ wazuh_manager }}

  handlers:
    - name: restart wazuh-agent
      systemd:
        name: wazuh-agent
        state: restarted


# ── Summary play ─────────────────────────────────────────────────────

- name: Wazuh Agent Deployment Summary
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Summary
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════╗
          ║       Wazuh Agent Deployment Complete                   ║
          ╠══════════════════════════════════════════════════════════╣
          ║                                                        ║
          ║  Manager: wazuh.zta.lab:1514                           ║
          ║  API:     https://wazuh.zta.lab:55000                  ║
          ║                                                        ║
          ║  Agents deployed to:                                   ║
          ║    - app.zta.lab     (application server)              ║
          ║    - db.zta.lab      (database server)                 ║
          ║    - vault.zta.lab   (secrets management)              ║
          ║    - netbox.zta.lab  (CMDB)                            ║
          ║    - gitea.zta.lab   (source control)                  ║
          ║    - aap.zta.lab     (automation controller)           ║
          ║                                                        ║
          ║  Verify in Wazuh Dashboard:                            ║
          ║    https://wazuh.zta.lab → Agents                      ║
          ║                                                        ║
          ║  These agents feed into Section 3:                     ║
          ║    AAP queries Wazuh API before allowing patching      ║
          ║                                                        ║
          ╚══════════════════════════════════════════════════════════╝
