---
# Section 2, Step 3: Configure Arista ACL to allow app server → database only
#
# Uses the data-plane IPs (10.20.0.10 and 10.30.0.10) that route
# through the cEOS switch fabric. The ACL is applied on ceos2
# (the data-tier leaf switch).
- name: Configure Network Access for App to Database
  hosts: network
  gather_facts: false

  vars:
    acl_name: ZTA-APP-TO-DB
    # Data-plane IPs come from inventory (group_vars/all.yml: app_data_ip, db_data_ip).
    # Do not redefine them here with hostvars['app'] — that host is often absent when
    # this play runs against [network] only (AAP job), and | default(app_data_ip) on
    # the same variable name causes recursive templating.
    target_switch: ceos2

  tasks:
    - name: Configure ACL on data-tier leaf switch (ceos2)
      when: inventory_hostname == target_switch
      block:
        - name: Configure ACL permitting app server to database
          arista.eos.eos_acls:
            config:
              - afi: ipv4
                acls:
                  - name: "{{ acl_name }}"
                    aces:
                      - sequence: 10
                        grant: permit
                        protocol: tcp
                        source:
                          host: "{{ app_data_ip }}"
                        destination:
                          host: "{{ db_data_ip }}"
                          port_protocol:
                            eq: "{{ db_port }}"
                      - sequence: 20
                        grant: permit
                        protocol: tcp
                        source:
                          host: "{{ db_data_ip }}"
                          port_protocol:
                            eq: "{{ db_port }}"
                        destination:
                          host: "{{ app_data_ip }}"
                      - sequence: 100
                        grant: deny
                        protocol: ip
                        source:
                          any: true
                        destination:
                          host: "{{ db_data_ip }}"
            state: replaced

        - name: Display ACL configuration
          debug:
            msg: |
              Network micro-segmentation applied on {{ target_switch }}:
                ACL: {{ acl_name }}
                PERMIT: {{ app_data_ip }} → {{ db_data_ip }}:{{ db_port }}
                DENY:   any → {{ db_data_ip }}:{{ db_port }}

              Only the app container ({{ app_data_ip }}) can reach the
              database via the Arista cEOS switch fabric.
