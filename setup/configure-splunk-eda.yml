---
# configure-splunk-eda.yml — Wire Splunk → EDA webhook with Vault-managed
# authentication credentials.
#
# Zero Trust principle: the shared secret between Splunk and EDA is never
# hardcoded in config files or playbooks. Vault is the single source of
# truth — this playbook reads (or seeds) the credential, then configures
# both ends to use it.
#
# Creates:
#   Phase 1 — Vault KV: webhook auth credentials at secret/services/eda-webhook
#   Phase 2 — Splunk: "ZTA: SSH Brute Force Detected" saved search
#   Phase 3 — Splunk: EDA webhook alert action on the saved search
#   Phase 4 — EDA: custom credential type + credential (webhook token from Vault)
#
# Prerequisites:
#   - Splunk deployed and HEC configured (setup/integrate-splunk.yml)
#   - EDA controller running (AAP 2.6)
#   - Vault deployed and unsealed
#   - Splunk EDA app installed (provides the webhook alert action)
#   - Log data flowing to zta_syslog index (Phases 2–3 of integrate-splunk.yml)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-splunk-eda.yml
#   ansible-playbook -i inventory/hosts.ini setup/configure-splunk-eda.yml --tags vault
#   ansible-playbook -i inventory/hosts.ini setup/configure-splunk-eda.yml --tags splunk
#   ansible-playbook -i inventory/hosts.ini setup/configure-splunk-eda.yml --tags eda
#
# Tags:
#   vault   — Phase 1 only (seed webhook credentials in Vault)
#   splunk  — Phases 2–3 (saved search + alert action)
#   eda     — Phase 4 (EDA credential for webhook auth)

# ═════════════════════════════════════════════════════════════════════════════
# Phase 1 — Seed webhook auth credentials in Vault
# ═════════════════════════════════════════════════════════════════════════════
- name: "Phase 1 — Store EDA webhook credentials in Vault"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [vault, splunk, eda]

  vars:
    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default('ansible123!', true) }}"

    eda_webhook_user: eda-splunk
    eda_webhook_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
    eda_webhook_vault_path: secret/data/services/eda-webhook

  tasks:
    - name: Authenticate to Vault
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
        status_code: 200
      register: _vault_login

    - name: Check if webhook credentials already exist in Vault
      uri:
        url: "{{ vault_addr }}/v1/{{ eda_webhook_vault_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _vault_login.json.auth.client_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: _webhook_secret_check

    - name: Store webhook credentials in Vault KV (first run only)
      uri:
        url: "{{ vault_addr }}/v1/{{ eda_webhook_vault_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ _vault_login.json.auth.client_token }}"
        body_format: json
        body:
          data:
            username: "{{ eda_webhook_user }}"
            password: "{{ eda_webhook_password }}"
        validate_certs: false
        status_code: [200, 204]
      when: _webhook_secret_check.status == 404

    - name: Read webhook credentials from Vault
      uri:
        url: "{{ vault_addr }}/v1/{{ eda_webhook_vault_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _vault_login.json.auth.client_token }}"
        validate_certs: false
        status_code: 200
      register: _webhook_secret

    - name: Cache Vault token and webhook credentials for later phases
      ansible.builtin.set_fact:
        _vault_token: "{{ _vault_login.json.auth.client_token }}"
        _webhook_username: "{{ _webhook_secret.json.data.data.username }}"
        _webhook_password: "{{ _webhook_secret.json.data.data.password }}"

    - name: Report Vault status
      ansible.builtin.debug:
        msg: >-
          Vault KV {{ eda_webhook_vault_path }}:
          {{ 'CREATED (new password generated)' if _webhook_secret_check.status == 404
             else 'EXISTS (using stored credentials)' }}
          — username={{ _webhook_username }}


# ═════════════════════════════════════════════════════════════════════════════
# Phase 2 — Create Splunk saved search for brute-force detection
# ═════════════════════════════════════════════════════════════════════════════
- name: "Phase 2 — Configure Splunk brute-force saved search"
  hosts: zta_services
  become: true
  gather_facts: false
  tags: [splunk]

  vars:
    splunk_password: "{{ idm_admin_password }}"
    splunk_mgmt: "https://localhost:8089"

    brute_force_search: >-
      index=zta_syslog sourcetype=syslog sshd "Failed password"
      | stats count as attempt_count by src_ip, host
      | where attempt_count >= 5

    brute_force_search_name: "ZTA: SSH Brute Force Detected"

  tasks:
    - name: Wait for Splunk management API
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/services/server/info"
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
      register: _splunk_ready
      until: _splunk_ready.status == 200
      retries: 12
      delay: 10

    - name: Check if saved search already exists
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/servicesNS/admin/search/saved/searches/{{ brute_force_search_name | urlencode }}"
        method: GET
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 404]
      register: _saved_search_check

    - name: Create brute-force detection saved search
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/servicesNS/admin/search/saved/searches"
        method: POST
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          name: "{{ brute_force_search_name }}"
          search: "{{ brute_force_search }}"
          is_scheduled: "1"
          cron_schedule: "*/2 * * * *"
          dispatch.earliest_time: "-5m"
          dispatch.latest_time: "now"
          alert_type: "number of results"
          alert_comparator: "greater than"
          alert_threshold: "0"
          alert.suppress: "1"
          alert.suppress.period: "5m"
          alert.suppress.fields: "src_ip"
        status_code: [200, 201, 409]
      when: _saved_search_check.status == 404

    - name: Report saved search status
      ansible.builtin.debug:
        msg: >-
          Saved search "{{ brute_force_search_name }}":
          {{ 'CREATED' if _saved_search_check.status == 404 else 'already exists' }}
          — runs every 2 min, alerts on >= 5 failed SSH logins per source IP


# ═════════════════════════════════════════════════════════════════════════════
# Phase 3 — Configure Splunk EDA webhook alert action
# ═════════════════════════════════════════════════════════════════════════════
- name: "Phase 3 — Configure Splunk → EDA webhook alert action"
  hosts: zta_services
  become: true
  gather_facts: false
  tags: [splunk]

  vars:
    splunk_password: "{{ idm_admin_password }}"
    splunk_mgmt: "https://localhost:8089"

    brute_force_search_name: "ZTA: SSH Brute Force Detected"

    eda_webhook_url: "https://control.zta.lab:5000"

    _webhook_username: "{{ hostvars['localhost']['_webhook_username'] }}"
    _webhook_password: "{{ hostvars['localhost']['_webhook_password'] }}"

  tasks:
    - name: Configure EDA webhook alert action on saved search
      ansible.builtin.uri:
        url: "{{ splunk_mgmt }}/servicesNS/admin/search/saved/searches/{{ brute_force_search_name | urlencode }}"
        method: POST
        user: admin
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          actions: webhook
          action.webhook: "1"
          action.webhook.param.url: "{{ eda_webhook_url }}"
        status_code: [200]
      register: _webhook_action

    - name: Report webhook alert action status
      ansible.builtin.debug:
        msg: >-
          Saved search "{{ brute_force_search_name }}" →
          webhook alert action configured →
          {{ eda_webhook_url }}
          (auth: {{ _webhook_username }})


# ═════════════════════════════════════════════════════════════════════════════
# Phase 4 — Create EDA credential for webhook authentication
#
# EDA injects credential fields as environment variables into the DE
# container at activation start. The rulebook reads WEBHOOK_USERNAME
# and WEBHOOK_PASSWORD from the environment — never from source code.
# ═════════════════════════════════════════════════════════════════════════════
- name: "Phase 4 — Create EDA webhook credential (Vault-sourced)"
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [eda]

  vars:
    aap_host: "{{ aap_controller_url | default('https://control.zta.lab') }}"
    aap_user: admin
    aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') | default('ansible123!', true) }}"
    aap_verify_ssl: false
    aap_organization: Default

    eda_webhook_cred_type_name: "EDA Webhook Auth"
    eda_webhook_cred_name: "ZTA Splunk Webhook Credential"

  tasks:
    - name: Look up Default organization in EDA
      uri:
        url: "{{ aap_host }}/api/eda/v1/organizations/?name={{ aap_organization | urlencode }}"
        method: GET
        url_username: "{{ aap_user }}"
        url_password: "{{ aap_password }}"
        validate_certs: "{{ aap_verify_ssl }}"
        force_basic_auth: true
        status_code: [200]
      register: _eda_org

    - name: Set EDA organization ID
      ansible.builtin.set_fact:
        _eda_org_id: "{{ _eda_org.json.results[0].id }}"

    # -- Custom credential type for webhook auth ───────────────────────

    - name: Check if EDA webhook credential type exists
      uri:
        url: "{{ aap_host }}/api/eda/v1/credential-types/?name={{ eda_webhook_cred_type_name | urlencode }}"
        method: GET
        url_username: "{{ aap_user }}"
        url_password: "{{ aap_password }}"
        validate_certs: "{{ aap_verify_ssl }}"
        force_basic_auth: true
        status_code: [200]
      register: _eda_webhook_type_check

    - name: Create EDA webhook credential type
      uri:
        url: "{{ aap_host }}/api/eda/v1/credential-types/"
        method: POST
        url_username: "{{ aap_user }}"
        url_password: "{{ aap_password }}"
        validate_certs: "{{ aap_verify_ssl }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ eda_webhook_cred_type_name }}"
          inputs:
            fields:
              - id: webhook_username
                label: Webhook Username
                type: string
              - id: webhook_password
                label: Webhook Password
                type: string
                secret: true
            required:
              - webhook_username
              - webhook_password
          injectors:
            env:
              EDA_WEBHOOK_USERNAME: "{% raw %}{{ webhook_username }}{% endraw %}"
              EDA_WEBHOOK_PASSWORD: "{% raw %}{{ webhook_password }}{% endraw %}"
        status_code: [201]
      when: (_eda_webhook_type_check.json.count | default(0)) == 0
      register: _eda_webhook_type_create

    - name: Get credential type ID
      ansible.builtin.set_fact:
        _eda_webhook_type_id: >-
          {{ _eda_webhook_type_create.json.id
             if (_eda_webhook_type_create is not skipped)
             else _eda_webhook_type_check.json.results[0].id }}

    # -- Credential with Vault-sourced values ──────────────────────────

    - name: Check if EDA webhook credential exists
      uri:
        url: "{{ aap_host }}/api/eda/v1/eda-credentials/?name={{ eda_webhook_cred_name | urlencode }}"
        method: GET
        url_username: "{{ aap_user }}"
        url_password: "{{ aap_password }}"
        validate_certs: "{{ aap_verify_ssl }}"
        force_basic_auth: true
        status_code: [200]
      register: _eda_webhook_cred_check

    - name: Create EDA webhook credential (values from Vault)
      uri:
        url: "{{ aap_host }}/api/eda/v1/eda-credentials/"
        method: POST
        url_username: "{{ aap_user }}"
        url_password: "{{ aap_password }}"
        validate_certs: "{{ aap_verify_ssl }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ eda_webhook_cred_name }}"
          credential_type_id: "{{ _eda_webhook_type_id | int }}"
          inputs:
            webhook_username: "{{ _webhook_username }}"
            webhook_password: "{{ _webhook_password }}"
          organization_id: "{{ _eda_org_id | int }}"
        status_code: [201]
      when: (_eda_webhook_cred_check.json.count | default(0)) == 0

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════════╗
          ║       Splunk → EDA Webhook — Configuration Complete                 ║
          ╠═══════════════════════════════════════════════════════════════════════╣
          ║                                                                     ║
          ║  Secret source:  Vault KV secret/services/eda-webhook               ║
          ║                                                                     ║
          ║  Splunk side:                                                       ║
          ║    Saved search:  "ZTA: SSH Brute Force Detected"                   ║
          ║    Alert action:  Webhook → {{ eda_webhook_url | default('EDA endpoint') }}{{ ' ' * (25 - (eda_webhook_url | default('EDA endpoint')) | length) }}║
          ║    Auth:          Basic Auth (username from Vault)                   ║
          ║                                                                     ║
          ║  EDA side:                                                          ║
          ║    Credential type:  {{ eda_webhook_cred_type_name }}{{ ' ' * (43 - eda_webhook_cred_type_name | length) }}║
          ║    Credential:       {{ eda_webhook_cred_name }}{{ ' ' * (43 - eda_webhook_cred_name | length) }}║
          ║    Injected env:     EDA_WEBHOOK_USERNAME, EDA_WEBHOOK_PASSWORD     ║
          ║                                                                     ║
          ║  Attach "{{ eda_webhook_cred_name }}" to the rulebook            ║
          ║  activation. The DE container receives the env vars at start.       ║
          ║                                                                     ║
          ║  The webhook token never appears in:                                ║
          ║    ✗ Git (rulebooks, playbooks, inventory)                          ║
          ║    ✗ Splunk config files (set via REST API)                         ║
          ║    ✗ EDA credential store as plaintext (marked secret)              ║
          ║  It lives only in Vault and is read at setup time.                  ║
          ╚═══════════════════════════════════════════════════════════════════════╝
