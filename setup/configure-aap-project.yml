---
# configure-aap-project.yml — Create the AAP project and execution
# environment for the ZTA workshop lab.
#
# Creates:
#   0. ZTA Workshop EE             — Custom execution environment (cEOS + RHEL)
#   1. ZTA Workshop Project        — SCM project (Git)
#   2. Job templates               — All playbooks under section*/playbooks/ (tagged per section)
#
# Prerequisites:
#   - AAP Controller is installed and reachable
#   - SCM host reachable; zta-workshop-aap repo exists at project_scm_url
#   - ansible.controller collection available
#   - ZTA Lab Inventory and ZTA Machine Credential already exist on the controller
#   - ZTA Arista Credential for templates that touch switches (see vars file)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags ee
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags project
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags templates
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags section1
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags section2
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags "section1,section2"
#
# Remove job templates (does not delete project/EE):
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags remove_section -e aap_remove_section=3
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags remove_last_section
#
# Tags:
#   ee                 — Execution environment only
#   project            — SCM project only (sync included)
#   templates          — All workshop job templates (all sections)
#   section1 … section7— Only that section’s job templates
#   remove_section     — Delete templates for aap_remove_section (integer, required)
#   remove_last_section— Delete templates for the highest section number in the catalog
#   rbac               — Project + inventory permissions for LDAP teams and Default org only
#
# LDAP authenticator maps (Exercise 1.2) place users in teams named below. Those teams
# must have Read/Use on the workshop project and Read/Use on the lab inventory or IdM
# users (e.g. appdev) cannot run jobs. Organization-only users (e.g. neteng) need the
# Default org granted on the project and inventory as well.

- name: Create AAP Project and Execution Environment for ZTA Workshop
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/zta_workshop_job_templates.yml

  vars:
    aap_host: "{{ aap_controller_url | default('https://control.zta.lab') }}"
    aap_user: admin
    aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') | default('ansible123!', true) }}"
    aap_verify_ssl: false
    aap_organization: Default

    ee_name: ZTA Workshop EE
    ee_image: quay.io/nmartins/zta_ee

    project_name: ZTA Workshop
    project_scm_url: https://github.com/nmartins0611/zta-workshop-aap.git

    # Pre-created on the controller before this playbook (see solve-section1 / lab docs)
    inventory_name: ZTA Lab Inventory
    machine_credential_name: ZTA Machine Credential

    # Set -e aap_remove_section=N with --tags remove_section to delete that section’s templates
    aap_remove_section: 0

    # AAP team names must match teams created when IdM users log in (Exercise 1.2 team maps).
    # Override if your UI uses different names (e.g. team-applications).
    zta_workshop_rbac_teams:
      - Infrastructure
      - DevOps
      - Security
      - Applications

    # Grant Default organization read+use on project and read+use on inventory (covers neteng and other org-only members).
    zta_workshop_grant_org_project_access: true

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ aap_host }}"
      controller_username: "{{ aap_user }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_verify_ssl }}"

  tasks:

    # ══════════════════════════════════════════════════════════════════════
    #  Verify prerequisites
    # ══════════════════════════════════════════════════════════════════════

    - name: Verify AAP Controller is reachable
      uri:
        url: "{{ aap_host }}/api/controller/v2/ping/"
        method: GET
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: aap_ping
      tags: [always]

    - name: Display AAP version
      debug:
        msg: "AAP Controller {{ aap_ping.json.version }} detected"
      tags: [always]

    # ══════════════════════════════════════════════════════════════════════
    #  1. Execution Environment — Custom EE with cEOS + RHEL collections
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Workshop Execution Environment
      ansible.controller.execution_environment:
        name: "{{ ee_name }}"
        description: "Custom EE with Arista cEOS, RHEL, and network collections for ZTA workshop"
        image: "{{ ee_image }}"
        pull: missing
        organization: "{{ aap_organization }}"
        state: present
      tags: [ee, aap-bootstrap, aap, aap-project]

    # ══════════════════════════════════════════════════════════════════════
    #  2. Project — SCM project pointing at Gitea
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Workshop Project
      ansible.controller.project:
        name: "{{ project_name }}"
        description: "ZTA Workshop — playbooks, inventories, and roles from Gitea"
        organization: "{{ aap_organization }}"
        scm_type: git
        scm_url: "{{ project_scm_url }}"
        scm_branch: main
        scm_clean: true
        scm_update_on_launch: true
        default_environment: "{{ ee_name }}"
        state: present
      tags: [project, aap-bootstrap, aap, aap-project]

    - name: Wait for initial project sync to complete
      ansible.controller.project:
        name: "{{ project_name }}"
        organization: "{{ aap_organization }}"
        wait: true
        timeout: 120
        state: present
      tags: [project, aap-bootstrap, aap, aap-project]

    # ══════════════════════════════════════════════════════════════════════
    #  2b. RBAC — teams + Default org can use project and inventory (LDAP lab users)
    # ══════════════════════════════════════════════════════════════════════

    - name: Ensure workshop LDAP teams exist (names must match authenticator maps)
      ansible.controller.team:
        name: "{{ item }}"
        organization: "{{ aap_organization }}"
        state: present
      loop: "{{ zta_workshop_rbac_teams }}"
      loop_control:
        label: "{{ item }}"
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant workshop teams read access to project
      ansible.controller.role:
        role: read
        projects:
          - "{{ project_name }}"
        teams:
          - "{{ item }}"
        lookup_organization: "{{ aap_organization }}"
        state: present
      loop: "{{ zta_workshop_rbac_teams }}"
      loop_control:
        label: "{{ item }}"
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant workshop teams use access to project
      ansible.controller.role:
        role: use
        projects:
          - "{{ project_name }}"
        teams:
          - "{{ item }}"
        lookup_organization: "{{ aap_organization }}"
        state: present
      loop: "{{ zta_workshop_rbac_teams }}"
      loop_control:
        label: "{{ item }}"
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant workshop teams read access to lab inventory
      ansible.controller.role:
        role: read
        inventories:
          - "{{ inventory_name }}"
        teams:
          - "{{ item }}"
        lookup_organization: "{{ aap_organization }}"
        state: present
      loop: "{{ zta_workshop_rbac_teams }}"
      loop_control:
        label: "{{ item }}"
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant workshop teams use access to lab inventory
      ansible.controller.role:
        role: use
        inventories:
          - "{{ inventory_name }}"
        teams:
          - "{{ item }}"
        lookup_organization: "{{ aap_organization }}"
        state: present
      loop: "{{ zta_workshop_rbac_teams }}"
      loop_control:
        label: "{{ item }}"
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Look up Default organization id (for org-level RBAC)
      ansible.builtin.uri:
        url: "{{ aap_host }}/api/controller/v2/organizations/?name={{ aap_organization | urlencode }}"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: zta_org_lookup
      when: zta_workshop_grant_org_project_access | bool
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Look up workshop project API id and object_roles
      ansible.builtin.uri:
        url: "{{ aap_host }}/api/controller/v2/projects/?name={{ project_name | urlencode }}&organization__name={{ aap_organization | urlencode }}"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: zta_project_api
      when: zta_workshop_grant_org_project_access | bool
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Look up lab inventory API id and object_roles
      ansible.builtin.uri:
        url: "{{ aap_host }}/api/controller/v2/inventories/?name={{ inventory_name | urlencode }}&organization__name={{ aap_organization | urlencode }}"
        method: GET
        user: "{{ aap_user }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: zta_inventory_api
      when: zta_workshop_grant_org_project_access | bool
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant Default org read on workshop project (idempotent)
      when:
        - zta_workshop_grant_org_project_access | bool
        - zta_project_api.json.results | default([]) | length > 0
        - zta_org_lookup.json.results | default([]) | length > 0
      vars:
        _org_id: "{{ zta_org_lookup.json.results[0].id }}"
        _read_role_id: "{{ zta_project_api.json.results[0].summary_fields.object_roles.read_role.id }}"
      block:
        - name: Check if organization already has project read role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _read_role_id }}/organizations/"
            method: GET
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            status_code: 200
          register: zta_proj_read_orgs

        - name: Associate Default org with project read role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _read_role_id }}/organizations/"
            method: POST
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            body_format: json
            body:
              id: "{{ _org_id | int }}"
            status_code: [201, 204]
          when: _org_id | int not in (zta_proj_read_orgs.json.results | default([]) | map(attribute='id') | map('int') | list)
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant Default org use on workshop project (idempotent)
      when:
        - zta_workshop_grant_org_project_access | bool
        - zta_project_api.json.results | default([]) | length > 0
        - zta_org_lookup.json.results | default([]) | length > 0
      vars:
        _org_id: "{{ zta_org_lookup.json.results[0].id }}"
        _use_role_id: "{{ zta_project_api.json.results[0].summary_fields.object_roles.use_role.id }}"
      block:
        - name: Check if organization already has project use role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _use_role_id }}/organizations/"
            method: GET
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            status_code: 200
          register: zta_proj_use_orgs

        - name: Associate Default org with project use role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _use_role_id }}/organizations/"
            method: POST
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            body_format: json
            body:
              id: "{{ _org_id | int }}"
            status_code: [201, 204]
          when: _org_id | int not in (zta_proj_use_orgs.json.results | default([]) | map(attribute='id') | map('int') | list)
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant Default org read on lab inventory (idempotent)
      when:
        - zta_workshop_grant_org_project_access | bool
        - zta_inventory_api.json.results | default([]) | length > 0
        - zta_org_lookup.json.results | default([]) | length > 0
      vars:
        _org_id: "{{ zta_org_lookup.json.results[0].id }}"
        _inv_read_role_id: "{{ zta_inventory_api.json.results[0].summary_fields.object_roles.read_role.id }}"
      block:
        - name: Check if organization already has inventory read role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _inv_read_role_id }}/organizations/"
            method: GET
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            status_code: 200
          register: zta_inv_read_orgs

        - name: Associate Default org with inventory read role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _inv_read_role_id }}/organizations/"
            method: POST
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            body_format: json
            body:
              id: "{{ _org_id | int }}"
            status_code: [201, 204]
          when: _org_id | int not in (zta_inv_read_orgs.json.results | default([]) | map(attribute='id') | map('int') | list)
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    - name: Grant Default org use on lab inventory (idempotent)
      when:
        - zta_workshop_grant_org_project_access | bool
        - zta_inventory_api.json.results | default([]) | length > 0
        - zta_org_lookup.json.results | default([]) | length > 0
      vars:
        _org_id: "{{ zta_org_lookup.json.results[0].id }}"
        _use_role_id: "{{ zta_inventory_api.json.results[0].summary_fields.object_roles.use_role.id }}"
      block:
        - name: Check if organization already has inventory use role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _use_role_id }}/organizations/"
            method: GET
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            status_code: 200
          register: zta_inv_use_orgs

        - name: Associate Default org with inventory use role
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/roles/{{ _use_role_id }}/organizations/"
            method: POST
            user: "{{ aap_user }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_verify_ssl }}"
            body_format: json
            body:
              id: "{{ _org_id | int }}"
            status_code: [201, 204]
          when: _org_id | int not in (zta_inv_use_orgs.json.results | default([]) | map(attribute='id') | map('int') | list)
      tags: [project, rbac, aap-bootstrap, aap, aap-project]

    # ══════════════════════════════════════════════════════════════════════
    #  3. Job templates — catalog in vars/zta_workshop_job_templates.yml
    # ══════════════════════════════════════════════════════════════════════

    - name: Create Section 1 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 1) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section1, aap-bootstrap, aap, aap-project]

    - name: Create Section 2 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 2) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section2]

    - name: Create Section 3 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 3) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section3]

    - name: Create Section 4 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 4) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section4]

    - name: Create Section 5 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 5) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section5]

    - name: Create Section 6 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 6) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section6]

    - name: Create Section 7 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 7) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section7]

    # ══════════════════════════════════════════════════════════════════════
    #  4. Remove job templates (optional)
    # ══════════════════════════════════════════════════════════════════════

    - name: Require aap_remove_section when using remove_section tag
      ansible.builtin.assert:
        that:
          - aap_remove_section | default(0) | int > 0
        fail_msg: >-
          Pass a positive section number, e.g. -e aap_remove_section=3
          when running with --tags remove_section.
      tags: [remove_section]

    - name: Remove job templates for a specific section
      ansible.controller.job_template:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', aap_remove_section | int) | list }}"
      loop_control:
        label: "{{ item.name }}"
      when: aap_remove_section | default(0) | int > 0
      tags: [remove_section]

    - name: Remove job templates for last catalog section (highest section number)
      vars:
        zta_workshop_last_section: "{{ zta_workshop_job_templates | map(attribute='section') | max }}"
      ansible.controller.job_template:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', zta_workshop_last_section) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [remove_last_section]

    # ══════════════════════════════════════════════════════════════════════
    #  Summary
    # ══════════════════════════════════════════════════════════════════════

    - name: Display configuration summary
      tags: [always]
      vars:
        _tpl_count: "{{ zta_workshop_job_templates | length }}"
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║       AAP Project & EE — Configuration Complete                  ║
          ╠═══════════════════════════════════════════════════════════════════╣
          ║                                                                 ║
          ║  ┌───┬──────────────────────────┬──────────────────────────────┐║
          ║  │ # │ Resource                 │ Details                      │║
          ║  ├───┼──────────────────────────┼──────────────────────────────┤║
          ║  │ 0 │ Execution Environment    │ {{ ee_name }}{{ ' ' * (29 - ee_name | length) }}│║
          ║  │   │   Image                  │ {{ ee_image }}{{ ' ' * (29 - ee_image | length) }}│║
          ║  │ 1 │ Project                  │ {{ project_name }}{{ ' ' * (29 - project_name | length) }}│║
          ║  │   │   SCM URL                │ (see below)                  │║
          ║  │   │   Branch                 │ main                         │║
          ║  │   │   Update on launch       │ yes                          │║
          ║  │ 2 │ Job templates (catalog)  │ {{ _tpl_count }} (tags section1–section7)   │║
          ║  └───┴──────────────────────────┴──────────────────────────────┘║
          ║                                                                 ║
          ║  SCM URL: {{ project_scm_url }}{{ ' ' * (55 - project_scm_url | length) }}║
          ║  Default EE: {{ ee_name }}{{ ' ' * (53 - ee_name | length) }}║
