---
# Section 5: Restore application credentials after an incident.
#
# Run this AFTER investigating the brute-force incident to bring the
# application back online with fresh Vault credentials.

- name: Restore Application Database Credentials
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_env:
      VAULT_ADDR: "{{ vault_addr }}"
      VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
      VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"

  tasks:
    - name: Request new dynamic database credentials from Vault
      command: vault read -format=json {{ vault_db_secrets_path }}/creds/{{ vault_db_role_name }}
      environment: "{{ vault_env }}"
      register: new_creds_raw
      no_log: true

    - name: Parse new credentials
      set_fact:
        new_db_user: "{{ (new_creds_raw.stdout | from_json).data.username }}"
        new_db_password: "{{ (new_creds_raw.stdout | from_json).data.password }}"
        new_lease_id: "{{ (new_creds_raw.stdout | from_json).lease_id }}"
      no_log: true

    - name: Store new lease ID
      copy:
        dest: /tmp/zta-db-lease
        content: "{{ new_lease_id }}"
        mode: '0600'

    - name: Export credentials for app deployment
      set_stats:
        data:
          db_dynamic_user: "{{ new_db_user }}"
          db_dynamic_password: "{{ new_db_password }}"
          db_lease_id: "{{ new_lease_id }}"
        per_host: false

- name: Restore Application Service
  hosts: app_servers
  become: true
  gather_facts: false

  vars:
    db_user: "{{ db_dynamic_user }}"
    db_password: "{{ db_dynamic_password }}"

  tasks:
    - name: Write new application environment file
      copy:
        dest: "{{ app_deploy_dir }}/env"
        content: |
          DB_HOST={{ db_host }}
          DB_PORT={{ db_port }}
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          APP_PORT={{ app_port }}
        mode: '0600'
      no_log: true

    - name: Start the application service
      systemd:
        name: ztaapp
        state: started
        enabled: true

    - name: Wait for application to be healthy
      uri:
        url: "http://{{ app_host }}:{{ app_port }}/health"
        method: GET
      register: app_health
      until: app_health.status == 200
      retries: 15
      delay: 3

    - name: Display restoration summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║       Application Restored                                  ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  New DB User:  {{ db_user | ljust(44) }}║
          ║  Health:       {{ ('HEALTHY' if app_health.status == 200 else 'UNHEALTHY') | ljust(44) }}║
          ║  URL:          http://{{ app_host }}:{{ app_port | string | ljust(31) }}║
          ║                                                              ║
          ║  Fresh credentials issued. The application is back online.   ║
          ╚════════════════════════════════════════════════════════════════╝
