          ║  │ 0 │ Execution Environment    │ {{ ee_name }}{{ ' ' * (29 - ee_name | length) }}│║
          ║  │   │   Image                  │ {{ ee_image }}{{ ' ' * (29 - ee_image | length) }}│║
          ║  │ 1 │ Project                  │ {{ project_name }}{{ ' ' * (29 - project_name | length) }}│║
