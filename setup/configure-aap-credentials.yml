---
# configure-aap-credentials.yml — Create all AAP credentials needed for
# the ZTA workshop lab.
#
# Creates:
#   1. ZTA Machine Credential         — SSH as rhel with sudo
#   2. ZTA Vault Credential           — HashiCorp Vault secret lookup
#   3. ZTA Arista Credential          — Network device access (cEOS switches)
#   4. ZTA NetBox Credential          — CMDB API (custom credential type)
#   5. ZTA Vault SSH Credential       — Vault signed SSH certificates (AppRole)
#   6. ZTA Splunk Credential          — Splunk HEC (custom type, Vault-sourced token)
#
# Prerequisites:
#   - AAP Controller is installed and reachable
#   - Vault is deployed, unsealed, and configured (configure-vault.yml)
#   - NetBox is deployed (deploy-netbox.yml)
#   - ansible.controller collection available
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags vault-lookup
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags machine
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags arista
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags netbox
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags vault-ssh
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags splunk
#
# Skip hands-on credentials (students create Machine + Arista in AAP UI); keep Vault lookup, NetBox, Vault SSH:
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags credentials-core
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --skip-tags machine,arista
#
# Seed secret/machine/rhel in Vault only (no AAP Machine credential) — pair with credentials-core if needed:
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags machine-kv
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-credentials.yml --tags credentials-core,machine-kv
#
# Tags:
#   credentials-core — Vault lookup + NetBox + Splunk + Vault SSH (everything except machine + arista AAP creds)
#   vault-lookup     — Vault secret lookup credential (bootstrap)
#   machine          — Machine credential in AAP + KV seed (see also machine-kv)
#   machine-kv       — Write secret/machine/rhel only (no AAP credential; optional with credentials-core)
#   arista           — Arista network credential (Vault KV-sourced)
#   netbox           — NetBox custom credential type + credential
#   splunk           — Splunk custom credential type + credential (Vault-sourced HEC token)
#   vault-ssh        — Vault SSH signed certificate credential (AppRole)
#
# Override defaults with env vars or extra vars:
#   AAP_ADMIN_PASSWORD, VAULT_USERNAME, VAULT_PASSWORD, NETBOX_TOKEN
# AppRole for ZTA Vault SSH Credential: ssh_approle_name, ssh_approle_policies
#   (defaults in inventory/group_vars/all.yml).

- name: Create AAP Credentials for ZTA Workshop
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_host: "{{ aap_controller_url | default('https://control.' ~ idm_domain) }}"
    aap_user: admin
    aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') | default('ansible123!', true) }}"
    aap_verify_ssl: false
    aap_organization: Default

    machine_user: rhel
    machine_password: "ansible123!"

    vault_username: "{{ lookup('env', 'VAULT_USERNAME') | default('admin', true) }}"
    vault_password: "{{ lookup('env', 'VAULT_PASSWORD') | default('ansible123!', true) }}"

    arista_user: admin
    arista_password: admin

    nb_api_url: "{{ netbox_url | default('http://netbox.' ~ idm_domain ~ ':8880') }}"
    nb_api_token: "{{ netbox_token | default('0123456789abcdef0123456789abcdef01234567') }}"

    # AAP 2.6+ HashiCorp Vault KV v2 credential lookups: use "mount/path" without
    # a literal `data` segment (the controller inserts /data/ for the HTTP API).
    # Using secret/data/... here produces /v1/secret/data/data/... (404).
    # If automation pods cannot resolve vault.<idm_domain>, set vault_addr to the Vault IP in inventory.
    aap_vault_lookup_path_machine: secret/machine/rhel
    aap_vault_lookup_path_network_arista: secret/network/arista
    aap_vault_lookup_path_splunk: secret/services/splunk

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ aap_host }}"
      controller_username: "{{ aap_user }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_verify_ssl }}"

  tasks:

    # ══════════════════════════════════════════════════════════════════════
    #  Verify prerequisites
    # ══════════════════════════════════════════════════════════════════════

    - name: Verify AAP Controller is reachable
      uri:
        url: "{{ aap_host }}/api/controller/v2/ping/"
        method: GET
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: aap_ping
      tags: [always]

    - name: Display AAP version
      debug:
        msg: "AAP Controller {{ aap_ping.json.version }} detected"
      tags: [always]

    - name: Authenticate to Vault
      uri:
        url: "{{ vault_addr }}/v1/auth/userpass/login/{{ vault_username }}"
        method: POST
        body_format: json
        body:
          password: "{{ vault_password }}"
        validate_certs: false
        status_code: 200
      register: vault_login
      tags: [always]

    # ══════════════════════════════════════════════════════════════════════
    #  1. Vault Credential — Secret lookup (userpass auth)
    #     This is the bootstrap credential — all others source from it.
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Vault Credential
      ansible.controller.credential:
        name: ZTA Vault Credential
        description: "HashiCorp Vault secret lookup — KV, database, SSH engines"
        credential_type: HashiCorp Vault Secret Lookup
        organization: "{{ aap_organization }}"
        inputs:
          url: "{{ vault_addr }}"
          username: "{{ vault_username }}"
          password: "{{ vault_password }}"
          api_version: v2
          default_auth_path: userpass
        state: present
      tags: [vault-lookup, credentials-core]

    # ══════════════════════════════════════════════════════════════════════
    #  2. Machine Credential — SSH as rhel, password sourced from Vault
    #     become_password also sourced from Vault KV at secret/machine/rhel
    # ══════════════════════════════════════════════════════════════════════

    - name: Store machine credentials in Vault KV
      uri:
        url: "{{ vault_addr }}/v1/secret/data/machine/rhel"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          data:
            password: "{{ machine_password }}"
            become_password: "{{ machine_password }}"
        validate_certs: false
        status_code: [200, 204]
      tags: [machine, machine-kv]

    - name: Create ZTA Machine Credential (Vault-sourced password)
      ansible.controller.credential:
        name: ZTA Machine Credential
        description: "SSH access to RHEL hosts — password sourced from Vault KV"
        credential_type: Machine
        organization: "{{ aap_organization }}"
        inputs:
          username: "{{ machine_user }}"
          become_method: sudo
        state: present
      tags: [machine]

    - name: Link Machine Credential password to Vault
      ansible.controller.credential_input_source:
        input_field_name: password
        target_credential: ZTA Machine Credential
        source_credential: ZTA Vault Credential
        metadata:
          secret_path: "{{ aap_vault_lookup_path_machine }}"
          secret_key: password
        state: present
      tags: [machine]

    - name: Link Machine Credential become_password to Vault
      ansible.controller.credential_input_source:
        input_field_name: become_password
        target_credential: ZTA Machine Credential
        source_credential: ZTA Vault Credential
        metadata:
          secret_path: "{{ aap_vault_lookup_path_machine }}"
          secret_key: become_password
        state: present
      tags: [machine]

    # ══════════════════════════════════════════════════════════════════════
    #  3. Arista Network Credential — sourced from Vault KV
    #     Reads from secret/network/arista (stored by configure-vault.yml)
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Arista Credential (Vault-sourced password)
      ansible.controller.credential:
        name: ZTA Arista Credential
        description: "Arista cEOS switch access — credentials from Vault KV"
        credential_type: Network
        organization: "{{ aap_organization }}"
        state: present
      tags: [arista]

    - name: Link Arista Credential username to Vault
      ansible.controller.credential_input_source:
        input_field_name: username
        target_credential: ZTA Arista Credential
        source_credential: ZTA Vault Credential
        metadata:
          secret_path: "{{ aap_vault_lookup_path_network_arista }}"
          secret_key: username
        state: present
      tags: [arista]

    - name: Link Arista Credential password to Vault
      ansible.controller.credential_input_source:
        input_field_name: password
        target_credential: ZTA Arista Credential
        source_credential: ZTA Vault Credential
        metadata:
          secret_path: "{{ aap_vault_lookup_path_network_arista }}"
          secret_key: password
        state: present
      tags: [arista]

    # ══════════════════════════════════════════════════════════════════════
    #  4. NetBox CMDB Credential — custom credential type + credential
    # ══════════════════════════════════════════════════════════════════════

    - name: Create NetBox credential type
      ansible.controller.credential_type:
        name: NetBox
        description: "NetBox CMDB API credentials — injects NETBOX_API + NETBOX_TOKEN env vars"
        kind: cloud
        inputs:
          fields:
            - id: netbox_url
              label: NetBox URL
              type: string
              help_text: "Full URL (e.g. http://netbox.{{ idm_domain }}:8880)"
            - id: netbox_token
              label: API Token
              type: string
              secret: true
          required:
            - netbox_url
            - netbox_token
        injectors:
          env:
            NETBOX_API: "{% raw %}{{ netbox_url }}{% endraw %}"
            NETBOX_TOKEN: "{% raw %}{{ netbox_token }}{% endraw %}"
        state: present
      tags: [netbox, credentials-core]

    - name: Create ZTA NetBox Credential
      ansible.controller.credential:
        name: ZTA NetBox Credential
        description: "NetBox CMDB — API token for inventory sync and module lookups"
        credential_type: NetBox
        organization: "{{ aap_organization }}"
        inputs:
          netbox_url: "{{ nb_api_url }}"
          netbox_token: "{{ nb_api_token }}"
        state: present
      tags: [netbox, credentials-core]

    # ══════════════════════════════════════════════════════════════════════
    #  5. Splunk Credential — custom type, HEC token sourced from Vault
    # ══════════════════════════════════════════════════════════════════════

    - name: Store Splunk HEC credentials in Vault KV
      uri:
        url: "{{ vault_addr }}/v1/secret/data/services/splunk"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          data:
            hec_token: "{{ splunk_hec_token }}"
        validate_certs: false
        status_code: [200, 204]
      tags: [splunk, credentials-core]

    - name: Create Splunk credential type
      ansible.controller.credential_type:
        name: Splunk
        description: "Splunk HEC credentials — injects SPLUNK_HEC_URL + SPLUNK_HEC_TOKEN env vars"
        kind: cloud
        inputs:
          fields:
            - id: splunk_hec_url
              label: Splunk HEC URL
              type: string
              help_text: "Full HEC endpoint URL (e.g. https://splunk.{{ idm_domain }}:8088)"
            - id: splunk_hec_token
              label: HEC Token
              type: string
              secret: true
          required:
            - splunk_hec_url
            - splunk_hec_token
        injectors:
          env:
            SPLUNK_HEC_URL: "{% raw %}{{ splunk_hec_url }}{% endraw %}"
            SPLUNK_HEC_TOKEN: "{% raw %}{{ splunk_hec_token }}{% endraw %}"
        state: present
      tags: [splunk, credentials-core]

    - name: Create ZTA Splunk Credential (Vault-sourced HEC token)
      ansible.controller.credential:
        name: ZTA Splunk Credential
        description: "Splunk HEC — token sourced from Vault KV at job time"
        credential_type: Splunk
        organization: "{{ aap_organization }}"
        inputs:
          splunk_hec_url: "{{ splunk_hec_url }}"
        state: present
      tags: [splunk, credentials-core]

    - name: Link Splunk Credential HEC token to Vault
      ansible.controller.credential_input_source:
        input_field_name: splunk_hec_token
        target_credential: ZTA Splunk Credential
        source_credential: ZTA Vault Credential
        metadata:
          secret_path: "{{ aap_vault_lookup_path_splunk }}"
          secret_key: hec_token
        state: present
      tags: [splunk, credentials-core]

    # ══════════════════════════════════════════════════════════════════════
    #  6. Vault SSH Signed Certificate Credential — AppRole auth
    # ══════════════════════════════════════════════════════════════════════

    - name: Enable AppRole auth method in Vault
      uri:
        url: "{{ vault_addr }}/v1/sys/auth/approle"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          type: approle
        validate_certs: false
        status_code: [200, 204]
      failed_when: false
      tags: [vault-ssh, credentials-core]

    - name: Create SSH client AppRole
      uri:
        url: "{{ vault_addr }}/v1/auth/approle/role/{{ ssh_approle_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          token_policies: "{{ ssh_approle_policies }}"
          token_ttl: 1h
          token_max_ttl: 4h
          bind_secret_id: true
        validate_certs: false
        status_code: [200, 204]
      tags: [vault-ssh, credentials-core]

    - name: Read AppRole role-id
      uri:
        url: "{{ vault_addr }}/v1/auth/approle/role/{{ ssh_approle_name }}/role-id"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        validate_certs: false
        status_code: 200
      register: role_id_response
      tags: [vault-ssh, credentials-core]

    - name: Generate AppRole secret-id
      uri:
        url: "{{ vault_addr }}/v1/auth/approle/role/{{ ssh_approle_name }}/secret-id"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        validate_certs: false
        status_code: 200
      register: secret_id_response
      tags: [vault-ssh, credentials-core]

    - name: Create ZTA Vault SSH Credential
      ansible.controller.credential:
        name: ZTA Vault SSH Credential
        description: "Vault SSH CA — signs ephemeral certificates via AppRole"
        credential_type: "HashiCorp Vault Signed SSH"
        organization: "{{ aap_organization }}"
        inputs:
          url: "{{ vault_addr }}"
          role_id: "{{ role_id_response.json.data.role_id }}"
          secret_id: "{{ secret_id_response.json.data.secret_id }}"
        state: present
      tags: [vault-ssh, credentials-core]

    # ══════════════════════════════════════════════════════════════════════
    #  Summary
    # ══════════════════════════════════════════════════════════════════════

    - name: Display credentials summary
      tags: [always]
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║       AAP Credentials — Configuration Complete                   ║
          ╠═══════════════════════════════════════════════════════════════════╣
          ║                                                                 ║
          ║  ┌───┬──────────────────────────┬──────────────────────────────┐║
          ║  │ # │ Credential               │ Secret Source               │║
          ║  ├───┼──────────────────────────┼──────────────────────────────┤║
          ║  │ 1 │ ZTA Vault Credential     │ Userpass (bootstrap)        │║
          ║  │ 2 │ ZTA Machine Credential   │ Vault KV: secret/machine/*  │║
          ║  │ 3 │ ZTA Arista Credential    │ Vault KV: secret/network/*  │║
          ║  │ 4 │ ZTA NetBox Credential    │ Custom type (env injection) │║
          ║  │ 5 │ ZTA Splunk Credential    │ Vault KV: secret/services/* │║
          ║  │ 6 │ ZTA Vault SSH Credential │ Vault AppRole ({{ ssh_approle_name }})                │║
          ║  └───┴──────────────────────────┴──────────────────────────────┘║
          ║                                                                 ║
          ║  No hardcoded passwords in AAP — all secrets sourced            ║
          ║  from Vault at job runtime (except the Vault lookup             ║
          ║  credential itself, which bootstraps the chain).                ║
          ║                                                                 ║
          ║  Vault:   {{ vault_addr }}{{ ' ' * (51 - vault_addr | length) }}║
          ║  NetBox:  {{ nb_api_url }}{{ ' ' * (51 - nb_api_url | length) }}║
          ║                                                                 ║
          ╚═══════════════════════════════════════════════════════════════════╝
