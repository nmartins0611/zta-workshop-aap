---
# EDA Rulebook: Revoke application credentials when Splunk detects a
# brute-force attack on the app server.
#
# This rulebook:
#   1. Listens for webhook events from Splunk saved search alerts
#   2. Matches SSH brute-force alerts targeting workshop hosts
#   3. Triggers the "Emergency: Revoke App Credentials" job template in AAP
#
# Splunk EDA add-on payload structure (via AAP Token Event Stream):
#   {
#     "search_name": "ZTA: SSH Brute Force Detected",
#     "results": { "src_ip": "...", "host": "...", "count": "..." },
#     "sid": "...",
#     "owner": "admin",
#     "app": "ansible_addon_for_splunk"
#   }
#
# Usage with Event-Driven Ansible controller (Red Hat Ansible Automation Platform 2.6):
#   Add via Event-Driven Ansible controller (AAP 2.6) Project + Rulebook Activation.
#
# Usage with standalone ansible-rulebook:
#   ansible-rulebook --rulebook extensions/eda/rulebooks/splunk-credential-revoke.yml \
#     -i inventory/hosts.ini \
#     --vars eda_vars.yml

- name: Splunk Brute-Force → Credential Revocation
  hosts: all

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Revoke credentials on SSH brute-force detection
      condition: >-
        event.search_name is defined
        and "Brute Force" in event.search_name
      action:
        run_job_template:
          name: "Emergency: Revoke App Credentials"
          organization: Default
          job_args:
            extra_vars:
              incident_source: splunk-eda
              incident_rule: "{{ event.search_name | default('Splunk Alert') }}"
              incident_host: "{{ event.results.host | default('app.zta.lab') }}"
              incident_src_ip: "{{ event.results.src_ip | default('unknown') }}"
              incident_count: "{{ event.results.count | default('unknown') }}"

    - name: Revoke credentials on high-severity Splunk alert
      condition: >-
        event.search_name is defined
        and "ZTA" in event.search_name
        and "Bypass" in event.search_name
      action:
        run_job_template:
          name: "Emergency: Revoke App Credentials"
          organization: Default
          job_args:
            extra_vars:
              incident_source: splunk-eda-bypass
              incident_rule: "{{ event.search_name }}"
              incident_host: "{{ event.results.host | default('app.zta.lab') }}"

    - name: Log all Splunk alerts (for debugging)
      condition: >-
        event.search_name is defined
      action:
        debug:
          msg: "Splunk alert received"

    - name: Catch-all debug
      condition: event is defined
      action:
        debug:
          msg: "Event received by rulebook"
