---
# configure-arista.yml — Push configs to running cEOS switches
#
# Two-play structure:
#   1. Enable firewalld on central and open all container-mapped ports so
#      external hosts (AAP controller, students) can reach the switches.
#   2. Push full startup configs via arista.eos.eos_config over network_cli.
#
# Prerequisites:
#   - cEOS containers (ceos1, ceos2, ceos3) are running on central
#   - The [network] inventory group + vars are configured in hosts.ini
#   - Switch config files exist in setup/switch-configs/
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-arista.yml

- name: Open Container Ports on Central Firewall
  hosts: zta_services
  become: true
  gather_facts: false

  tasks:

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open container service ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - 2001-2003/tcp
        - 6031-6033/tcp
        - 2022-2023/tcp
        - 5432/tcp
        - 8081/tcp
        - 8000/tcp
        - 8088-8089/tcp
        - 9997/tcp
        - 8180-8181/tcp
        - 8543/tcp

    - name: Wait for switch SSH ports to be reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ item }}"
        timeout: 30
        delay: 2
      loop: [2001, 2002, 2003]

- name: Apply Configuration to Running cEOS Switches
  hosts: network
  gather_facts: false

  vars:
    config_dir: "{{ playbook_dir }}/switch-configs"
    host_config_map:
      ceos1: sw01
      ceos2: sw02
      ceos3: sw03

  tasks:

    - name: Push full configuration to switch
      arista.eos.eos_config:
        src: "{{ config_dir }}/{{ host_config_map[inventory_hostname] }}/{{ host_config_map[inventory_hostname] }}"
        replace: config
      register: config_result

    - name: Save running-config to startup-config
      arista.eos.eos_command:
        commands:
          - write memory
      when: config_result.changed

    - name: Display summary
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} — config {{ 'applied and saved' if config_result.changed else 'already current' }}
          (src: {{ host_config_map[inventory_hostname] }})
