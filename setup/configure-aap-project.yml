---
# configure-aap-project.yml — Create the AAP project and execution
# environment for the ZTA workshop lab.
#
# Creates:
#   0. aapadmin                    — Local System Administrator (password ansible123!)
#   1. ZTA Workshop EE             — Custom execution environment (cEOS + RHEL)
#   2. ZTA Workshop Project        — SCM project (Git)
#   3. Job templates               — All playbooks under section*/playbooks/ (tagged per section)
#
# Prerequisites:
#   - AAP Controller is installed and reachable
#   - SCM host reachable; zta-workshop-aap repo exists at project_scm_url
#   - ansible.controller collection available
#   - ZTA Lab Inventory and ZTA Machine Credential already exist on the controller
#   - ZTA Arista Credential for templates that touch switches (see vars file)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags ee
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags project
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags superadmin
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags templates
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags section1
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags section2
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags "section1,section2"
#
# Remove job templates (does not delete project/EE):
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags remove_section -e aap_remove_section=3
#   ansible-playbook -i inventory/hosts.ini setup/configure-aap-project.yml --tags remove_last_section
#
# Tags:
#   superadmin         — Local System Administrator (aapadmin / ansible123!) only
#   ee                 — Execution environment only
#   project            — SCM project only (sync included)
#   templates          — All workshop job templates (all sections)
#   section1 … section7— Only that section’s job templates
#   remove_section     — Delete templates for aap_remove_section (integer, required)
#   remove_last_section— Delete templates for the highest section number in the catalog

- name: Create AAP Project and Execution Environment for ZTA Workshop
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/zta_workshop_job_templates.yml

  vars:
    aap_host: "{{ aap_controller_url | default('https://control.zta.lab') }}"
    aap_user: admin
    aap_password: "{{ lookup('env', 'AAP_ADMIN_PASSWORD') | default('ansible123!', true) }}"
    aap_superadmin_username: aapadmin
    aap_superadmin_password: ansible123!
    aap_superadmin_email: aapadmin@zta.lab
    aap_verify_ssl: false
    aap_organization: Default

    ee_name: ZTA Workshop EE
    ee_image: quay.io/nmartins/zta_ee

    project_name: ZTA Workshop
    project_scm_url: https://github.com/nmartins0611/zta-workshop-aap.git

    # Pre-created on the controller before this playbook (see solve-section1 / lab docs)
    inventory_name: ZTA Lab Inventory
    machine_credential_name: ZTA Machine Credential

    # Set -e aap_remove_section=N with --tags remove_section to delete that section’s templates
    aap_remove_section: 0

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ aap_host }}"
      controller_username: "{{ aap_user }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_verify_ssl }}"

  tasks:

    # ══════════════════════════════════════════════════════════════════════
    #  Verify prerequisites
    # ══════════════════════════════════════════════════════════════════════

    - name: Verify AAP Controller is reachable
      uri:
        url: "{{ aap_host }}/api/controller/v2/ping/"
        method: GET
        validate_certs: "{{ aap_verify_ssl }}"
        status_code: 200
      register: aap_ping
      tags: [always]

    - name: Display AAP version
      debug:
        msg: "AAP Controller {{ aap_ping.json.version }} detected"
      tags: [always]

    - name: Create local AAP System Administrator user
      ansible.controller.user:
        username: "{{ aap_superadmin_username }}"
        password: "{{ aap_superadmin_password }}"
        email: "{{ aap_superadmin_email }}"
        is_superuser: true
        state: present
      tags: [superadmin, aap-bootstrap, aap, aap-project]

    # ══════════════════════════════════════════════════════════════════════
    #  1. Execution Environment — Custom EE with cEOS + RHEL collections
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Workshop Execution Environment
      ansible.controller.execution_environment:
        name: "{{ ee_name }}"
        description: "Custom EE with Arista cEOS, RHEL, and network collections for ZTA workshop"
        image: "{{ ee_image }}"
        pull: missing
        organization: "{{ aap_organization }}"
        state: present
      tags: [ee, aap-bootstrap, aap, aap-project]

    # ══════════════════════════════════════════════════════════════════════
    #  2. Project — SCM project pointing at Gitea
    # ══════════════════════════════════════════════════════════════════════

    - name: Create ZTA Workshop Project
      ansible.controller.project:
        name: "{{ project_name }}"
        description: "ZTA Workshop — playbooks, inventories, and roles from Gitea"
        organization: "{{ aap_organization }}"
        scm_type: git
        scm_url: "{{ project_scm_url }}"
        scm_branch: main
        scm_clean: true
        scm_update_on_launch: true
        default_environment: "{{ ee_name }}"
        state: present
      tags: [project, aap-bootstrap, aap, aap-project]

    - name: Wait for initial project sync to complete
      ansible.controller.project:
        name: "{{ project_name }}"
        organization: "{{ aap_organization }}"
        wait: true
        timeout: 120
        state: present
      tags: [project, aap-bootstrap, aap, aap-project]

    # ══════════════════════════════════════════════════════════════════════
    #  3. Job templates — catalog in vars/zta_workshop_job_templates.yml
    # ══════════════════════════════════════════════════════════════════════

    - name: Create Section 1 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 1) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section1, aap-bootstrap, aap, aap-project]

    - name: Create Section 2 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 2) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section2]

    - name: Create Section 3 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 3) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section3]

    - name: Create Section 4 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 4) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section4]

    - name: Create Section 5 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 5) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section5]

    - name: Create Section 6 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 6) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section6]

    - name: Create Section 7 job templates
      ansible.controller.job_template:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        project: "{{ project_name }}"
        playbook: "{{ item.playbook }}"
        inventory: "{{ inventory_name }}"
        credentials: "{{ item.credentials }}"
        survey_enabled: "{{ item.survey_enabled | default(false) | bool }}"
        survey_spec: "{{ item.survey_spec | default(omit) }}"
        state: present
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', 7) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [templates, section7]

    # ══════════════════════════════════════════════════════════════════════
    #  4. Remove job templates (optional)
    # ══════════════════════════════════════════════════════════════════════

    - name: Require aap_remove_section when using remove_section tag
      ansible.builtin.assert:
        that:
          - aap_remove_section | default(0) | int > 0
        fail_msg: >-
          Pass a positive section number, e.g. -e aap_remove_section=3
          when running with --tags remove_section.
      tags: [remove_section]

    - name: Remove job templates for a specific section
      ansible.controller.job_template:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', aap_remove_section | int) | list }}"
      loop_control:
        label: "{{ item.name }}"
      when: aap_remove_section | default(0) | int > 0
      tags: [remove_section]

    - name: Remove job templates for last catalog section (highest section number)
      vars:
        zta_workshop_last_section: "{{ zta_workshop_job_templates | map(attribute='section') | max }}"
      ansible.controller.job_template:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ zta_workshop_job_templates | selectattr('section', 'equalto', zta_workshop_last_section) | list }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [remove_last_section]

    # ══════════════════════════════════════════════════════════════════════
    #  Summary
    # ══════════════════════════════════════════════════════════════════════

    - name: Display configuration summary
      tags: [always]
      vars:
        _tpl_count: "{{ zta_workshop_job_templates | length }}"
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║       AAP Project & EE — Configuration Complete                  ║
          ╠═══════════════════════════════════════════════════════════════════╣
          ║                                                                 ║
          ║  ┌───┬──────────────────────────┬──────────────────────────────┐║
          ║  │ # │ Resource                 │ Details                      │║
          ║  ├───┼──────────────────────────┼──────────────────────────────┤║
          ║  │ 0 │ System admin (local)     │ {{ aap_superadmin_username }}{{ ' ' * (29 - aap_superadmin_username | length) }}│║
          ║  │ 1 │ Execution Environment    │ {{ ee_name }}{{ ' ' * (29 - ee_name | length) }}│║
          ║  │   │   Image                  │ {{ ee_image }}{{ ' ' * (29 - ee_image | length) }}│║
          ║  │ 2 │ Project                  │ {{ project_name }}{{ ' ' * (29 - project_name | length) }}│║
          ║  │   │   SCM URL                │ (see below)                  │║
          ║  │   │   Branch                 │ main                         │║
          ║  │   │   Update on launch       │ yes                          │║
          ║  │ 4 │ Job templates (catalog)  │ {{ _tpl_count }} (tags section1–section7)   │║
          ║  └───┴──────────────────────────┴──────────────────────────────┘║
          ║                                                                 ║
          ║  SCM URL: {{ project_scm_url }}{{ ' ' * (55 - project_scm_url | length) }}║
          ║  Default EE: {{ ee_name }}{{ ' ' * (53 - ee_name | length) }}║
          ║  Inventory: {{ inventory_name }}{{ ' ' * (53 - inventory_name | length) }}║
          ║                                                                 ║
          ║  Add per lab phase:  --tags sectionN   (or --tags templates for all) ║
          ║  Remove section N:  --tags remove_section -e aap_remove_section=N   ║
          ║  Remove last section: --tags remove_last_section                  ║
          ║                                                                 ║
          ╚═══════════════════════════════════════════════════════════════════╝
