---
# Section 2, Step 5: Rotate database credentials — revoke old, issue new, update app
- name: Rotate Database Credentials
  hosts: vault_servers
  become: true
  gather_facts: false

  vars:
    vault_env:
      VAULT_ADDR: "{{ vault_addr }}"
      VAULT_SKIP_VERIFY: "{{ vault_skip_verify | string }}"
      VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"

  tasks:
    - name: Read current lease ID
      slurp:
        src: /tmp/zta-db-lease
      register: current_lease_raw
      failed_when: false

    - name: Revoke current database credentials
      command: vault lease revoke {{ current_lease_raw.content | b64decode | trim }}
      environment: "{{ vault_env }}"
      when: current_lease_raw is not failed
      register: revoke_result
      failed_when: false

    - name: Request new dynamic database credentials
      command: vault read -format=json {{ vault_db_secrets_path }}/creds/{{ vault_db_role_name }}
      environment: "{{ vault_env }}"
      register: new_creds_raw
      no_log: true

    - name: Parse new credentials
      set_fact:
        new_db_user: "{{ (new_creds_raw.stdout | from_json).data.username }}"
        new_db_password: "{{ (new_creds_raw.stdout | from_json).data.password }}"
        new_lease_id: "{{ (new_creds_raw.stdout | from_json).lease_id }}"
      no_log: true

    - name: Store new lease ID
      copy:
        dest: /tmp/zta-db-lease
        content: "{{ new_lease_id }}"
        mode: '0600'

    - name: Export new credentials for application update
      set_stats:
        data:
          db_dynamic_user: "{{ new_db_user }}"
          db_dynamic_password: "{{ new_db_password }}"
          db_lease_id: "{{ new_lease_id }}"
        per_host: false

- name: Update Application with Rotated Credentials
  hosts: app_servers
  become: true
  gather_facts: false

  vars:
    db_user: "{{ db_dynamic_user }}"
    db_password: "{{ db_dynamic_password }}"

  tasks:
    - name: Update application environment file
      copy:
        dest: "{{ app_deploy_dir }}/env"
        content: |
          DB_HOST={{ db_data_ip }}
          DB_PORT={{ db_port }}
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          APP_PORT={{ app_port }}
        mode: '0600'
      no_log: true

    - name: Restart application with new credentials
      systemd:
        name: ztaapp
        state: restarted

    - name: Verify application health after rotation
      uri:
        url: "http://{{ app_host }}:{{ app_port }}/health"
        method: GET
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 3

    - name: Credential rotation summary
      debug:
        msg: |
          Credential rotation complete:
            Old credentials: revoked
            New DB user:     {{ db_user }}
            App health:      {{ health_check.json.status }}
