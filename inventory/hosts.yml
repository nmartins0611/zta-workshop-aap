---
# ┌─────────────────────────────────────────────────────────────────┐
# │  ZTA Workshop Inventory                                        │
# │                                                                │
# │  BEFORE FIRST RUN:                                             │
# │  1. Replace every ansible_host value with the actual IP or     │
# │     resolvable hostname assigned by your lab environment.      │
# │  2. After configure-dns.yml runs, IdM DNS will handle          │
# │     resolution and you can switch back to *.zta.lab names.     │
# └─────────────────────────────────────────────────────────────────┘
all:
  children:
    # IdM + OPA + Keycloak (co-located on the central server)
    zta_services:
      hosts:
        central:
          ansible_host: central.zta.lab      # ← replace with IP if DNS not yet available
          ansible_user: rhel

    # HashiCorp Vault
    vault_servers:
      hosts:
        vault:
          ansible_host: vault.zta.lab        # ← replace with IP
          ansible_user: rhel

    # Netbox CMDB
    netbox_servers:
      hosts:
        netbox:
          ansible_host: netbox.zta.lab       # ← replace with IP
          ansible_user: rhel

    # Wazuh SIEM
    wazuh_servers:
      hosts:
        wazuh:
          ansible_host: wazuh.zta.lab        # ← resolves to central (containerized)
          ansible_user: rhel

    # AAP Controller
    automation:
      hosts:
        control:
          ansible_host: control.zta.lab          # ← replace with IP
          ansible_user: rhel

    # Application server (container on central)
    app_servers:
      hosts:
        app:
          ansible_host: central.zta.lab
          ansible_port: 2023
          ansible_user: rhel
          ansible_password: "{{ idm_admin_password }}"

    # Database server (container on central)
    db_servers:
      hosts:
        db:
          ansible_host: central.zta.lab
          ansible_port: 2022
          ansible_user: rhel
          ansible_password: "{{ idm_admin_password }}"

    # Arista cEOS switches (containers on central)
    network:
      hosts:
        ceos1:
          ansible_host: central.zta.lab
          ansible_port: 2001
          ansible_network_os: arista.eos.eos
          ansible_connection: ansible.netcommon.network_cli
          ansible_user: admin
          ansible_password: admin
        ceos2:
          ansible_host: central.zta.lab
          ansible_port: 2002
          ansible_network_os: arista.eos.eos
          ansible_connection: ansible.netcommon.network_cli
          ansible_user: admin
          ansible_password: admin
        ceos3:
          ansible_host: central.zta.lab
          ansible_port: 2003
          ansible_network_os: arista.eos.eos
          ansible_connection: ansible.netcommon.network_cli
          ansible_user: admin
          ansible_password: admin

  vars:
    ansible_python_interpreter: /usr/bin/python3
