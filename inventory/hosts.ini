# ZTA Workshop Inventory
#
# Management network: 192.168.1.0/24
# All external VMs (AAP, Vault, Netbox) reach containers via
# published ports on central's management IP.
#
# Data-plane networks (internal, routed via Arista cEOS):
#   net2 = 10.30.0.0/24 (data-tier: DB at 10.30.0.10)
#   net3 = 10.20.0.0/24 (app-tier: App at 10.20.0.10)

[zta_services]
central ansible_host=192.168.1.11

[vault_servers]
vault ansible_host=192.168.1.12

[netbox_servers]
netbox ansible_host=192.168.1.15

[wazuh_servers]
wazuh ansible_host=192.168.1.11  # wazuh.zta.lab → central (containerized)

[gitea_servers]
gitea ansible_host=192.168.1.11

[automation]
control ansible_host=192.168.1.10

[app_servers]
app ansible_host=192.168.1.11 ansible_port=2023

[db_servers]
db ansible_host=192.168.1.11 ansible_port=2022

[network]
ceos1 ansible_host=192.168.1.11 ansible_port=2001
ceos2 ansible_host=192.168.1.11 ansible_port=2002
ceos3 ansible_host=192.168.1.11 ansible_port=2003

# SPIRE Agent hosts — receive workload identity SVIDs.
# The SPIRE Server runs on central (zta_services).
[spire_agents:children]
automation
db_servers
vault_servers

# All Linux hosts except central (IdM server) and the network switches.
# Used by setup/enroll-idm-clients.yml.
[idm_clients:children]
#vault_servers
netbox_servers
#wazuh_servers
#gitea_servers
automation
app_servers
db_servers

[all:vars]
ansible_user=rhel
ansible_password=ansible123!
ansible_become_password=ansible123!
ansible_python_interpreter=/usr/bin/python3

[network:vars]
ansible_user=admin
ansible_password=admin
ansible_network_os=arista.eos.eos
ansible_connection=ansible.netcommon.network_cli
