---
# Pre-workshop verification: Ensure all lab services are operational
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/verify-lab.yml
#
# Skip specific checks with --skip-tags:
#   ansible-playbook -i inventory/hosts.ini setup/verify-lab.yml --skip-tags wazuh,splunk
#
# Run only specific checks with --tags:
#   ansible-playbook -i inventory/hosts.ini setup/verify-lab.yml --tags vault,db
#
# Available tags:
#   idm, kerberos, containers, opa, keycloak, splunk,
#   wazuh, vault, netbox, db, app, aap, network, summary

- name: Verify Central Services (VMs + Containers)
  hosts: zta_services
  become: true
  gather_facts: true

  tasks:
    # ── VM-level services ──
    - name: Verify IdM services
      command: ipactl status
      register: idm_status
      changed_when: false
      failed_when: false
      tags: [idm, central]

    - name: Verify Kerberos
      shell: echo '{{ idm_admin_password }}' | kinit admin && klist
      register: krb_check
      changed_when: false
      no_log: true
      failed_when: false
      tags: [kerberos, idm, central]

    # ── Container checks ──
    - name: Get running containers
      command: podman ps --format '{{ '{{' }}.Names{{ '}}' }}'
      register: running_containers
      changed_when: false
      tags: [containers, central]

    - name: Check expected containers are running
      ansible.builtin.set_fact:
        container_status: >-
          {{
            container_status | default({}) | combine({
              item: (item in running_containers.stdout)
            })
          }}
      loop:
        - opa
        - keycloak
        - splunk
        - wazuh-indexer
        - wazuh-manager
        - wazuh-dashboard
        - ceos1
        - ceos2
        - ceos3
      tags: [containers, central]

    # ── Service endpoint checks ──
    - name: Verify OPA health
      uri:
        url: "http://localhost:8181/health"
        method: GET
      register: opa_status
      failed_when: false
      tags: [opa, central]

    - name: Verify OPA policies loaded
      uri:
        url: "http://localhost:8181/v1/policies"
        method: GET
        return_content: true
      register: opa_policies
      failed_when: false
      tags: [opa, central]

    - name: Verify Keycloak
      uri:
        url: "https://localhost:8543"
        method: GET
        validate_certs: false
        status_code: [200, 302, 303]
      register: keycloak_status
      failed_when: false
      tags: [keycloak, central]

    - name: Verify Splunk web UI
      uri:
        url: "http://localhost:8000"
        method: GET
        status_code: [200, 302, 303]
      register: splunk_ui_status
      failed_when: false
      tags: [splunk, central]

    - name: Verify Splunk HEC
      uri:
        url: "https://localhost:8088/services/collector/health/1.0"
        method: GET
        validate_certs: false
        status_code: [200]
      register: splunk_hec_status
      failed_when: false
      tags: [splunk, central]

    - name: Verify Wazuh Indexer
      uri:
        url: "http://localhost:9200"
        method: GET
        status_code: [200]
      register: wazuh_indexer_status
      failed_when: false
      tags: [wazuh, central]

    - name: Verify Wazuh Manager API
      uri:
        url: "https://localhost:55000"
        method: GET
        validate_certs: false
        status_code: [200, 401]
      register: wazuh_manager_status
      failed_when: false
      tags: [wazuh, central]

    - name: Verify Wazuh Dashboard
      uri:
        url: "http://localhost:5601"
        method: GET
        status_code: [200, 302]
      register: wazuh_dashboard_status
      failed_when: false
      tags: [wazuh, central]

    # ── Arista cEOS checks ──
    - name: Verify cEOS SSH reachability
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ item.port }}"
        timeout: 5
      loop:
        - { name: ceos1, port: 2001 }
        - { name: ceos2, port: 2002 }
        - { name: ceos3, port: 2003 }
      loop_control:
        label: "{{ item.name }} (port {{ item.port }})"
      register: ceos_ssh_status
      failed_when: false
      tags: [arista, ceos, central]

    - name: Verify cEOS eAPI reachability
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ item.port }}"
        timeout: 5
      loop:
        - { name: ceos1, port: 6031 }
        - { name: ceos2, port: 6032 }
        - { name: ceos3, port: 6033 }
      loop_control:
        label: "{{ item.name }} (port {{ item.port }})"
      register: ceos_eapi_status
      failed_when: false
      tags: [arista, ceos, central]

- name: Verify Vault Server
  hosts: vault_servers
  become: true
  gather_facts: false
  tags: [vault]

  tasks:
    - name: Check Vault seal status
      uri:
        url: "{{ vault_addr }}/v1/sys/seal-status"
        method: GET
        validate_certs: false
      register: vault_status
      failed_when: false

- name: Verify Netbox
  hosts: netbox_servers
  become: true
  gather_facts: false
  tags: [netbox]

  tasks:
    - name: Check Netbox API
      uri:
        url: "http://localhost/api/status/"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        status_code: [200]
      register: netbox_status
      failed_when: false

- name: Verify Database Server
  hosts: db_servers
  become: true
  gather_facts: false
  tags: [db]

  tasks:
    - name: Check PostgreSQL is running
      systemd:
        name: postgresql
        state: started
      check_mode: true
      register: pg_status
      failed_when: false

    - name: Test database connectivity
      become_user: postgres
      command: psql -d {{ db_name }} -c "SELECT 1;"
      register: db_check
      changed_when: false
      failed_when: false

- name: Verify Application Server
  hosts: app_servers
  become: true
  gather_facts: false
  tags: [app]

  tasks:
    - name: Check application is deployed
      stat:
        path: "{{ app_deploy_dir }}/app.py"
      register: app_check
      failed_when: false

    - name: Check application is responding
      uri:
        url: "http://localhost:8080"
        method: GET
        status_code: [200, 302]
      register: app_http_status
      failed_when: false

- name: Verify AAP Controller
  hosts: aap_controllers
  become: true
  gather_facts: false
  tags: [aap]

  tasks:
    - name: Check AAP web UI
      uri:
        url: "https://localhost/api/v2/ping/"
        method: GET
        validate_certs: false
        status_code: [200]
      register: aap_status
      failed_when: false

- name: Verify Network Device
  hosts: network
  gather_facts: false
  tags: [network]

  tasks:
    - name: Test switch reachability
      cisco.ios.ios_facts:
        gather_subset: min
      register: switch_facts
      failed_when: false

