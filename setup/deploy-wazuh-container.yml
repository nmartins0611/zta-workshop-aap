---
# Deploy Wazuh (Manager + Indexer + Dashboard) as containers on central
#
# This replaces the dedicated Wazuh VM with containers running on central.
#
# Services exposed:
#   - Dashboard:         https://central.zta.lab:5601
#   - Manager API:       https://central.zta.lab:55000
#   - Agent enrollment:  central.zta.lab:1515
#   - Agent comms:       central.zta.lab:1514
#   - Indexer API:       https://central.zta.lab:9200
#
# Credentials:
#   - Dashboard:  admin / SecretPassword
#   - API:        wazuh / wazuh
#   - Indexer:    admin / SecretPassword
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup/deploy-wazuh-container.yml

- name: Deploy Wazuh Containers
  hosts: zta_services
  become: true
  gather_facts: true

  vars:
    wazuh_version: "4.9.2"
    wazuh_data_dir: /opt/wazuh-docker
    wazuh_pod_name: wazuh
    wazuh_indexer_password: SecretPassword
    wazuh_dashboard_password: SecretPassword
    wazuh_api_user: wazuh
    wazuh_api_password: "x8.E0+DZi6zCCz3cG9jvXimSBn5+s4tx"

    wazuh_images:
      manager: "docker.io/wazuh/wazuh-manager:{{ wazuh_version }}"
      indexer: "docker.io/wazuh/wazuh-indexer:{{ wazuh_version }}"
      dashboard: "docker.io/wazuh/wazuh-dashboard:{{ wazuh_version }}"

  tasks:
    # ═══════════════════════════════════════════════════════════════════
    # Phase 1 — Prerequisites and directories
    # ═══════════════════════════════════════════════════════════════════

    - name: Ensure podman is installed
      dnf:
        name:
          - podman
          - python3-podman
          - openssl
        state: present

    - name: Create Wazuh persistent directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ wazuh_data_dir }}"
        - "{{ wazuh_data_dir }}/certs"
        - "{{ wazuh_data_dir }}/manager/etc"
        - "{{ wazuh_data_dir }}/manager/logs"
        - "{{ wazuh_data_dir }}/manager/queue"
        - "{{ wazuh_data_dir }}/manager/var"
        - "{{ wazuh_data_dir }}/manager/integrations"
        - "{{ wazuh_data_dir }}/manager/active-response"
        - "{{ wazuh_data_dir }}/manager/wodles"
        - "{{ wazuh_data_dir }}/manager/agentless"
        - "{{ wazuh_data_dir }}/filebeat/etc"
        - "{{ wazuh_data_dir }}/filebeat/var"
        - "{{ wazuh_data_dir }}/indexer/data"
        - "{{ wazuh_data_dir }}/dashboard"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 2 — Generate self-signed certificates
    # ═══════════════════════════════════════════════════════════════════

    - name: Generate CA private key
      command: >
        openssl genrsa -out {{ wazuh_data_dir }}/certs/root-ca.key 2048
      args:
        creates: "{{ wazuh_data_dir }}/certs/root-ca.key"

    - name: Generate CA certificate
      command: >
        openssl req -new -x509 -sha256
        -key {{ wazuh_data_dir }}/certs/root-ca.key
        -out {{ wazuh_data_dir }}/certs/root-ca.pem
        -days 3650
        -subj "/C=GB/ST=Workshop/L=Lab/O=ZTA/CN=Wazuh Root CA"
      args:
        creates: "{{ wazuh_data_dir }}/certs/root-ca.pem"

    - name: Generate certificates for each component
      shell: |
        cd {{ wazuh_data_dir }}/certs

        # {{ item.name }} key + CSR
        openssl genrsa -out {{ item.name }}.key 2048
        openssl req -new \
          -key {{ item.name }}.key \
          -out {{ item.name }}.csr \
          -subj "/C=GB/ST=Workshop/L=Lab/O=ZTA/CN={{ item.cn }}"

        # SAN extension
        cat > {{ item.name }}-ext.cnf <<EXTEOF
        subjectAltName = DNS:{{ item.cn }},DNS:localhost,IP:127.0.0.1,IP:{{ ansible_default_ipv4.address }}
        EXTEOF

        # Sign with CA
        openssl x509 -req \
          -in {{ item.name }}.csr \
          -CA root-ca.pem \
          -CAkey root-ca.key \
          -CAcreateserial \
          -out {{ item.name }}.pem \
          -days 3650 \
          -sha256 \
          -extfile {{ item.name }}-ext.cnf
      args:
        creates: "{{ wazuh_data_dir }}/certs/{{ item.name }}.pem"
      loop:
        - { name: indexer, cn: wazuh-indexer }
        - { name: manager, cn: wazuh-manager }
        - { name: dashboard, cn: wazuh-dashboard }
        - { name: admin, cn: admin }

    - name: Set ownership to wazuh-indexer UID (1000) for all certs
      file:
        path: "{{ wazuh_data_dir }}/certs"
        recurse: true
        owner: "1000"
        group: "1000"
        mode: '0644'

    - name: Set private key permissions (readable by wazuh-indexer)
      file:
        path: "{{ wazuh_data_dir }}/certs/{{ item }}"
        owner: "1000"
        group: "1000"
        mode: '0640'
      loop:
        - root-ca.key
        - indexer.key
        - manager.key
        - dashboard.key
        - admin.key

    - name: Set SELinux context on Wazuh data directory
      command: "chcon -R -t container_file_t {{ wazuh_data_dir }}"
      changed_when: true

    # ═══════════════════════════════════════════════════════════════════
    # Phase 3 — Clean up any existing deployment
    # ═══════════════════════════════════════════════════════════════════

    - name: Stop and remove existing Wazuh pod
      command: "podman pod rm -f {{ wazuh_pod_name }}"
      failed_when: false
      changed_when: false

    # ═══════════════════════════════════════════════════════════════════
    # Phase 4 — Pull images
    # ═══════════════════════════════════════════════════════════════════

    - name: Pull Wazuh container images
      command: "podman pull {{ item }}"
      loop:
        - "{{ wazuh_images.indexer }}"
        - "{{ wazuh_images.manager }}"
        - "{{ wazuh_images.dashboard }}"
      register: pull_results
      changed_when: "'Pulling' in pull_results.stdout or pull_results.rc == 0"

    # ═══════════════════════════════════════════════════════════════════
    # Phase 5 — Create pod and start containers
    # ═══════════════════════════════════════════════════════════════════

    - name: Create Wazuh pod with published ports
      command: >
        podman pod create
        --name {{ wazuh_pod_name }}
        --hostname wazuh.zta.lab
        -p 9200:9200
        -p 55000:55000
        -p 1514:1514
        -p 1515:1515
        -p 5601:5601

    # ── Wazuh Indexer ──
    - name: Set cert ownership for indexer (UID 1000)
      command: chown -R 1000:1000 {{ wazuh_data_dir }}/certs
      changed_when: true

    - name: Set cert permissions
      shell: |
        chmod 644 {{ wazuh_data_dir }}/certs/*.pem
        chmod 640 {{ wazuh_data_dir }}/certs/*.key

    - name: Apply SELinux context for container access
      command: chcon -R -t container_file_t {{ wazuh_data_dir }}
      changed_when: true

    - name: Write opensearch.yml with security enabled
      copy:
        dest: "{{ wazuh_data_dir }}/indexer/opensearch.yml"
        owner: "1000"
        group: "1000"
        mode: '0644'
        content: |
          cluster.name: wazuh-cluster
          node.name: node-1
          network.host: 0.0.0.0
          discovery.type: single-node
          compatibility.override_main_response_version: true
          plugins.security.ssl.transport.pemcert_filepath: /usr/share/wazuh-indexer/certs/indexer.pem
          plugins.security.ssl.transport.pemkey_filepath: /usr/share/wazuh-indexer/certs/indexer-key.pem
          plugins.security.ssl.transport.pemtrustedcas_filepath: /usr/share/wazuh-indexer/certs/root-ca.pem
          plugins.security.ssl.http.enabled: true
          plugins.security.ssl.http.pemcert_filepath: /usr/share/wazuh-indexer/certs/indexer.pem
          plugins.security.ssl.http.pemkey_filepath: /usr/share/wazuh-indexer/certs/indexer-key.pem
          plugins.security.ssl.http.pemtrustedcas_filepath: /usr/share/wazuh-indexer/certs/root-ca.pem
          plugins.security.authcz.admin_dn:
            - "CN=admin,O=ZTA,L=Lab,ST=Workshop,C=GB"
          plugins.security.nodes_dn:
            - "CN=wazuh-indexer,O=ZTA,L=Lab,ST=Workshop,C=GB"
          plugins.security.allow_default_init_securityindex: true
          plugins.security.allow_unsafe_democonfiguration: true

    - name: Start Wazuh Indexer container
      shell: >
        podman run -d
        --name wazuh-indexer
        --pod {{ wazuh_pod_name }}
        --restart always
        -v {{ wazuh_data_dir }}/indexer/data:/var/lib/wazuh-indexer:z
        -v {{ wazuh_data_dir }}/indexer/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro,z
        -v {{ wazuh_data_dir }}/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/indexer.pem:/usr/share/wazuh-indexer/certs/indexer.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/indexer.key:/usr/share/wazuh-indexer/certs/indexer-key.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/admin.key:/usr/share/wazuh-indexer/certs/admin-key.pem:ro,z
        -e 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
        -e 'bootstrap.memory_lock=true'
        {{ wazuh_images.indexer }}

    - name: Wait for Wazuh Indexer to be ready
      uri:
        url: "https://localhost:9200"
        method: GET
        user: admin
        password: "{{ wazuh_indexer_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200]
      register: indexer_health
      until: indexer_health.status == 200
      retries: 40
      delay: 10

    - name: Clear any cluster index-creation blocks
      uri:
        url: "https://localhost:9200/_cluster/settings"
        method: PUT
        user: admin
        password: "{{ wazuh_indexer_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          persistent:
            cluster.blocks.create_index: null
            cluster.blocks.read_only_allow_delete: null
        status_code: [200]

    # ── Wazuh Manager ──
    - name: Start Wazuh Manager container
      shell: >
        podman run -d
        --name wazuh-manager
        --pod {{ wazuh_pod_name }}
        --restart always
        -v {{ wazuh_data_dir }}/manager/logs:/var/ossec/logs:z
        -v {{ wazuh_data_dir }}/manager/queue:/var/ossec/queue:z
        -v {{ wazuh_data_dir }}/certs/root-ca.pem:/etc/ssl/root-ca.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/manager.pem:/etc/ssl/filebeat.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/manager.key:/etc/ssl/filebeat.key:ro,z
        -e INDEXER_URL=https://localhost:9200
        -e INDEXER_USERNAME=admin
        -e INDEXER_PASSWORD={{ wazuh_indexer_password }}
        -e 'FILEBEAT_SSL_VERIFICATION_MODE=none'
        -e API_USERNAME={{ wazuh_api_user }}
        -e 'API_PASSWORD={{ wazuh_api_password }}'
        {{ wazuh_images.manager }}

    - name: Wait for Wazuh Manager API
      uri:
        url: "https://localhost:55000"
        method: GET
        validate_certs: false
        status_code: [200, 401]
      register: manager_health
      until: manager_health.status in [200, 401]
      retries: 30
      delay: 5

    # ── Wazuh Dashboard ──
    - name: Generate self-signed certs for dashboard
      command: >
        openssl req -x509 -nodes -days 3650
        -newkey rsa:2048
        -keyout {{ wazuh_data_dir }}/certs/dashboard.key
        -out {{ wazuh_data_dir }}/certs/dashboard.pem
        -subj "/CN=wazuh-dashboard/O=ZTA/C=GB"
      args:
        creates: "{{ wazuh_data_dir }}/certs/dashboard.pem"

    - name: Start Wazuh Dashboard container
      shell: >
        podman run -d
        --name wazuh-dashboard
        --pod {{ wazuh_pod_name }}
        --restart always
        -v {{ wazuh_data_dir }}/certs/dashboard.pem:/etc/wazuh-dashboard/certs/dashboard.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/dashboard.key:/etc/wazuh-dashboard/certs/dashboard-key.pem:ro,z
        -v {{ wazuh_data_dir }}/certs/root-ca.pem:/etc/wazuh-dashboard/certs/root-ca.pem:ro,z
        -e INDEXER_URL=https://localhost:9200
        -e INDEXER_USERNAME=admin
        -e INDEXER_PASSWORD={{ wazuh_indexer_password }}
        -e WAZUH_API_URL=https://localhost
        -e API_USERNAME={{ wazuh_api_user }}
        -e 'API_PASSWORD={{ wazuh_api_password }}'
        {{ wazuh_images.dashboard }}

    - name: Wait for Wazuh Dashboard
      uri:
        url: "https://localhost:5601"
        method: GET
        validate_certs: false
        status_code: [200, 302]
      register: dashboard_health
      until: dashboard_health.status in [200, 302]
      retries: 40
      delay: 10

    # ═══════════════════════════════════════════════════════════════════
    # Phase 6 — Firewall and verification
    # ═══════════════════════════════════════════════════════════════════

    # - name: Open Wazuh firewall ports
    #   firewalld:
    #     port: "{{ item }}"
    #     permanent: true
    #     immediate: true
    #     state: enabled
    #   loop:
    #     - 9200/tcp
    #     - 55000/tcp
    #     - 1514/tcp
    #     - 1515/tcp
    #     - 5601/tcp

    - name: Verify all containers are running
      command: "podman pod ps --format '{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.Status{{ '}}' }}'"
      register: pod_status
      changed_when: false

    - name: List containers in the pod
      command: "podman ps --pod --filter pod={{ wazuh_pod_name }} --format '{{ '{{' }}.Names{{ '}}' }}  {{ '{{' }}.Status{{ '}}' }}'"
      register: container_list
      changed_when: false

    # ── Summary ──
    - name: Display Wazuh deployment summary
      debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║        Wazuh Stack — Container Deployment Complete            ║
          ╠════════════════════════════════════════════════════════════════╣
          ║                                                              ║
          ║  Dashboard:   http://central.zta.lab:5601                    ║
          ║  Manager API: https://central.zta.lab:55000                  ║
          ║  Agent Port:  central.zta.lab:1514 (TCP)                     ║
          ║  Enrollment:  central.zta.lab:1515                           ║
          ║  Indexer API: https://central.zta.lab:9200                   ║
          ║                                                              ║
          ║  Credentials:                                                ║
          ║    Dashboard:  admin / {{ wazuh_dashboard_password }}
          ║    Manager:    {{ wazuh_api_user }} / {{ wazuh_api_password }}
          ║    Indexer:    admin / {{ wazuh_indexer_password }}
          ║                                                              ║
          ║  Containers:                                                 ║
          {% for line in container_list.stdout_lines %}
          ║    {{ line }}
          {% endfor %}
          ║                                                              ║
          ║  Data:        {{ wazuh_data_dir }}
          ║  Certs:       {{ wazuh_data_dir }}/certs/
          ║                                                              ║
          ║  Agent enrollment (on target hosts):                         ║
          ║    /var/ossec/bin/agent-auth -m central.zta.lab              ║
          ║                                                              ║
          ║  NOTE: Update inventory/group_vars/all.yml:                  ║
          ║    wazuh_url: http://central.zta.lab:5601                    ║
          ║    wazuh_api_url: https://central.zta.lab:55000              ║
          ║    wazuh_manager_host: central.zta.lab                       ║
          ╚════════════════════════════════════════════════════════════════╝
