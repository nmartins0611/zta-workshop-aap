---
# Section 2, Step 1: Check OPA policy before issuing database credentials
- name: Check Database Access Policy with OPA
  hosts: zta_services
  become: false
  gather_facts: false

  # Launcher username comes from AAP (awx_user_name). Group membership for this
  # PDP step is taken from IdM (ipa user-show --raw), not awx_user_groups: some
  # controller/LDAP setups mis-report groups, and learners often add neteng to
  # app-deployers while testing Exercise 2.5 — IdM is the SoT the policy models.
  vars:
    requesting_user: "{{ awx_user_name | default('', true) }}"
    controller_reported_groups: "{{ awx_user_groups | default([], true) }}"

  tasks:
    - name: Query IdM for launcher group membership (authoritative for OPA input)
      ansible.builtin.command:
        cmd: "ipa user-show {{ requesting_user | quote }} --raw"
      register: ipa_user_raw
      changed_when: false
      failed_when: false
      become: true
      when: requesting_user | length > 0

    - name: Build requesting_groups from IdM memberof
      ansible.builtin.set_fact:
        requesting_groups: >-
          {{
            (
              ipa_user_raw.stdout_lines | default([])
              | select('match', '(?i)^memberof: cn=')
              | map('regex_replace', '(?i)^memberof: cn=([^,]+),.*', '\\1')
              | list
              | unique
            )
            if (
              requesting_user | length > 0
              and not (ipa_user_raw.skipped | default(false))
              and (ipa_user_raw.rc | default(-1) == 0)
            )
            else []
          }}

    - name: Query OPA for database access decision
      uri:
        url: "{{ opa_url }}/v1/data/zta/db_access/decision"
        method: POST
        body_format: json
        body:
          input:
            user: "{{ requesting_user }}"
            user_groups: "{{ requesting_groups }}"
            target_database: "{{ db_name }}"
            requested_permissions: ["SELECT", "INSERT", "UPDATE"]
      register: opa_decision

    - name: Display OPA decision
      debug:
        msg: |
          OPA Database Access Decision:
            User:            {{ requesting_user }}
            Groups (IdM):  {{ requesting_groups | join(', ') }}
            {% if controller_reported_groups | length > 0
                  and (controller_reported_groups | sort | join(',') != requesting_groups | sort | join(',')) %}
            Controller saw: {{ controller_reported_groups | join(', ') }} (not used for this check)
            {% endif %}
            Database:        {{ db_name }}
            Decision:        {{ 'ALLOWED' if opa_decision.json.result.allow else 'DENIED' }}
            Reason:          {{ opa_decision.json.result.reason }}

    - name: Enforce OPA decision
      assert:
        that:
          - opa_decision.json.result.allow == true
        fail_msg: |
          ACCESS DENIED by OPA policy.
          User '{{ requesting_user }}' is not authorised to request database credentials.
          Reason: {{ opa_decision.json.result.reason }}
          Conditions: {{ opa_decision.json.result.conditions }}
        success_msg: "OPA policy check passed — proceeding with credential issuance"
